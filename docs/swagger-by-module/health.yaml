openapi: 3.0.3
info:
  title: 'GR-Class Marine Backend API - Health Module'
  description: "Production-grade API documentation for GR-Class Marine Backend.\nUse role-specific docs: `/api-docs/admin`, `/api-docs/gm`, `/api-docs/tm`, `/api-docs/surveyor`, `/api-docs/client`,`/api-docs/public`\n"
  version: 1.0.0
  contact:
    name: 'GR-Class Marine'
servers:
  -
    url: /
    description: 'Relative (same host)'
  -
    url: 'http://localhost:3000'
    description: 'Local development'
security:
  -
    bearerAuth: []
tags:
  -
    name: Health
    description: 'Health check'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token from login or refresh-token. Use in header: Authorization: Bearer &lt;accessToken&gt;'
  schemas:
    ActivityRequestConvertToJobRequest:
      type: object
      required:
        - certificate_type_id
      description: "Same shape as job create, but only `certificate_type_id` is required.\n`vessel_id`, `target_port`, `target_date`, and `reason` default from the\nactivity request when omitted.\n"
      properties:
        certificate_type_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
          description: 'Certificate type for the new job (required at conversion).'
        vessel_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
          description: 'Override activity `vessel_id` if needed.'
        reason:
          type: string
          description: 'Job reason; defaults to requested_service + description.'
        target_port:
          type: string
          description: 'Defaults to activity `location_port`.'
        target_date:
          type: string
          format: date
          description: 'Defaults to activity `proposed_date`.'
        priority:
          type: string
          enum:
            - LOW
            - NORMAL
            - HIGH
            - URGENT
          description: 'Defaults from activity priority (MEDIUM → NORMAL).'
        remarks:
          type: string
          description: 'Job remarks; defaults to "Converted from {request_number}".'
        uploaded_documents:
          type: array
          items:
            type: object
            required:
              - required_document_id
              - file_url
            properties:
              required_document_id:
                $ref: '#/components/schemas/UUID'
              file_url:
                type: string
    ActivityRequestConvertToJobResponse:
      type: object
      properties:
        activity_request:
          $ref: '#/components/schemas/ActivityRequestDetailResponse'
        job:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            job_request_number:
              type: string
            job_status:
              type: string
            vessel_id:
              $ref: '#/components/schemas/UUID'
            certificate_type_id:
              $ref: '#/components/schemas/UUID'
            target_port:
              type: string
            target_date:
              type: string
              format: date
            priority:
              type: string
            reason:
              type: string
            source_activity_request_id:
              allOf:
                -
                  $ref: '#/components/schemas/UUID'
              description: 'Back-reference to the originating activity request'
    ActivityRequestListPaginatedResponse:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 5
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ActivityRequestSummary'
    ActivityRequestStatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
            - DRAFT
          description: "Cannot be `CONVERTED_TO_JOB` — use `POST .../convert-to-job` instead.\n"
        remarks:
          type: string
          description: 'Required meaningfully when `status` is `REJECTED`'
    ActivityRequestApiEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ActivityRequestDetailResponse'
    ActivityRequestConvertApiEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Activity request converted to job successfully'
        data:
          $ref: '#/components/schemas/ActivityRequestConvertToJobResponse'
    ActivityRequestCreateRequest:
      type: object
      required:
        - activity_type
        - requested_service
        - proposed_date
        - location_port
      properties:
        vessel_id:
          $ref: '#/components/schemas/UUID'
          description: 'Mandatory for CLIENT requests'
        activity_type:
          type: string
          enum:
            - INSPECTION
            - AUDIT
            - TRAINING
            - VISIT
            - SURVEY
            - OTHER
        requested_service:
          type: string
          example: 'Annual Survey'
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
          default: MEDIUM
        description:
          type: string
        location_port:
          type: string
          example: 'Port of Singapore'
        proposed_date:
          type: string
          format: date
          example: '2026-05-15'
        attachments:
          type: array
          items:
            type: string
            format: uri
    ActivityRequestVesselBlock:
      type: object
      description: 'Flat vessel summary for activity request screens (all fields `N/A` when no vessel linked).'
      properties:
        id:
          type: string
          description: 'Vessel UUID, or `N/A`'
        vessel_name:
          type: string
        imo_number:
          type: string
        call_sign:
          type: string
        mmsi_number:
          type: string
        port_of_registry:
          type: string
        year_built:
          type: string
          description: 'Build year, or `N/A`'
        ship_type:
          type: string
        gross_tonnage:
          type: string
        net_tonnage:
          type: string
        deadweight:
          type: string
        class_status:
          type: string
          enum:
            - ACTIVE
            - SUSPENDED
            - WITHDRAWN
            - N/A
        current_class_society:
          type: string
        engine_type:
          type: string
        flag_state:
          type: string
          description: 'Flag administration name, or `N/A`'
        company_name:
          type: string
          description: 'Owner/client company, or `N/A`'
        company_code:
          type: string
    ActivityRequestSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        request_number:
          type: string
        activity_type:
          type: string
        requested_service:
          type: string
        proposed_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
            - CONVERTED_TO_JOB
            - DRAFT
        vessel_id:
          type: string
          description: 'UUID when set; otherwise `N/A`'
        vessel_name:
          type: string
          description: 'Vessel name, or `N/A`'
        imo_number:
          type: string
          description: 'IMO number, or `N/A`'
        ship_type:
          type: string
          description: 'Vessel type, or `N/A`'
        class_status:
          type: string
          description: 'Class status, or `N/A`'
        flag_state:
          type: string
          description: 'Flag state name, or `N/A`'
        company_name:
          type: string
          description: 'Owner company, or `N/A`'
        vessel:
          $ref: '#/components/schemas/ActivityRequestVesselBlock'
        linked_job_id:
          type: string
          description: 'UUID when linked; otherwise `N/A`'
        linked_job_status:
          type: string
          description: 'Linked job status, or `N/A`'
        linked_job_request_number:
          type: string
          description: 'Linked job number, or `N/A`'
        created_at:
          type: string
          format: date-time
    ActivityRequestDetailResponse:
      allOf:
        -
          $ref: '#/components/schemas/ActivityRequestSummary'
        -
          type: object
          properties:
            requested_by:
              $ref: '#/components/schemas/UUID'
            vessel_id:
              $ref: '#/components/schemas/UUID'
            priority:
              type: string
            description:
              type: string
            location_port:
              type: string
            linked_job_id:
              type: string
              description: 'UUID when linked; otherwise `N/A`'
            rejection_reason:
              type: string
              description: 'Rejection text, or `N/A` when not rejected'
            attachments:
              type: array
              items:
                type: object
                properties:
                  filename: {type: string}
                  signedUrl: {type: string, format: uri}
            requester_name:
              type: string
              description: 'Display name, or `N/A`'
            requester_email:
              type: string
              description: 'Email, or `N/A`'
            vessel_name:
              type: string
              description: 'Vessel name, or `N/A`'
            imo_number:
              type: string
              description: 'IMO number, or `N/A`'
            vessel:
              $ref: '#/components/schemas/ActivityRequestVesselBlock'
            updated_at:
              type: string
              format: date-time
            linked_job_status:
              type: string
              description: 'Linked job status, or `N/A`'
            linked_job_reason:
              type: string
              description: 'Linked job reason, or `N/A`'
            linked_job_request_number:
              type: string
              description: 'Linked job number, or `N/A`'
    ChangeRequestResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        entity_type:
          type: string
        entity_id:
          $ref: '#/components/schemas/UUID'
        requested_by:
          $ref: '#/components/schemas/UUID'
        approved_by:
          $ref: '#/components/schemas/UUID'
          nullable: true
        change_description:
          type: string
        old_value:
          type: object
        new_value:
          type: object
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
        approval_remarks:
          type: string
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    ApprovalResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        entity_type:
          type: string
        entity_id:
          $ref: '#/components/schemas/UUID'
        approved_by:
          $ref: '#/components/schemas/UUID'
        role:
          type: string
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
        remarks:
          type: string
          nullable: true
        approved_at:
          type: string
          format: date-time
    TocaResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        losing_class_society:
          type: string
        gaining_class_society:
          type: string
        request_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - PENDING
            - ACCEPTED
            - REJECTED
        documents_url:
          type: array
          items:
            type: string
            format: uri
        decision_date:
          type: string
          format: date
          nullable: true
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@grclass.com
        password:
          type: string
          format: password
          example: SecurePass123!
      example:
        email: admin@grclass.com
        password: SecurePass123!
    LoginResponse:
      type: object
      description: 'Returns user and both tokens. Use accessToken for API calls (Bearer header); use refreshToken only at POST /auth/refresh-token. Store tokens securely.'
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'Short-lived JWT for API auth. Send in header: Authorization Bearer &lt;accessToken&gt;'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: 'Long-lived JWT; use only to get new access token via POST /auth/refresh-token'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      example:
        user:
          id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
          name: 'John Doe'
          email: admin@grclass.com
          role: CLIENT
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Logged out successfully'
        accessToken:
          type: string
          nullable: true
          description: 'Always null after logout'
        refreshToken:
          type: string
          nullable: true
          description: 'Always null after logout'
    UserSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - ADMIN
            - GM
            - TM
            - TO
            - SURVEYOR
            - CLIENT
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - SUSPENDED
        client_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        profile_pic_url:
          type: string
          format: uri
          nullable: true
        force_password_reset:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@grclass.com
    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: 'Reset token from email'
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
          example: SecurePass123
    RegistrationRequest:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
        role:
          type: string
          enum:
            - ADMIN
            - GM
            - TM
            - TO
            - SURVEYOR
            - CLIENT
        company_name:
          type: string
        client_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        phone:
          type: string
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
    RefreshTokenRequest:
      type: object
      description: 'Send refresh token in body (refreshToken or token). Cookie refreshToken is also accepted.'
      properties:
        refreshToken:
          type: string
          description: 'Refresh token from login/register or previous refresh'
        token:
          type: string
          description: 'Alias for refreshToken (legacy)'
    RefreshTokenResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'New short-lived access token for API calls'
        refreshToken:
          type: string
          description: 'New long-lived refresh token; store and use for next refresh'
    CertificateTemplateResponse:
      type: object
      description: 'A DOCX template (referenced by S3 key) used to render certificates.'
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        template_name:
          type: string
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
          nullable: true
        template_file_url:
          type: string
          description: "S3 key for the .docx template (e.g.\n`certificate-templates/1714000000000_iopp_v1.docx`). This is what\n`getUploadUrl` returned as `fileKey`.\n"
          nullable: true
        variables:
          type: array
          description: 'Variable names this template expects to receive at render time.'
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        CertificateType:
          type: object
          nullable: true
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
    CertificateTemplateCreateRequest:
      type: object
      required:
        - template_name
        - certificate_type_id
        - template_file_url
      description: "Body for `POST /api/v1/certificate-templates`.\nRequired: `template_name`, `certificate_type_id`, `template_file_url`.\nOptional: `certificate_term`, `variables`, `is_active`.\n"
      properties:
        template_name:
          type: string
          description: 'Human-readable template name.'
        certificate_type_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
          description: 'ID of the associated certificate type.'
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
          nullable: true
          description: 'If set, this template is used only for that term.'
        template_file_url:
          type: string
          description: "S3 key returned by\n`GET /api/v1/certificate-templates/get-upload-url` (after the file\nhas been uploaded to that pre-signed URL).\n"
        variables:
          type: array
          description: 'Variable names this template expects at render time.'
          items:
            type: string
        is_active:
          type: boolean
          default: true
    CertificateTemplateUpdateRequest:
      type: object
      description: "Body for `PUT /api/v1/certificate-templates/{id}`. All fields optional —\nsend only what you want to change. To swap the DOCX, send the new S3\nkey as `template_file_url`.\n"
      properties:
        template_name:
          type: string
        certificate_type_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
          nullable: true
        template_file_url:
          type: string
        variables:
          type: array
          items:
            type: string
        is_active:
          type: boolean
    CertificateSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        created_at:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
    CertificateResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        qr_code_url:
          type: string
          format: uri
        pdf_file_url:
          type: string
          format: uri
        uploaded_file_url:
          type: string
          nullable: true
        generated_pdf_url:
          type: string
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        issued_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        CertificateType:
          type: object
          properties:
            name:
              type: string
        Vessel:
          type: object
          properties:
            vessel_name:
              type: string
            imo_number:
              type: string
        FlagState:
          type: object
          properties:
            flag_state_name:
              type: string
        source_type:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
        version:
          type: integer
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
        manual_text:
          type: object
        remarks:
          type: string
          nullable: true
    CertificateTypeResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        short_code:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        requires_survey:
          type: boolean
    CertificateTypeDetailResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        short_code:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
          nullable: true
        requires_survey:
          type: boolean
        CertificateRequiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/CertificateRequiredDocument'
    CertificateTypeCreateRequest:
      type: object
      required:
        - name
        - issuing_authority
        - validity_years
      properties:
        name:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
        requires_survey:
          type: boolean
          default: true
        required_documents:
          type: array
          items:
            type: object
            properties:
              document_name:
                type: string
              is_mandatory:
                type: boolean
      example:
        name: 'Safety Construction'
        issuing_authority: CLASS
        validity_years: 5
        status: ACTIVE
        description: 'Main classification certificate for construction'
        requires_survey: true
        required_documents:
          -
            document_name: 'Bill of Sale'
            is_mandatory: true
          -
            document_name: 'Builder Certificate'
            is_mandatory: false
    CertificateTypeUpdateRequest:
      type: object
      properties:
        name:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
        requires_survey:
          type: boolean
        required_documents:
          type: array
          items:
            type: object
            properties:
              document_name:
                type: string
              is_mandatory:
                type: boolean
      example:
        name: 'Safety Construction (Updated)'
