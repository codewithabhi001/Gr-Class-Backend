    ChecklistTemplateCreateRequest:
      type: object
      required:
        - name
        - code
        - sections
      description: "Body for `POST /api/v1/checklist-templates`.\nRequired: `name`, `code`, `sections`.\nOptional: `description`, `certificate_type_id`, `template_files`,\n`status`, `metadata`.\n"
      properties:
        name:
          type: string
          description: 'Human-readable template name.'
        code:
          type: string
          description: 'Stable template code (used as a stable reference).'
        description:
          type: string
          description: 'Short description of what the template covers.'
        certificate_type_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
          nullable: true
          description: "Certificate type this template applies to. When activated, the\nactive template for this certificate type drives surveyor checklists.\n"
        sections:
          type: array
          description: 'Ordered list of sections with their question items.'
          items:
            type: object
            required:
              - title
              - items
            properties:
              title:
                type: string
              items:
                type: array
                items:
                  type: object
                  required: [code, text]
                  properties: {code: {type: string, description: 'Stable per-question code (e.g. LSE001)'}, text: {type: string, description: 'Question text shown to the surveyor'}, type: {type: string, enum: [YES_NO_NA, YES_NO, PASS_FAIL, PASS_FAIL_NA, TEXT, NUMBER], default: YES_NO_NA}}
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DRAFT
          default: DRAFT
        template_files:
          type: array
          description: "S3 keys of attached reference DOCX/PDF files (each obtained from\n`GET /api/v1/checklist-templates/get-upload-url`).\n"
          items:
            type: string
        metadata:
          type: object
          description: 'Free-form JSON (e.g. `{ "version": "1.0" }`).'
    ChecklistTemplateUpdateRequest:
      type: object
      description: "Body for `PUT /api/v1/checklist-templates/{id}`. All fields are optional —\nsend only what you want to change.\n\nFor attached document keys you have THREE choices (mutually exclusive\nbetween `template_files` and the `add_*`/`remove_*` pair):\n  • `template_files`         — full replace of the entire array\n  • `add_template_files`     — append these keys\n  • `remove_template_files`  — drop these keys\n\nStructural edits (`name`, `code`, `sections`, `certificate_type_id`,\n`metadata`) require the template to be in `DRAFT`. File-key edits are\nallowed at any status.\n"
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        certificate_type_id:
          allOf:
            -
              $ref: '#/components/schemas/UUID'
          nullable: true
        sections:
          type: array
          items:
            type: object
            required:
              - title
              - items
            properties:
              title:
                type: string
              items:
                type: array
                items:
                  type: object
                  required: [code, text]
                  properties: {code: {type: string}, text: {type: string}, type: {type: string, enum: [YES_NO_NA, YES_NO, PASS_FAIL, PASS_FAIL_NA, TEXT, NUMBER], default: YES_NO_NA}}
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - DRAFT
        metadata:
          type: object
        template_files:
          type: array
          description: 'Full replace of the attached-document key list.'
          items:
            type: string
        add_template_files:
          type: array
          description: "S3 keys to append (de-duplicated). Use this to \"add a new file on\ntop\" without losing the existing ones.\n"
          items:
            type: string
        remove_template_files:
          type: array
          description: 'S3 keys to drop from the existing list.'
          items:
            type: string
