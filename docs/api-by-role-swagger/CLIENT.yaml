openapi: 3.0.3
info:
  title: 'GR-Class Marine Backend API (CLIENT view)'
  description: "Production-grade API documentation for GR-Class Marine Backend.\nUse role-specific docs: `/api-docs/admin`, `/api-docs/gm`, `/api-docs/tm`, `/api-docs/surveyor`, `/api-docs/client`,`/api-docs/public`\n\n\n**Filtered view:** Only endpoints accessible to role **CLIENT**."
  version: 1.0.0
  contact:
    name: 'GR-Class Marine'
servers:
  -
    url: /
    description: 'Relative (same host)'
  -
    url: 'http://localhost:3000'
    description: 'Local development'
security:
  -
    bearerAuth: []
tags:
  -
    name: Auth
    description: 'Authentication and session management'
  -
    name: Jobs
    description: 'Job lifecycle management'
  -
    name: Vessels
    description: 'Vessel registry and management'
  -
    name: Certificates
    description: 'Certificate management and verification'
  -
    name: Payments
    description: 'Payment and invoice management'
  -
    name: Dashboard
    description: 'Role-based dashboard data'
  -
    name: Clients
    description: 'Client management'
  -
    name: Health
    description: 'Health check'
  -
    name: Support
    description: 'Support tickets'
  -
    name: Search
    description: 'Global search'
  -
    name: Compliance
    description: 'Compliance and data export'
  -
    name: Notifications
    description: 'User notifications'
  -
    name: Users
    description: 'User management'
  -
    name: Documents
    description: 'Document upload and management'
  -
    name: System
    description: 'System administration'
  -
    name: 'Change Requests'
    description: 'Change requests'
  -
    name: Incidents
    description: 'Incident reporting'
  -
    name: 'Activity Requests'
    description: 'Activity planning requests'
  -
    name: Feedback
    description: 'Customer feedback'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token from login or refresh-token. Use in header: Authorization: Bearer &lt;accessToken&gt;'
  schemas:
    ActivityRequestCreateRequest:
      type: object
      required:
        - activity_type
        - requested_service
        - proposed_date
        - location_port
      properties:
        vessel_id:
          $ref: '#/components/schemas/UUID'
          description: 'Mandatory for CLIENT requests'
        activity_type:
          type: string
          enum:
            - INSPECTION
            - AUDIT
            - TRAINING
            - VISIT
            - OTHER
        requested_service:
          type: string
          example: 'Annual Survey'
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
          default: MEDIUM
        description:
          type: string
        location_port:
          type: string
          example: 'Port of Singapore'
        proposed_date:
          type: string
          format: date
          example: '2026-05-15'
        attachments:
          type: array
          items:
            type: string
            format: uri
    ActivityRequestDetailResponse:
      allOf:
        -
          $ref: '#/components/schemas/ActivityRequestSummary'
        -
          type: object
          properties:
            requested_by:
              $ref: '#/components/schemas/UUID'
            vessel_id:
              $ref: '#/components/schemas/UUID'
            priority:
              type: string
            description:
              type: string
            location_port:
              type: string
            linked_job_id:
              $ref: '#/components/schemas/UUID'
              nullable: true
            rejection_reason:
              type: string
              nullable: true
            attachments:
              type: array
              items:
                type: string
                format: uri
            updated_at:
              type: string
              format: date-time
            LinkedJob:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                job_status:
                  type: string
                reason:
                  type: string
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - error_code
        - trace_id
      properties:
        success:
          type: boolean
          example: false
        error_code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 'Invalid request parameters'
        errors:
          type: object
          description: 'Map of field-specific validation errors'
          example:
            email: 'Email is required'
            password: 'Password is too short'
        trace_id:
          type: string
          format: uuid
          example: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        stack:
          type: string
          description: 'Error stack trace (only in development)'
      example:
        success: false
        error_code: VALIDATION_ERROR
        message: 'Validation failed. Please correct the highlighted fields.'
        errors:
          vessel_id: 'vessel_id is required'
        trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
    ActivityRequestSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        request_number:
          type: string
        activity_type:
          type: string
        requested_service:
          type: string
        proposed_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
            - CONVERTED_TO_JOB
            - DRAFT
        Vessel:
          $ref: '#/components/schemas/VesselSummary'
        created_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@grclass.com
        password:
          type: string
          format: password
          example: SecurePass123!
      example:
        email: admin@grclass.com
        password: SecurePass123!
    LoginResponse:
      type: object
      description: 'Returns user and both tokens. Use accessToken for API calls (Bearer header); use refreshToken only at POST /auth/refresh-token. Store tokens securely.'
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'Short-lived JWT for API auth. Send in header: Authorization Bearer &lt;accessToken&gt;'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: 'Long-lived JWT; use only to get new access token via POST /auth/refresh-token'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      example:
        user:
          id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
          name: 'John Doe'
          email: admin@grclass.com
          role: CLIENT
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Logged out successfully'
        accessToken:
          type: string
          nullable: true
          description: 'Always null after logout'
        refreshToken:
          type: string
          nullable: true
          description: 'Always null after logout'
    RefreshTokenRequest:
      type: object
      description: 'Send refresh token in body (refreshToken or token). Cookie refreshToken is also accepted.'
      properties:
        refreshToken:
          type: string
          description: 'Refresh token from login/register or previous refresh'
        token:
          type: string
          description: 'Alias for refreshToken (legacy)'
    RefreshTokenResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'New short-lived access token for API calls'
        refreshToken:
          type: string
          description: 'New long-lived refresh token; store and use for next refresh'
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@grclass.com
    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: 'Reset token from email'
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
          example: SecurePass123
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
    StatusCount:
      type: object
      properties:
        status:
          type: string
          example: CREATED
        count:
          type: integer
          example: 5
    CertificateSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        created_at:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
    CertificateTypeDetailResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        short_code:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
          nullable: true
        requires_survey:
          type: boolean
        CertificateRequiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/CertificateRequiredDocument'
    CertificateResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        qr_code_url:
          type: string
          format: uri
        pdf_file_url:
          type: string
          format: uri
        uploaded_file_url:
          type: string
          nullable: true
        generated_pdf_url:
          type: string
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        issued_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        CertificateType:
          type: object
          properties:
            name:
              type: string
        Vessel:
          type: object
          properties:
            vessel_name:
              type: string
            imo_number:
              type: string
        FlagState:
          type: object
          properties:
            flag_state_name:
              type: string
        Authority:
          $ref: '#/components/schemas/CertificateAuthorityResponse'
        source_type:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
        version:
          type: integer
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
        manual_text:
          type: object
        remarks:
          type: string
          nullable: true
    CertificateHistoryResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
        changed_by_user_id:
          $ref: '#/components/schemas/UUID'
        change_reason:
          type: string
        changed_at:
          type: string
          format: date-time
    DashboardResponse:
      type: object
      description: 'Role-specific dashboard data. Structure varies by role (ADMIN, GM, TM, TO, SURVEYOR, CLIENT)'
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            stats:
              type: object
              additionalProperties: true
              description: 'Key metrics (e.g. pendingJobs, totalCertificates)'
            recentJobs:
              type: array
              items: {}
            expiringCertificates:
              type: array
              items: {}
            alerts:
              type: array
              items:
                type: object
                properties:
                  type: {type: string}
                  message: {type: string}
      example:
        success: true
        data:
          stats:
            pendingJobs: 5
            totalCertificates: 120
          recentJobs: []
          expiringCertificates: []
    IncidentListItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        reported_by:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
        status:
          type: string
          enum:
            - OPEN
            - INVESTIGATING
            - RESOLVED
            - CLOSED
        created_at:
          type: string
          format: date-time
    IncidentResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        reported_by:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - OPEN
            - INVESTIGATING
            - RESOLVED
            - CLOSED
        remarks:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        job_status:
          type: string
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        target_port:
          type: string
        target_date:
          type: string
          format: date
        priority:
          type: string
        createdAt:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
        survey:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            survey_status:
              type: string
        payment_status:
          type: string
    JobCreateRequest:
      type: object
      required:
        - vessel_id
        - certificate_type_id
        - reason
        - target_port
        - target_date
      properties:
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        reason:
          type: string
          example: 'Annual survey due'
        target_port:
          type: string
          example: Singapore
        target_date:
          type: string
          format: date
          example: '2026-03-15'
        remarks:
          type: string
        uploaded_documents:
          type: array
          items:
            type: object
            required:
              - required_document_id
              - file_url
            properties:
              required_document_id:
                $ref: '#/components/schemas/UUID'
              file_url:
                type: string
    JobResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        requested_by_user_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        reason:
          type: string
        target_port:
          type: string
        target_date:
          type: string
          format: date
        job_status:
          type: string
          enum:
            - CREATED
            - DOCUMENT_VERIFIED
            - APPROVED
            - ASSIGNED
            - SURVEY_AUTHORIZED
            - IN_PROGRESS
            - SURVEY_DONE
            - REVIEWED
            - FINALIZED
            - REWORK_REQUESTED
            - PAYMENT_DONE
            - CERTIFIED
            - REJECTED
        priority:
          type: string
          enum:
            - LOW
            - NORMAL
            - HIGH
            - URGENT
        assigned_surveyor_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        assigned_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        approved_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        generated_certificate_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        remarks:
          type: string
          nullable: true
        is_survey_required:
          type: boolean
        reschedule_count:
          type: integer
        payment_status:
          type: string
          example: UNPAID
        certificate_url:
          type: string
          format: uri
          nullable: true
        certificate_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        Vessel:
          $ref: '#/components/schemas/VesselSummary'
        CertificateType:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            issuing_authority:
              type: string
        survey:
          type: object
          properties:
            id:
              type: string
              format: uuid
            survey_status:
              type: string
            survey_statement_status:
              type: string
            started_at:
              type: string
              format: date-time
              nullable: true
            submitted_at:
              type: string
              format: date-time
              nullable: true
        Payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
        requester:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
            email:
              type: string
            role:
              type: string
        surveyor:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
            email:
              type: string
        approver:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
            role:
              type: string
      example:
        id: 019d3ac5-3464-74f9-891e-f6eda7ee366c
        job_status: ASSIGNED
        vessel_id: 019cbf1d-d9c1-732d-8d10-f866bb6e9dec
        certificate_type_id: 019cbf1d-bdc2-75e8-9fc8-3d161ae90ede
        requested_by_user_id: 019c79a4-3eee-731a-9eff-b0eed303e215
        assigned_surveyor_id: 019c79a4-4930-71fd-aa73-887301791935
        target_port: Mumbai
        target_date: '2026-12-31'
        priority: NORMAL
        createdAt: '2026-03-29T18:04:55.000Z'
        updatedAt: '2026-04-11T11:42:13.000Z'
        is_survey_required: true
        reschedule_count: 0
        Vessel:
          id: 019cbf1d-d9c1-732d-8d10-f866bb6e9dec
          vessel_name: 'MV Pacific Guardian'
          imo_number: '9876501'
          client_id: 019c79a4-3ab9-7055-a1a7-9d7332fb025e
        CertificateType:
          id: 019cbf1d-bdc2-75e8-9fc8-3d161ae90ede
          name: 'Safety Equipment Certificate'
          issuing_authority: CLASS
        survey:
          id: 019d7c59-7f7e-768d-a9a5-00cb91079432
          survey_status: NOT_STARTED
          survey_statement_status: NOT_PREPARED
        requester:
          id: 019c79a4-3eee-731a-9eff-b0eed303e215
          name: 'System Admin'
          email: admin@grclass.com
          role: ADMIN
        surveyor:
          id: 019c79a4-4930-71fd-aa73-887301791935
          name: 'Abhishek Singh'
          email: abhisheksingh@gmail.com
        approver:
          id: 019c79a4-42ee-772c-be48-490a7c1f4444
          name: 'General Manager'
          role: GM
        payment_status: N/A
    JobMessageResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        job_id:
          $ref: '#/components/schemas/UUID'
        sender_id:
          $ref: '#/components/schemas/UUID'
        message_text:
          type: string
        is_internal:
          type: boolean
        attachment_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        Sender:
          type: object
          properties:
            name:
              type: string
            role:
              type: string
    PaymentListResponse:
      type: object
      properties:
        count:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
    FinancialSummaryResponse:
      type: object
      properties:
        total_outstanding:
          type: number
        total_paid:
          type: number
        total_invoiced:
          type: number
        payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentResponse'
    PaymentResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        job_id:
          $ref: '#/components/schemas/UUID'
        invoice_number:
          type: string
        amount:
          type: number
        currency:
          type: string
        payment_status:
          type: string
          enum:
            - UNPAID
            - PARTIALLY_PAID
            - PAID
            - ON_HOLD
        payment_date:
          type: string
          format: date-time
          nullable: true
        receipt_url:
          type: string
          format: uri
          nullable: true
        verified_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        amount_collected:
          type: string
          description: 'Total collected via advance + partial payments'
        refunded_amount:
          type: string
        amount_paid:
          type: string
        net_amount:
          type: string
        remaining:
          type: string
          description: 'Remaining amount to be collected'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        JobRequest:
          type: object
          properties:
            id:
              type: string
              format: uuid
            job_status:
              type: string
            Vessel:
              type: object
              properties:
                vessel_name:
                  type: string
    PortfolioFeedbackInput:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        designation:
          type: string
        company:
          type: string
    PortfolioFeedbackPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        comment:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        designation:
          type: string
        company:
          type: string
        created_at:
          type: string
