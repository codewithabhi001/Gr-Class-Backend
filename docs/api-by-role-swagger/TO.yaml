openapi: 3.0.3
info:
  title: 'GR-Class Marine Backend API (TO view)'
  description: "Production-grade API documentation for GR-Class Marine Backend.\nUse role-specific docs: `/api-docs/admin`, `/api-docs/gm`, `/api-docs/tm`, `/api-docs/surveyor`, `/api-docs/client`,`/api-docs/public`\n\n\n**Filtered view:** Only endpoints accessible to role **TO**."
  version: 1.0.0
  contact:
    name: 'GR-Class Marine'
servers:
  -
    url: /
    description: 'Relative (same host)'
  -
    url: 'http://localhost:3000'
    description: 'Local development'
security:
  -
    bearerAuth: []
tags:
  -
    name: Auth
    description: 'Authentication and session management'
  -
    name: Jobs
    description: 'Job lifecycle management'
  -
    name: Vessels
    description: 'Vessel registry and management'
  -
    name: Certificates
    description: 'Certificate management and verification'
  -
    name: Dashboard
    description: 'Role-based dashboard data'
  -
    name: Clients
    description: 'Client management'
  -
    name: Health
    description: 'Health check'
  -
    name: Surveys
    description: 'Survey management'
  -
    name: Checklists
    description: 'Checklist operations'
  -
    name: 'Checklist Templates'
    description: 'Checklist template management'
  -
    name: Support
    description: 'Support tickets'
  -
    name: Search
    description: 'Global search'
  -
    name: Notifications
    description: 'User notifications'
  -
    name: Users
    description: 'User management'
  -
    name: Documents
    description: 'Document upload and management'
  -
    name: System
    description: 'System administration'
  -
    name: Non-Conformities
    description: 'NC management'
  -
    name: Flags
    description: 'Flag administration'
  -
    name: Incidents
    description: 'Incident reporting'
  -
    name: 'Activity Requests'
    description: 'Activity planning requests'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token from login or refresh-token. Use in header: Authorization: Bearer &lt;accessToken&gt;'
  schemas:
    ActivityRequestSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        request_number:
          type: string
        activity_type:
          type: string
        requested_service:
          type: string
        proposed_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
            - CONVERTED_TO_JOB
            - DRAFT
        Vessel:
          $ref: '#/components/schemas/VesselSummary'
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - error_code
        - trace_id
      properties:
        success:
          type: boolean
          example: false
        error_code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 'Invalid request parameters'
        errors:
          type: object
          description: 'Map of field-specific validation errors'
          example:
            email: 'Email is required'
            password: 'Password is too short'
        trace_id:
          type: string
          format: uuid
          example: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        stack:
          type: string
          description: 'Error stack trace (only in development)'
      example:
        success: false
        error_code: VALIDATION_ERROR
        message: 'Validation failed. Please correct the highlighted fields.'
        errors:
          vessel_id: 'vessel_id is required'
        trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
    ActivityRequestDetailResponse:
      allOf:
        -
          $ref: '#/components/schemas/ActivityRequestSummary'
        -
          type: object
          properties:
            requested_by:
              $ref: '#/components/schemas/UUID'
            vessel_id:
              $ref: '#/components/schemas/UUID'
            priority:
              type: string
            description:
              type: string
            location_port:
              type: string
            linked_job_id:
              $ref: '#/components/schemas/UUID'
              nullable: true
            rejection_reason:
              type: string
              nullable: true
            attachments:
              type: array
              items:
                type: string
                format: uri
            updated_at:
              type: string
              format: date-time
            LinkedJob:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                job_status:
                  type: string
                reason:
                  type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@grclass.com
        password:
          type: string
          format: password
          example: SecurePass123!
      example:
        email: admin@grclass.com
        password: SecurePass123!
    LoginResponse:
      type: object
      description: 'Returns user and both tokens. Use accessToken for API calls (Bearer header); use refreshToken only at POST /auth/refresh-token. Store tokens securely.'
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'Short-lived JWT for API auth. Send in header: Authorization Bearer &lt;accessToken&gt;'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: 'Long-lived JWT; use only to get new access token via POST /auth/refresh-token'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      example:
        user:
          id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
          name: 'John Doe'
          email: admin@grclass.com
          role: CLIENT
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Logged out successfully'
        accessToken:
          type: string
          nullable: true
          description: 'Always null after logout'
        refreshToken:
          type: string
          nullable: true
          description: 'Always null after logout'
    RefreshTokenRequest:
      type: object
      description: 'Send refresh token in body (refreshToken or token). Cookie refreshToken is also accepted.'
      properties:
        refreshToken:
          type: string
          description: 'Refresh token from login/register or previous refresh'
        token:
          type: string
          description: 'Alias for refreshToken (legacy)'
    RefreshTokenResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'New short-lived access token for API calls'
        refreshToken:
          type: string
          description: 'New long-lived refresh token; store and use for next refresh'
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@grclass.com
    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: 'Reset token from email'
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
          example: SecurePass123
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
    StatusCount:
      type: object
      properties:
        status:
          type: string
          example: CREATED
        count:
          type: integer
          example: 5
    CertificateSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        created_at:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
    CertificateTypeDetailResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        short_code:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
          nullable: true
        requires_survey:
          type: boolean
        CertificateRequiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/CertificateRequiredDocument'
    CertificateResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        qr_code_url:
          type: string
          format: uri
        pdf_file_url:
          type: string
          format: uri
        uploaded_file_url:
          type: string
          nullable: true
        generated_pdf_url:
          type: string
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        issued_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        CertificateType:
          type: object
          properties:
            name:
              type: string
        Vessel:
          type: object
          properties:
            vessel_name:
              type: string
            imo_number:
              type: string
        FlagState:
          type: object
          properties:
            flag_state_name:
              type: string
        Authority:
          $ref: '#/components/schemas/CertificateAuthorityResponse'
        source_type:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
        version:
          type: integer
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
        manual_text:
          type: object
        remarks:
          type: string
          nullable: true
    CertificateHistoryResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
        changed_by_user_id:
          $ref: '#/components/schemas/UUID'
