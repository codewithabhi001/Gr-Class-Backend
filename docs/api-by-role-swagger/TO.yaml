paths:
  /api/v1/activity-requests:
    get:
      tags:
        - 'Activity Requests'
      summary: 'Get activity requests (List)'
      description: 'Returns a list of activity requests with minimal details.'
      operationId: getActivityRequests
      x-roles:
        - CLIENT
        - ADMIN
        - GM
        - TM
        - TO
      parameters:
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
        -
          name: limit
          in: query
          schema:
            type: integer
            default: 10
        -
          name: status
          in: query
          schema:
            type: string
            enum:
              - PENDING
              - APPROVED
              - REJECTED
              - CONVERTED_TO_JOB
              - DRAFT
      responses:
        '200':
          description: 'List of requests'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data: {type: array, items: {$ref: '#/components/schemas/ActivityRequestSummary'}}
              example:
                success: true
                data:
                  - {id: 019d81ef-f655-76a2-a6ea-7b9d4ca5cdbc, request_number: AR-2026-0001, activity_type: INSPECTION, requested_service: 'Annual Survey', proposed_date: '2026-05-15T00:00:00.000Z', status: PENDING, Vessel: null, created_at: '2026-04-12T13:44:40.000Z'}
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
  '/api/v1/activity-requests/{id}':
    get:
      tags:
        - 'Activity Requests'
      summary: 'Get request by ID (Detailed)'
      description: 'Returns full details of an activity request including associations.'
      operationId: getActivityRequestById
      x-roles:
        - CLIENT
        - ADMIN
        - GM
        - TM
        - TO
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Request details'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data: {$ref: '#/components/schemas/ActivityRequestDetailResponse'}
              example:
                success: true
                data:
                  id: 019d81ef-f655-76a2-a6ea-7b9d4ca5cdbc
                  request_number: AR-2026-0001
                  requested_by: 019c79a4-4475-729b-ae3e-98373803b963
                  vessel_id: null
                  activity_type: INSPECTION
                  requested_service: 'Annual Survey'
                  priority: MEDIUM
                  description: 'Testing API response capture'
                  location_port: 'Port of Singapore'
                  proposed_date: '2026-05-15T00:00:00.000Z'
                  status: PENDING
                  linked_job_id: null
                  rejection_reason: null
                  attachments: []
                  createdAt: '2026-04-12T13:44:40.000Z'
                  updatedAt: '2026-04-12T13:44:40.000Z'
                  Vessel: null
                  LinkedJob: null
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        '404':
          description: 'Not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: "Authenticate with email and password. Returns user, **accessToken** (short-lived, for API calls), and **refreshToken** (long-lived, for getting new access tokens).\nUse **accessToken** in header: `Authorization: Bearer &lt;accessToken&gt;`. Store tokens securely.\n"
      security: []
      operationId: login
      x-roles:
        - PUBLIC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@grclass.com
              password: Password@123
      responses:
        '200':
          description: 'Login successful'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                user:
                  id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
                  name: 'John Doe'
                  email: admin@grclass.com
                  role: CLIENT
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        '401':
          description: 'Invalid credentials'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: 'Invalid email or password'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: 'Invalidate current session. Clears tokens; response includes accessToken and refreshToken as null.'
      operationId: logout
      x-roles:
        - ADMIN
        - GM
        - TM
        - TO
        - SURVEYOR
        - CLIENT
      responses:
        '200':
          description: 'Logged out successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
              example:
                message: 'Logged out successfully'
                accessToken: null
                refreshToken: null
        '401':
          description: 'Not authenticated'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
  /api/v1/auth/refresh-token:
    post:
      tags:
        - Auth
      summary: 'Refresh token'
      description: "Get new **accessToken** and **refreshToken** using a valid refresh token. Send refresh token in body (`refreshToken` or `token`) or in cookie. Response returns both tokens.\n"
      security: []
      operationId: refreshToken
      x-roles:
        - PUBLIC
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: 'Tokens refreshed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
              example:
                user:
                  id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
                  name: 'John Doe'
                  email: admin@grclass.com
                  role: CLIENT
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: 'Invalid or expired refresh token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
  /api/v1/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: 'Forgot password'
      description: 'Request password reset email.'
      security: []
      operationId: forgotPassword
      x-roles:
        - PUBLIC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
