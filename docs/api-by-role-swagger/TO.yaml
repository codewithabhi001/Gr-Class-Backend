        '400':
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
