  '/api/v1/surveys/jobs/{jobId}/statement/draft':
    post:
      tags:
        - Surveys
      summary: 'Draft survey statement / Generate Preview'
      description: "Saves the survey statement text and/or triggers report generation.\n- **SURVEYOR**: Required to provide `survey_statement` text. Cannot see the PDF.\n- **TM/ADMIN**: Can provide new text OR leave it empty to trigger/refresh the branded \"**DRAFT**\" PDF using existing findings.\n"
      operationId: draftSurveyStatement
      x-roles:
        - SURVEYOR
        - TM
        - ADMIN
      parameters:
        -
          name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                survey_statement:
                  type: string
                  description: 'Text findings. Required for surveyors; optional for management to trigger PDF.'
            example:
              survey_statement: string
      responses:
        '200':
          description: 'Success. Returns message and, for management, the signed PDF URL.'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
                  data: {type: object, properties: {message: {type: string}, status: {type: string, example: DRAFTED}, pdf_url: {type: string, format: uri, description: 'Only returned for TM/ADMIN'}}}
              example:
                success: true
                data:
                  message: string
                  status: DRAFTED
                  pdf_url: 'https://example.com/resource'
