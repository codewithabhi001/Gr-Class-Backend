              example:
                success: true
                message: 'Request successful'
        '400':
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
  /api/v1/certificates:
    get:
      tags:
        - Certificates
      summary: 'List certificates'
      description: "List certificates with strict RBAC and ownership filtering.\n**Access:**\n- **ADMIN / GM / TM / TO:** All certificates.\n- **SURVEYOR:** Only certificates for vessels in jobs assigned to them.\n- **CLIENT:** Only certificates for their own company vessels.\n"
      security:
        -
          bearerAuth: []
      operationId: getCertificates
      x-roles:
        - CLIENT
        - ADMIN
        - GM
        - TM
        - TO
        - SURVEYOR
      parameters:
        -
          name: page
          in: query
          schema:
            type: integer
            default: 1
        -
          name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 'List of certificates'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
                  data: {type: object, properties: {total: {type: integer, example: 100}, page: {type: integer, example: 1}, limit: {type: integer, example: 20}, totalPages: {type: integer, example: 5}, status_counts: {type: array, items: {$ref: '#/components/schemas/StatusCount'}}, rows: {type: array, items: {$ref: '#/components/schemas/CertificateSummary'}}}}
              example:
                success: true
                data:
                  total: 100
                  page: 1
                  limit: 20
                  totalPages: 5
                  status_counts: [{status: CREATED, count: 5}]
                  rows: [{id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f, vessel_id: string, certificate_type_id: string, certificate_number: string, issue_date: '2026-03-15', expiry_date: '2026-03-15', status: DRAFT, created_at: '2026-03-15T10:00:00.000Z', Vessel: {id: string, vessel_name: string, imo_number: string}, CertificateType: {id: string, name: string}}]
