  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: "Authenticate with email and password. Returns user, **accessToken** (short-lived, for API calls), and **refreshToken** (long-lived, for getting new access tokens).\nUse **accessToken** in header: `Authorization: Bearer &lt;accessToken&gt;`. Store tokens securely.\n\n\n**Note:** Default credentials for **GM** have been pre-filled for testing."
      security: []
      operationId: login
      x-roles:
        - PUBLIC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: gm@grclass.com
              password: Password@123
      responses:
        '200':
          description: 'Login successful'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                user:
                  id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
                  name: 'John Doe'
                  email: admin@grclass.com
                  role: CLIENT
                accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: 'Validation error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error_code: VALIDATION_ERROR
                message: 'Validation failed. Please correct the highlighted fields.'
                errors:
                  vessel_id: 'vessel_id is required'
                trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        '401':
          description: 'Invalid credentials'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: 'Invalid email or password'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: 'Invalidate current session. Clears tokens; response includes accessToken and refreshToken as null.'
      operationId: logout
      x-roles:
        - ADMIN
        - GM
        - TM
        - TO
        - SURVEYOR
        - CLIENT
      responses:
