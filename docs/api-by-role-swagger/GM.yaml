  /api/v1/jobs:
    get:
      tags:
        - Jobs
      summary: 'List jobs (role-filtered)'
      description: "Returns a paginated list of job requests. Visible set depends on caller role:\n- **CLIENT** – Only jobs for their fleet (vessel_id filtered to client).\n- **SURVEYOR** – Only jobs assigned to them (`assigned_surveyor_id = me`).\n- **ADMIN / GM / TM / TO** – All jobs; defaults to last 30 days\n  unless explicit filters are supplied.\n\nSupply `status` as a **comma-separated** string to filter by multiple statuses,\ne.g. `?status=ASSIGNED,SURVEY_AUTHORIZED`.\n"
      operationId: getJobs
      x-roles:
        - CLIENT
        - ADMIN
        - GM
        - TM
        - TO
        - SURVEYOR
      parameters:
        -
          name: page
          in: query
          description: 'Page number (1-indexed)'
          schema:
            type: integer
            default: 1
        -
          name: limit
          in: query
          description: 'Records per page'
          schema:
            type: integer
            default: 10
        -
          name: status
          in: query
          description: 'Filter by status (single value or comma-separated list)'
          schema:
            type: string
            example: 'ASSIGNED,SURVEY_AUTHORIZED'
        -
          name: vessel_id
          in: query
          schema:
            type: string
            format: uuid
        -
          name: certificate_type_id
          in: query
          schema:
            type: string
            format: uuid
        -
          name: assigned_surveyor_id
          in: query
          schema:
            type: string
            format: uuid
        -
          name: target_port
          in: query
          schema:
            type: string
            example: Singapore
        -
          name: created_from
          in: query
          description: 'ISO date string – start of creation window'
          schema:
            type: string
            format: date
        -
          name: created_to
          in: query
          description: 'ISO date string – end of creation window'
          schema:
            type: string
            format: date
        -
          name: recent_days
          in: query
          description: "(Internal roles only) Shortcut to filter to last N days when no other date\nfilter is given. Default is 30.\n"
          schema:
            type: integer
            example: 30
      responses:
        '200':
          description: 'List of jobs'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
                  data: {type: object, properties: {total: {type: integer, example: 48}, page: {type: integer, example: 1}, limit: {type: integer, example: 10}, totalPages: {type: integer, example: 5}, status_counts: {type: array, items: {$ref: '#/components/schemas/StatusCount'}}, jobs: {type: array, items: {$ref: '#/components/schemas/JobSummary'}}}}
              example:
                success: true
                data:
                  total: 48
                  page: 1
