openapi: 3.0.3
info:
  title: 'GR-Class Marine Backend API (GM view)'
  description: "Production-grade API documentation for GR-Class Marine Backend.\nUse role-specific docs: `/api-docs/admin`, `/api-docs/gm`, `/api-docs/tm`, `/api-docs/surveyor`, `/api-docs/client`,`/api-docs/public`\n\n\n**Filtered view:** Only endpoints accessible to role **GM**."
  version: 1.0.0
  contact:
    name: 'GR-Class Marine'
servers:
  -
    url: /
    description: 'Relative (same host)'
  -
    url: 'http://localhost:3000'
    description: 'Local development'
security:
  -
    bearerAuth: []
tags:
  -
    name: Auth
    description: 'Authentication and session management'
  -
    name: Jobs
    description: 'Job lifecycle management'
  -
    name: Vessels
    description: 'Vessel registry and management'
  -
    name: Certificates
    description: 'Certificate management and verification'
  -
    name: Payments
    description: 'Payment and invoice management'
  -
    name: Dashboard
    description: 'Role-based dashboard data'
  -
    name: Clients
    description: 'Client management'
  -
    name: Health
    description: 'Health check'
  -
    name: Surveys
    description: 'Survey management'
  -
    name: Surveyors
    description: 'Surveyor management'
  -
    name: Checklists
    description: 'Checklist operations'
  -
    name: 'Checklist Templates'
    description: 'Checklist template management'
  -
    name: Support
    description: 'Support tickets'
  -
    name: Search
    description: 'Global search'
  -
    name: Notifications
    description: 'User notifications'
  -
    name: Users
    description: 'User management'
  -
    name: Documents
    description: 'Document upload and management'
  -
    name: System
    description: 'System administration'
  -
    name: Reports
    description: Reports
  -
    name: Non-Conformities
    description: 'NC management'
  -
    name: TOCA
    description: 'Transfer of Class'
  -
    name: Flags
    description: 'Flag administration'
  -
    name: Approvals
    description: 'Approval workflows'
  -
    name: 'Change Requests'
    description: 'Change requests'
  -
    name: 'Certificate Templates'
    description: 'Certificate template management'
  -
    name: Incidents
    description: 'Incident reporting'
  -
    name: 'Activity Requests'
    description: 'Activity planning requests'
  -
    name: Feedback
    description: 'Customer feedback'
  -
    name: Contact
    description: 'Website contact / enquiry management'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token from login or refresh-token. Use in header: Authorization: Bearer &lt;accessToken&gt;'
  schemas:
    ActivityRequestCreateRequest:
      type: object
      required:
        - activity_type
        - requested_service
        - proposed_date
        - location_port
      properties:
        vessel_id:
          $ref: '#/components/schemas/UUID'
          description: 'Mandatory for CLIENT requests'
        activity_type:
          type: string
          enum:
            - INSPECTION
            - AUDIT
            - TRAINING
            - VISIT
            - OTHER
        requested_service:
          type: string
          example: 'Annual Survey'
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - URGENT
          default: MEDIUM
        description:
          type: string
        location_port:
          type: string
          example: 'Port of Singapore'
        proposed_date:
          type: string
          format: date
          example: '2026-05-15'
        attachments:
          type: array
          items:
            type: string
            format: uri
    ActivityRequestDetailResponse:
      allOf:
        -
          $ref: '#/components/schemas/ActivityRequestSummary'
        -
          type: object
          properties:
            requested_by:
              $ref: '#/components/schemas/UUID'
            vessel_id:
              $ref: '#/components/schemas/UUID'
            priority:
              type: string
            description:
              type: string
            location_port:
              type: string
            linked_job_id:
              $ref: '#/components/schemas/UUID'
              nullable: true
            rejection_reason:
              type: string
              nullable: true
            attachments:
              type: array
              items:
                type: string
                format: uri
            updated_at:
              type: string
              format: date-time
            LinkedJob:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                job_status:
                  type: string
                reason:
                  type: string
    ErrorResponse:
      type: object
      required:
        - success
        - message
        - error_code
        - trace_id
      properties:
        success:
          type: boolean
          example: false
        error_code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 'Invalid request parameters'
        errors:
          type: object
          description: 'Map of field-specific validation errors'
          example:
            email: 'Email is required'
            password: 'Password is too short'
        trace_id:
          type: string
          format: uuid
          example: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
        stack:
          type: string
          description: 'Error stack trace (only in development)'
      example:
        success: false
        error_code: VALIDATION_ERROR
        message: 'Validation failed. Please correct the highlighted fields.'
        errors:
          vessel_id: 'vessel_id is required'
        trace_id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
    ActivityRequestSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        request_number:
          type: string
        activity_type:
          type: string
        requested_service:
          type: string
        proposed_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
            - CONVERTED_TO_JOB
            - DRAFT
        Vessel:
          $ref: '#/components/schemas/VesselSummary'
        created_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@grclass.com
        password:
          type: string
          format: password
          example: SecurePass123!
      example:
        email: admin@grclass.com
        password: SecurePass123!
    LoginResponse:
      type: object
      description: 'Returns user and both tokens. Use accessToken for API calls (Bearer header); use refreshToken only at POST /auth/refresh-token. Store tokens securely.'
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'Short-lived JWT for API auth. Send in header: Authorization Bearer &lt;accessToken&gt;'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: 'Long-lived JWT; use only to get new access token via POST /auth/refresh-token'
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      example:
        user:
          id: 01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f
          name: 'John Doe'
          email: admin@grclass.com
          role: CLIENT
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Logged out successfully'
        accessToken:
          type: string
          nullable: true
          description: 'Always null after logout'
        refreshToken:
          type: string
          nullable: true
          description: 'Always null after logout'
    RefreshTokenRequest:
      type: object
      description: 'Send refresh token in body (refreshToken or token). Cookie refreshToken is also accepted.'
      properties:
        refreshToken:
          type: string
          description: 'Refresh token from login/register or previous refresh'
        token:
          type: string
          description: 'Alias for refreshToken (legacy)'
    RefreshTokenResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        accessToken:
          type: string
          description: 'New short-lived access token for API calls'
        refreshToken:
          type: string
          description: 'New long-lived refresh token; store and use for next refresh'
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@grclass.com
    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: 'Reset token from email'
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
          example: SecurePass123
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          format: password
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
    StatusCount:
      type: object
      properties:
        status:
          type: string
          example: CREATED
        count:
          type: integer
          example: 5
    CertificateSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        created_at:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
    GenerateCertificateRequest:
      type: object
      required:
        - job_id
      properties:
        job_id:
          $ref: '#/components/schemas/UUID'
        validity_years:
          type: integer
          minimum: 1
          maximum: 5
          default: 1
        certificate_authority_id:
          $ref: '#/components/schemas/UUID'
        flag_administration_id:
          $ref: '#/components/schemas/UUID'
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
    CertificateResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        status:
          type: string
          enum:
            - DRAFT
            - ISSUED
            - VALID
            - EXPIRED
            - SUSPENDED
            - REVOKED
        qr_code_url:
          type: string
          format: uri
        pdf_file_url:
          type: string
          format: uri
        uploaded_file_url:
          type: string
          nullable: true
        generated_pdf_url:
          type: string
          nullable: true
        issued_at:
          type: string
          format: date-time
          nullable: true
        issued_by_user_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        CertificateType:
          type: object
          properties:
            name:
              type: string
        Vessel:
          type: object
          properties:
            vessel_name:
              type: string
            imo_number:
              type: string
        FlagState:
          type: object
          properties:
            flag_state_name:
              type: string
        Authority:
          $ref: '#/components/schemas/CertificateAuthorityResponse'
        source_type:
          type: string
          enum:
            - INTERNAL
            - EXTERNAL
        version:
          type: integer
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
        manual_text:
          type: object
        remarks:
          type: string
          nullable: true
    UploadExternalCertificateRequest:
      type: object
      required:
        - certificate_type_id
        - certificate_number
        - issue_date
        - expiry_date
        - s3_key
      properties:
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        certificate_authority_id:
          $ref: '#/components/schemas/UUID'
        certificate_number:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        s3_key:
          type: string
    CertificateTypeDetailResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        short_code:
          type: string
        issuing_authority:
          type: string
          enum:
            - CLASS
            - FLAG
        validity_years:
          type: integer
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        description:
          type: string
          nullable: true
        requires_survey:
          type: boolean
        CertificateRequiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/CertificateRequiredDocument'
    RenewCertRequest:
      type: object
      required:
        - validity_years
        - reason
      properties:
        validity_years:
          type: integer
          minimum: 1
          maximum: 5
        reason:
          type: string
    CertActionRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
    CertificateHistoryResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        status:
          type: string
        changed_by_user_id:
          $ref: '#/components/schemas/UUID'
        change_reason:
          type: string
        changed_at:
          type: string
          format: date-time
    UpdateCertificateDraftRequest:
      type: object
      properties:
        flag_administration_id:
          $ref: '#/components/schemas/UUID'
        certificate_authority_id:
          $ref: '#/components/schemas/UUID'
        certificate_term:
          type: string
          enum:
            - FULL_TERM
            - SHORT_TERM
        manual_text:
          type: object
        remarks:
          type: string
        issue_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
    CertificateAuthorityResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        code:
          type: string
        country:
          type: string
        logo_url:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
    ChecklistResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistItemResponse'
    ClientListItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        company_name:
          type: string
        company_code:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
        has_user:
          type: boolean
    ClientCreateRequest:
      type: object
      required:
        - company_name
        - company_code
        - email
      properties:
        company_name:
          type: string
          example: 'Marine Shipping Co'
        company_code:
          type: string
          example: MSC001
        email:
          type: string
          format: email
          example: contact@marineshipping.com
        address:
          type: string
        country:
          type: string
        phone:
          type: string
        contact_person_name:
          type: string
        contact_person_email:
          type: string
          format: email
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        user:
          type: object
          required:
            - name
            - email
            - password
          properties:
            name:
              type: string
            email:
              type: string
              format: email
            password:
              type: string
              format: password
              minLength: 8
              pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
              example: SecurePass123
            role:
              type: string
              enum:
                - CLIENT
                - ADMIN
                - GM
                - TM
                - TO
                - SURVEYOR
              default: CLIENT
            phone:
              type: string
      example:
        company_name: 'Marine Shipping Co'
        company_code: MSC001
        email: contact@marineshipping.com
    ClientResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        company_name:
          type: string
        company_code:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
        country:
          type: string
        phone:
          type: string
        contact_person_name:
          type: string
        contact_person_email:
          type: string
          format: email
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        has_user:
          type: boolean
        created_at:
          type: string
          format: date-time
    WebsiteContactListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        company:
          type: string
          nullable: true
        corporate_email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        subject:
          type: string
          nullable: true
        source_page:
          type: string
        status:
          type: string
          enum:
            - NEW
            - READ
            - REPLIED
            - ARCHIVED
        internal_note:
          type: string
          nullable: true
        replied_by:
          type: string
          format: uuid
          nullable: true
        replied_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        Responder:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            email:
              type: string
    WebsiteContact:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        full_name:
          type: string
          example: 'John Maritime'
        company:
          type: string
          example: 'Pacific Shipping Co. Ltd'
        corporate_email:
          type: string
          format: email
          example: john@pacificshipping.com
        message:
          type: string
          example: 'We are interested in classification services for our fleet.'
        phone:
          type: string
          example: '+91 98765 43210'
        subject:
          type: string
          example: 'Fleet Classification Inquiry'
        status:
          type: string
          enum:
            - NEW
            - READ
            - REPLIED
            - ARCHIVED
          example: NEW
        internal_note:
          type: string
          nullable: true
          example: 'Responded via email on 20 Feb 2026.'
        replied_by:
          type: string
          format: uuid
          nullable: true
        replied_at:
          type: string
          format: date-time
          nullable: true
        ip_address:
          type: string
          nullable: true
          example: 192.168.1.1
        source_page:
          type: string
          example: CONTACT
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        Responder:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: 'Admin User'
            email:
              type: string
              example: admin@grclass.com
    DashboardResponse:
      type: object
      description: 'Role-specific dashboard data. Structure varies by role (ADMIN, GM, TM, TO, SURVEYOR, CLIENT)'
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            stats:
              type: object
              additionalProperties: true
              description: 'Key metrics (e.g. pendingJobs, totalCertificates)'
            recentJobs:
              type: array
              items: {}
            expiringCertificates:
              type: array
              items: {}
            alerts:
              type: array
              items:
                type: object
                properties:
                  type: {type: string}
                  message: {type: string}
      example:
        success: true
        data:
          stats:
            pendingJobs: 5
            totalCertificates: 120
          recentJobs: []
          expiringCertificates: []
    CustomerFeedbackListResponse:
      type: object
      properties:
        count:
          type: integer
        rows:
          type: array
          items:
            $ref: '#/components/schemas/CustomerFeedbackListItem'
    CustomerFeedbackResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/CustomerFeedback'
    FlagAdministrationListItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        flag_state_name:
          type: string
        country:
          type: string
        authority_name:
          type: string
        contact_email:
          type: string
          format: email
        logo_url:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
    IncidentListItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        reported_by:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
        status:
          type: string
          enum:
            - OPEN
            - INVESTIGATING
            - RESOLVED
            - CLOSED
        created_at:
          type: string
          format: date-time
    IncidentResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        reported_by:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - OPEN
            - INVESTIGATING
            - RESOLVED
            - CLOSED
        remarks:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobSummary:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        job_status:
          type: string
        vessel_id:
          $ref: '#/components/schemas/UUID'
        certificate_type_id:
          $ref: '#/components/schemas/UUID'
        target_port:
          type: string
        target_date:
          type: string
          format: date
        priority:
          type: string
        createdAt:
          type: string
          format: date-time
        Vessel:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            vessel_name:
              type: string
            imo_number:
              type: string
        CertificateType:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            name:
              type: string
        survey:
          type: object
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            survey_status:
              type: string
        payment_status:
          type: string
    JobCreateRequest:
      type: object
      required:
