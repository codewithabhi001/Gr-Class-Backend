# ─────────────────────────────────────────────────────────────────────────────
# Jobs — Certificate-scoped workflow (multi-certificate jobs)
#
# Use these endpoints when a job has one or more JobCertificate rows. Each cert
# has its own surveyor, document verification, authorization, and TO review.
# OpenAPI module file: jobs-certificate-workflow.json (generated separately).
# ─────────────────────────────────────────────────────────────────────────────

/api/v1/jobs/certificates/{jobCertificateId}/verify-documents:
  put:
    tags: [Jobs]
    summary: "TO/GM/ADMIN: Verify documents for one certificate"
    description: |
      Approves or rejects uploaded documents for a **single** `JobCertificate`.

      - Cert status: `PENDING` or `REWORK_REQUESTED` → `DOCUMENT_VERIFIED` (approve all).
      - Parent job: moves to `IN_PROGRESS` when any certificate is verified.
      - Reject specific docs: cert stays pending; client re-uploads via job documents API.

      **Roles:** TO, GM, ADMIN
    operationId: verifyJobCertificateDocuments
    x-roles: [TO, GM, ADMIN]
    parameters:
      - name: jobCertificateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              approved: { type: boolean, default: true }
              rejected_documents:
                type: array
                items:
                  type: object
                  properties:
                    document_id: { type: string, format: uuid }
                    reason: { type: string }
    responses:
      "200": { description: Documents processed for this certificate }
      "400": { description: Cert not in PENDING/REWORK_REQUESTED or missing mandatory docs }
      "404": { description: Certificate not found }

/api/v1/jobs/certificates/{jobCertificateId}/assign:
  put:
    tags: [Jobs]
    summary: "GM/ADMIN: Assign surveyor to one certificate (split assignment)"
    description: |
      Assigns a surveyor to **one** certificate row. Use `PUT /jobs/{id}/assign` to
      assign the same surveyor to **all** certificates on the job.

      Updates `JobCertificate.assigned_surveyor_id` and the linked `Survey.surveyor_id`
      if a survey record already exists.

      **Roles:** ADMIN, GM
    operationId: assignSurveyorToCertificate
    x-roles: [ADMIN, GM]
    parameters:
      - name: jobCertificateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [surveyorId]
            properties:
              surveyorId: { type: string, format: uuid }
    responses:
      "200": { description: Surveyor assigned to certificate }
      "400": { description: Invalid or ineligible surveyor }
      "404": { description: Certificate not found }

/api/v1/jobs/certificates/{jobCertificateId}/reassign:
  put:
    tags: [Jobs]
    summary: "GM/TM/ADMIN: Reassign surveyor on one certificate"
    description: |
      Changes the surveyor on a single certificate without changing job status.
      Use `PUT /jobs/{id}/reassign` to reassign **all** certificates at once.

      **Roles:** ADMIN, GM, TM
    operationId: reassignSurveyorToCertificate
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: jobCertificateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [surveyorId, reason]
            properties:
              surveyorId: { type: string, format: uuid }
              reason: { type: string, minLength: 1 }
    responses:
      "200": { description: Surveyor reassigned for certificate }
      "403": { description: Forbidden }
      "404": { description: Certificate not found }

/api/v1/jobs/certificates/{jobCertificateId}/authorize-survey:
  put:
    tags: [Jobs]
    summary: "TM/ADMIN: Authorize field survey for one certificate"
    description: |
      Cert must have an assigned surveyor. Transition: `DOCUMENT_VERIFIED` →
      `SURVEY_AUTHORIZED`. Pre-creates the `Survey` row for this certificate.

      **Roles:** ADMIN, TM
    operationId: authorizeSurveyForCertificate
    x-roles: [ADMIN, TM]
    parameters:
      - name: jobCertificateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string }
    responses:
      "200": { description: Survey authorized for certificate }
      "400": { description: No surveyor assigned or invalid cert status }

/api/v1/jobs/certificates/{jobCertificateId}/review:
  put:
    tags: [Jobs]
    summary: "TO: Technical review for one certificate (post-survey)"
    description: |
      TO reviews checklist/signed documents after survey submit (`SURVEY_DONE`).
      Does not add a separate `REVIEWED` cert enum — cert remains `SURVEY_DONE`
      until TM finalizes the survey.

      **Roles:** TO
    operationId: reviewJobCertificate
    x-roles: [TO]
    parameters:
      - name: jobCertificateId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, minLength: 10 }
    responses:
      "200": { description: Technical review recorded }
      "400": { description: Cert not in SURVEY_DONE }
