/api/v1/clients:
  get:
    tags: [Clients]
    summary: List clients
    description: List all clients. ADMIN, GM, TM, TO only.
    operationId: getClients
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: List of clients
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/ClientListItem'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  post:
    tags: [Clients]
    summary: Create client
    description: Create a new client. ADMIN, GM, TM only.
    operationId: createClient
    x-roles: [ADMIN, GM, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClientCreateRequest'
          example:
            company_name: "Marine Shipping Co"
            company_code: "MSC001"
            email: "contact@marineshipping.com"
    responses:
      "201":
        description: Client created
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/ClientResponse'
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/clients/profile:
  get:
    tags: [Clients]
    summary: Get client profile
    description: Get current user's client profile. CLIENT role only.
    operationId: getClientProfile
    x-roles: [CLIENT]
    responses:
      "200":
        description: Client profile
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/ClientResponse'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  put:
    tags: [Clients]
    summary: Update client profile
    description: Update current user's client profile. CLIENT role only.
    operationId: updateClientProfile
    x-roles: [CLIENT]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              company_name:
                type: string
              contact_person_name:
                type: string
              contact_person_email:
                type: string
              phone:
                type: string
          example:
            company_name: "Marine Shipping Co"
            contact_person_name: "John Smith"
            contact_person_email: "john@marineshipping.com"
            phone: "+65 6123 4567"
    responses:
      "200":
        description: Profile updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/ClientResponse'

/api/v1/clients/profile/documents:
  get:
    tags: [Clients, Documents]
    summary: Get client profile documents
    description: Get all documents related to the current client (Vessels, Jobs, Surveys, Profile). CLIENT role only.
    operationId: getClientProfileDocuments
    x-roles: [CLIENT]
    responses:
      "200":
        description: List of documents
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                count:
                  type: integer
                  example: 5
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      entity_type: { type: string, example: "JOB" }
                      entity_id: { type: string, format: uuid }
                      entity_name: { type: string, description: "Friendly name of the entity" }
                      document_type: { type: string }
                      signedUrl: { type: string, description: "Secure URL to view file" }
                      fileName: { type: string }
                      expiresAt: { type: string, format: date-time }
                      uploaded_at: { type: string, format: date-time }

/api/v1/clients/dashboard:
  get:
    tags: [Clients]
    summary: Get client dashboard
    description: Get dashboard for client users. CLIENT role only.
    operationId: getClientDashboard
    x-roles: [CLIENT]
    responses:
      "200":
        description: Client dashboard data
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object

/api/v1/clients/{id}/documents:
  get:
    tags: [Clients, Documents]
    summary: Get client documents by ID
    description: Get all documents related to a specific client (Vessels, Jobs, Surveys, Profile). ADMIN, GM, TM, TO only.
    operationId: getClientDocumentsById
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: List of documents
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                count:
                  type: integer
                  example: 5
                data:
                  type: array
                  items:
                    type: object

/api/v1/clients/{id}:
  get:
    tags: [Clients]
    summary: Get client by ID
    description: Get client details by ID. ADMIN, GM, TM, TO only.
    operationId: getClientById
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Client details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/ClientResponse'
      "404":
        description: Client not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  put:
    tags: [Clients]
    summary: Update client
    description: Update client details. ADMIN, GM, TM only.
    operationId: updateClient
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              company_name:
                type: string
              company_code:
                type: string
              email:
                type: string
              address:
                type: string
              country:
                type: string
              status:
                type: string
                enum: [ACTIVE, INACTIVE]
          example:
            company_name: "Marine Shipping Co Ltd"
            address: "123 Harbour Road"
            country: "Singapore"
            status: "ACTIVE"
    responses:
      "200":
        description: Client updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/ClientResponse'

  delete:
    tags: [Clients]
    summary: Delete client
    description: Delete a client. ADMIN only.
    operationId: deleteClient
    x-roles: [ADMIN]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Client deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
