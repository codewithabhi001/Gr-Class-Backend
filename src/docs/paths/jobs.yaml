# ─────────────────────────────────────────────────────────────────────────────
# Jobs API  –  Full lifecycle from CREATED → CERTIFIED
# Role access summary:
#   CLIENT  : create, list (own fleet), get, cancel, messages, documents (upload, re-upload, list)
#   GM      : create, list, get, approve-request, finalize, assign, reassign,
#             reschedule, reject, cancel, priority, history, notes, messages
#   TM      : list, get, finalize, reassign, reschedule, authorize-survey,
#             review, send-back, reject, cancel, priority, history, notes, messages
#   ADMIN   : full access (all endpoints)
#   TO      : list, get, verify-documents, review, send-back, history, notes, messages
#   ADMIN/GM/TM/TO/SURVEYOR/CLIENT : role-based access only
#   SURVEYOR: list (assigned jobs), get, messages
# ─────────────────────────────────────────────────────────────────────────────

# ── Collection ──────────────────────────────────────────────────────────────
/api/v1/jobs/upload-url:
  get:
    tags: [Jobs]
    summary: "Get presigned S3 upload URL for job documents"
    description: |
      Generates a signed URL for uploading files directly to S3. 
      Returns the `uploadUrl` (where to PUT the file) and the `fileKey` 
      (to be used as `file_url` in subsequent job registration calls).
      
      **Roles:** CLIENT, ADMIN, GM, TM, SURVEYOR
    operationId: getJobUploadUrl
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    parameters:
      - name: fileName
        in: query
        required: true
        schema: { type: string, example: certificate.pdf }
      - name: fileType
        in: query
        required: true
        schema: { type: string, example: application/pdf }
      - name: folder
        in: query
        schema: { type: string, default: jobs }
    responses:
      "200":
        description: Presigned URL generated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    uploadUrl: { type: string }
                    fileKey: { type: string, example: "jobs/1714398721-cert.pdf" }

/api/v1/jobs:
  get:
    tags: [Jobs]
    summary: List jobs (role-filtered)
    description: |
      Returns a paginated list of job requests. Visible set depends on caller role:
      - **CLIENT** – Only jobs for their fleet (vessel_id filtered to client).
      - **SURVEYOR** – Only jobs assigned to them (`assigned_surveyor_id = me`).
      - **ADMIN / GM / TM / TO** – All jobs; defaults to last 30 days
        unless explicit filters are supplied.

      Supply `status` as a **comma-separated** string to filter by multiple statuses,
      e.g. `?status=ASSIGNED,SURVEY_AUTHORIZED`.
    operationId: getJobs
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: page
        in: query
        description: Page number (1-indexed)
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        description: Records per page
        schema: { type: integer, default: 10 }
      - name: status
        in: query
        description: Filter by status (single value or comma-separated list)
        schema:
          type: string
          example: "ASSIGNED,SURVEY_AUTHORIZED"
      - name: vessel_id
        in: query
        schema: { type: string, format: uuid }
      - name: certificate_type_id
        in: query
        schema: { type: string, format: uuid }
      - name: assigned_surveyor_id
        in: query
        schema: { type: string, format: uuid }
      - name: target_port
        in: query
        schema: { type: string, example: Singapore }
      - name: created_from
        in: query
        description: ISO date string – start of creation window
        schema: { type: string, format: date }
      - name: created_to
        in: query
        description: ISO date string – end of creation window
        schema: { type: string, format: date }
      - name: recent_days
        in: query
        description: |
          (Internal roles only) Shortcut to filter to last N days when no other date
          filter is given. Default is 30.
        schema: { type: integer, example: 30 }
    responses:
      "200":
        description: List of jobs
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    total: { type: integer, example: 48 }
                    page: { type: integer, example: 1 }
                    limit: { type: integer, example: 10 }
                    totalPages: { type: integer, example: 5 }
                    status_counts:
                      type: array
                      items:
                        $ref: '#/components/schemas/StatusCount'
                    jobs:
                      type: array
                      items:
                        $ref: '#/components/schemas/JobSummary'
            example:
              success: true
              data:
                total: 48
                page: 1
                limit: 10
                totalPages: 5
                jobs:
                  - id: "019d3ac5-3464-74f9-891e-f6eda7ee366c"
                    job_status: "ASSIGNED"
                    vessel_id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
                    certificate_type_id: "019cbf1d-bdc2-75e8-9fc8-3d161ae90ede"
                    target_port: "Mumbai"
                    target_date: "2026-12-31"
                    priority: "NORMAL"
                    createdAt: "2026-03-29T18:04:55.000Z"
                    Vessel:
                      id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
                      vessel_name: "MV Pacific Guardian"
                      imo_number: "9876501"
                    CertificateType:
                      id: "019cbf1d-bdc2-75e8-9fc8-3d161ae90ede"
                      name: "Safety Equipment Certificate"
                    survey:
                      id: "019d7c59-7f7e-768d-a9a5-00cb91079432"
                      survey_status: "NOT_STARTED"
                    payment_status: "N/A"
      "401":
        description: Unauthorized – missing or invalid token
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – role not allowed
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Jobs]
    summary: Create job request
    description: |
      Opens a new certification job request in **CREATED** status.
      - **CLIENT** – Can only submit for vessels that belong to their account.
      - **ADMIN / GM** – Can submit for any vessel.

      If the selected `certificate_type_id` has mandatory required documents
      (`CertificateRequiredDocument` where `is_mandatory=true`), each must be
      included in `uploaded_documents`; otherwise the request will be rejected
      with a `400` listing the missing documents.
    operationId: createJob
    x-roles: [CLIENT, ADMIN, GM]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/JobCreateRequest' }
          example:
            vessel_id: "019c574f-0991-7758-b696-03bb416c7433"
            certificate_type_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
            reason: "Annual survey due"
            target_port: "Singapore"
            target_date: "2026-04-15"
            uploaded_documents:
              - required_document_id: "019c4001-0002-7000-a000-000000000001"
                file_url: "https://cdn.example.com/docs/reg-cert.pdf"
    responses:
      "201":
        description: Job created successfully (status = CREATED)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Validation error or missing mandatory documents
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: false }
                message: { type: string, example: "Missing mandatory documents for job creation." }
                missing_documents:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Single Job ───────────────────────────────────────────────────────────────
/api/v1/jobs/{id}:
  get:
    tags: [Jobs]
    summary: Get job details
    description: |
      Returns full job detail including vessel, certificate type, status history,
      uploaded documents, reschedule records, and certificate (with signed URL if
      applicable).
      - **CLIENT** – Own fleet only.
      - **SURVEYOR** – Only if assigned to them.
      - **ADMIN / GM / TM / TO** – Any job.
    operationId: getJobById
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        description: Job UUID
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Job details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/JobResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Workflow Transition Endpoints ────────────────────────────────────────────

/api/v1/jobs/{id}/verify-documents:
  put:
    tags: [Jobs]
    summary: "TO: Verify or reject documents"
    description: |
      **Transition:** `CREATED → DOCUMENT_VERIFIED` (when all docs approved)

      Technical Officer reviews uploaded documents for validity and completeness.

      **Two flows:**
      1. **Approve all** (`approved: true` or empty body) — Marks all documents as
         APPROVED and transitions the job to `DOCUMENT_VERIFIED`.
      2. **Reject specific docs** (`approved: false`) — Marks listed documents as
         REJECTED with reasons. Job stays in `CREATED`. Client is notified to
         re-upload the rejected documents.

      If mandatory documents are missing (not uploaded at all), returns `400`
      regardless of the `approved` flag.

      **Roles:** TO
    operationId: verifyJobDocuments
    x-roles: [TO]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              approved:
                type: boolean
                description: "true = all docs valid, false = some docs invalid"
                default: true
              rejected_documents:
                type: array
                description: "Required when approved=false. List of invalid documents with reasons."
                items:
                  type: object
                  required: [document_id]
                  properties:
                    document_id:
                      type: string
                      format: uuid
                      description: "ID of the JobDocument to reject"
                    reason:
                      type: string
                      description: "Why this document is invalid"
            example:
              approved: false
              rejected_documents:
                - document_id: "019d3ac5-0001-0001-0001-000000000001"
                  reason: "Certificate expired, please upload a valid one."
          examples:
            approve_all:
              summary: Approve all documents
              value:
                approved: true
            reject_specific:
              summary: Reject invalid documents
              value:
                approved: false
                rejected_documents:
                  - document_id: "019d3ac5-0001-0001-0001-000000000001"
                    reason: "Certificate expired on 2025-01-01"
                  - document_id: "019d3ac5-0001-0001-0001-000000000002"
                    reason: "Wrong vessel name on document"
    responses:
      "200":
        description: |
          Documents processed. If approved, job moves to DOCUMENT_VERIFIED.
          If rejected, job stays in CREATED and client is notified.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message:
                  type: string
                  example: "All documents verified successfully."
                data:
                  oneOf:
                    - $ref: '#/components/schemas/JobResponse'
                    - type: object
                      properties:
                        job_id: { type: string, format: uuid }
                        job_status: { type: string, example: "CREATED" }
                        rejected_documents: { type: array, items: { type: object } }
                        approved_documents: { type: array, items: { type: object } }
      "400":
        description: |
          Job not in CREATED state, mandatory documents missing,
          or `rejected_documents` array is empty when `approved=false`.
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only TO can call this endpoint
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/approve-request:
  put:
    tags: [Jobs]
    summary: "GM/ADMIN: Approve request → APPROVED"
    description: |
      **Transition:** `DOCUMENT_VERIFIED → APPROVED`

      General Manager or Admin formally approves the job request after document
      verification. Records `approved_by_user_id` on the job.

      **Roles:** GM
    operationId: approveRequest
    x-roles: [GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, example: "All documents verified. Request approved." }
    responses:
      "200":
        description: Job approved. Status → APPROVED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job approved." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job not in DOCUMENT_VERIFIED state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only ADMIN or GM
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/finalize:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM/TM: Finalize non-survey job → FINALIZED"
    description: |
      **Transition:** `APPROVED → FINALIZED`

      Only applicable to jobs where `is_survey_required = false`. For jobs that
      require a survey, finalization happens automatically when the survey is
      completed and the TM finalizes the survey report.

      **Roles:** GM, TM
    operationId: finalizeJob
    x-roles: [GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, example: "No survey required. Finalizing." }
    responses:
      "200":
        description: Job finalized. Status → FINALIZED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job finalized." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job requires a survey (is_survey_required=true), or not in APPROVED state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/assign:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM: Assign surveyor → ASSIGNED"
    description: |
      **Transition:** `APPROVED → ASSIGNED`

      Assigns a surveyor to the job. The target user must exist and have
      `role = SURVEYOR`. Records `assigned_surveyor_id` and `assigned_by_user_id`
      and sends a push notification to the surveyor.

      **Roles:** ADMIN, GM
    operationId: assignSurveyor
    x-roles: [ADMIN, GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AssignSurveyorRequest' }
          example:
            surveyorId: "019c79a4-4930-71fd-aa73-887301791935"
    responses:
      "200":
        description: Surveyor assigned. Status → ASSIGNED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Surveyor assigned." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job not in APPROVED state, or surveyorId is invalid / not a SURVEYOR
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only ADMIN or GM
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/reassign:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM/TM: Reassign surveyor (no status change)"
    description: |
      Replaces the assigned surveyor without changing job status.  
      Can be called on any non-terminal job that already has a surveyor.
      A `reason` is mandatory for audit purposes.

      **Roles:** ADMIN, GM, TM
    operationId: reassignSurveyor
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ReassignJobRequest' }
          example:
            surveyorId: "019c79a4-4930-71fd-aa73-887301791935"
            reason: "Original surveyor unavailable due to scheduling conflict."
    responses:
      "200":
        description: Surveyor reassigned successfully (status unchanged).
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Surveyor reassigned." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job is in terminal state, or surveyorId is invalid
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only GM or TM
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/authorize-survey:
  put:
    tags: [Jobs]
    summary: "ADMIN/TM: Authorize survey → SURVEY_AUTHORIZED"
    description: |
      **Transition:** `ASSIGNED → SURVEY_AUTHORIZED`

      Admin or Technical Manager formally authorizes the survey to proceed.
      Requires a surveyor to already be assigned. Notifies the surveyor and the
      client. The surveyor can now call `POST /api/v1/surveys/start` to begin.

      **Roles:** ADMIN, TM
    operationId: authorizeSurvey
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, example: "Authorization granted. Proceed to vessel." }
    responses:
      "200":
        description: Survey authorized. Status → SURVEY_AUTHORIZED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Survey authorized. Surveyor can now begin field work." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job not in ASSIGNED state, or no surveyor assigned
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only ADMIN or TM
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/review:
  put:
    tags: [Jobs]
    summary: "TO: Technical review → REVIEWED"
    description: |
      **Transition:** `SURVEY_DONE → REVIEWED`

      Technical Officer performs a technical review of the submitted survey findings.
      Only a TO can call this endpoint.

      **Roles:** TO
    operationId: reviewJob
    x-roles: [TO]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, example: "Findings are correct. Technical review passed." }
    responses:
      "200":
        description: Job reviewed. Status → REVIEWED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job marked as reviewed." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job not in SURVEY_DONE state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only TO
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/reschedule:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM: Reschedule job date/port"
    description: |
      Updates `target_date` and/or `target_port` for an existing job.
      Allowed when the job is in any of: `CREATED`, `DOCUMENT_VERIFIED`,
      `APPROVED`, `ASSIGNED`, `SURVEY_AUTHORIZED`.  
      Not allowed after survey starts or in terminal states.

      Logs the old and new values in `job_reschedules` and notifies the
      assigned surveyor (if any).

      **Roles:** GM
    operationId: rescheduleJob
    x-roles: [GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/RescheduleJobRequest' }
          example:
            new_target_date: "2026-05-01"
            new_target_port: "Rotterdam"
            reason: "Port congestion at Singapore. Rerouted to Rotterdam."
    responses:
      "200":
        description: Job rescheduled successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job rescheduled successfully." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: |
          Rescheduling not allowed in current state (e.g. IN_PROGRESS or terminal),
          or `reason` is missing.
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – only ADMIN or GM
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/reject:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM/TM: Reject job → REJECTED (terminal)"
    description: |
      **Terminal transition** – moves job to `REJECTED` permanently.

      Role-specific constraints:
      - **ADMIN / GM** – Any status before `FINALIZED` or `CERTIFIED`.
      - **TM** – Only in `ASSIGNED`, `SURVEY_DONE`, or `REVIEWED` states.

      **Roles:** ADMIN, GM, TM
    operationId: rejectJob
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string, example: "Insufficient documentation. Cannot proceed." }
    responses:
      "200":
        description: Job rejected. Status → REJECTED (terminal).
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job rejected." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job already in terminal state, or role-state constraint violated
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/cancel:
  put:
    tags: [Jobs]
    summary: "CLIENT/GM/TM/ADMIN: Cancel job → REJECTED (terminal)"
    description: |
      Cancels the job. Maps internally to the `REJECTED` terminal state.

      - **CLIENT** – Allowed only while job is in `CREATED` status.
      - **ADMIN / GM** – Any status before `FINALIZED` or `CERTIFIED`.
      - **TM** – Follows same status restrictions as rejection.

      **Roles:** CLIENT, GM, TM, ADMIN
    operationId: cancelJob
    x-roles: [CLIENT, GM, TM, ADMIN]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason: { type: string, example: "No longer required." }
    responses:
      "200":
        description: Job cancelled. Status → REJECTED.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Job cancelled." }
                data: { $ref: '#/components/schemas/JobResponse' }
      "400":
        description: Job already in terminal state
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – CLIENT trying to cancel a job for a vessel they don't own
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/jobs/{id}/priority:
  put:
    tags: [Jobs]
    summary: "ADMIN/GM/TM: Update job priority"
    description: |
      Updates the `priority` field of a job. Creates an audit log entry with
      the old and new values plus an optional reason.

      Priority does **not** affect the job workflow or status — it is a
      management flag only, used to sort / filter jobs in dashboards.

      | Value | Meaning |
      |---|---|
      | `LOW` | Non-urgent, can wait |
      | `NORMAL` | Standard priority (default) |
      | `HIGH` | Requires prompt attention |
      | `URGENT` | Must be actioned immediately |

      **Roles:** ADMIN, GM, TM
    operationId: updateJobPriority
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [priority]
            properties:
              priority:
                type: string
                enum: [LOW, NORMAL, HIGH, URGENT]
                example: HIGH
              reason:
                type: string
                example: "Client requested expedited review."
    responses:
      "200":
        description: Priority updated successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/JobResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Eligible Surveyors ────────────────────────────────────────────────────────

/api/v1/jobs/{id}/eligible-surveyors:
  get:
    tags: [Jobs]
    summary: "ADMIN/GM/TM: Get eligible surveyors for a job"
    description: |
      Returns all active surveyors with eligibility status for the given job.
      Checks authorization against the job's vessel type and certificate type.
      Surveyors who lack the required authorizations or are unavailable are
      returned in a separate `not_eligible` list with reasons.

      **Roles:** ADMIN, GM, TM
    operationId: getEligibleSurveyors
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        description: Job UUID
        schema: { type: string, format: uuid }
      - name: search
        in: query
        description: Search by surveyor name or license number
        schema: { type: string }
    responses:
      "200":
        description: List of surveyors with eligibility
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    surveyors:
                      type: array
                      description: All active surveyors
                      items:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          name: { type: string }
                          email: { type: string, format: email }
                          phone: { type: string }
                          is_available: { type: boolean }
                          status: { type: string }
                          license_number: { type: string }
                          years_of_experience: { type: integer }
                          is_eligible: { type: boolean }
                          missing_reasons:
                            type: array
                            items: { type: string }
                    eligible:
                      type: array
                      description: Surveyors who match all requirements
                      items: { type: object }
                    not_eligible:
                      type: array
                      description: Surveyors who lack authorizations or are unavailable
                      items: { type: object }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Job Documents ─────────────────────────────────────────────────────────────

/api/v1/jobs/{id}/documents:
  get:
    tags: [Jobs]
    summary: "List job documents with verification status"
    description: |
      Returns all uploaded documents for a job, including their verification status
      (PENDING, APPROVED, REJECTED), rejection reasons, and which mandatory documents
      are still missing.

      **Roles:** CLIENT, ADMIN, GM, TM, TO
    operationId: getJobDocuments
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Document list with status summary
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    certificate_type:
                      type: object
                      nullable: true
                      properties:
                        id: { type: string, format: uuid }
                        name: { type: string }
                        issuing_authority: { type: string }
                        requires_survey: { type: boolean }
                    grouped_requirements:
                      type: array
                      items:
                        type: object
                        properties:
                          requirement_id: { type: string, format: uuid }
                          document_name: { type: string }
                          is_mandatory: { type: boolean }
                          status: { type: string }
                          uploaded_versions:
                            type: array
                            items: { type: object }
                    custom_documents:
                      type: array
                      items: { type: object }
                    documents:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          job_id: { type: string, format: uuid }
                          required_document_id: { type: string, format: uuid }
                          file_url: { type: string }
                          verification_status:
                            type: string
                            enum: [PENDING, APPROVED, REJECTED]
                          rejection_reason: { type: string, nullable: true }
                          verified_by: { type: string, format: uuid, nullable: true }
                    required_documents:
                      type: array
                      items: { type: object }
                    missing_documents:
                      type: array
                      items: { type: object }
                    summary:
                      type: object
                      properties:
                        total_uploaded: { type: integer }
                        approved: { type: integer }
                        rejected: { type: integer }
                        pending: { type: integer }
                        missing: { type: integer }
      "403":
        description: Forbidden – client can only access their own jobs
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Jobs]
    summary: "Upload or replace job documents"
    description: |
      Client or staff uploads additional documents or replaces existing ones.
      Only allowed while job is in `CREATED` status.

      This endpoint handles both initial uploads and replacement of rejected 
      documents. If a `required_document_id` is provided for a document that
      already exists, its `file_url` will be updated and its `verification_status`
      will be reset to `PENDING`.

      Notifies TO team that new or updated documents are available for review.

      **Roles:** CLIENT, ADMIN, GM, TM
    operationId: uploadJobDocuments
    x-roles: [CLIENT, ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [documents]
            properties:
              documents:
                type: array
                items:
                  type: object
                  required: [file_url]
                  properties:
                    required_document_id:
                      type: string
                      format: uuid
                      description: "ID from CertificateRequiredDocument (if this is a mandatory doc)"
                    custom_document_name:
                      type: string
                      description: "Name of the document (if it is an additional/custom document)"
                    file_url:
                      type: string
                      description: "S3/CDN URL of the uploaded file"
          example:
            documents:
              - required_document_id: "019c4001-0002-7000-a000-000000000001"
                file_url: "https://cdn.example.com/docs/vessel-registration.pdf"
              - custom_document_name: "Extra Insurance Letter"
                file_url: "https://cdn.example.com/docs/extra-insurance.pdf"
    responses:
      "201":
        description: Documents uploaded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Documents uploaded successfully." }
                data:
                  type: array
                  items: { type: object }
      "400":
        description: |
          Job not in CREATED state, document already exists for this requirement,
          or missing required fields.
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – client can only upload for their own jobs
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }


/api/v1/jobs/{id}/documents/{documentId}:
  put:
    tags: [Jobs]
    summary: "Re-upload a rejected document"
    description: |
      Client or staff replaces a previously rejected document with a new version.
      Only documents with `verification_status = REJECTED` can be re-uploaded.
      The new version is created as a separate record (PENDING) to maintain
      audit trail of the rejected original.

      Only allowed while the job is in `CREATED` status.

      **Roles:** CLIENT, ADMIN, GM, TM
    operationId: reuploadJobDocument
    x-roles: [CLIENT, ADMIN, GM, TM]
    parameters:
      - name: id
        in: path
        required: true
        description: Job UUID
        schema: { type: string, format: uuid }
      - name: documentId
        in: path
        required: true
        description: UUID of the rejected JobDocument to replace
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [file_url]
            properties:
              file_url:
                type: string
                description: "S3/CDN URL of the replacement file"
                example: "https://cdn.example.com/docs/updated-certificate.pdf"
    responses:
      "200":
        description: Document re-uploaded successfully (new version in PENDING state)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Document re-uploaded successfully." }
                data: { type: object }
      "400":
        description: |
          Job not in CREATED state, or the document is not in REJECTED status.
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden – client can only re-upload for their own jobs
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Job or document not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

