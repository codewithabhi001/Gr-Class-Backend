/api/v1/surveys/start:
  post:
    tags: [Surveys]
    summary: Start survey (Check-in)
    description: Surveyor checks in at the vessel location. Sets job status to IN_PROGRESS.
    operationId: startSurvey
    x-roles: [SURVEYOR]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [job_id, latitude, longitude]
            properties:
              job_id: { type: string, format: uuid }
              latitude: { type: number, example: 1.3521 }
              longitude: { type: number, example: 103.8198 }
    responses:
      "201":
        description: Survey started
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Survey Started" }
                data:
                  type: object
                  properties:
                    message: { type: string }
                    job_id: { type: string, format: uuid }
                    started_at: { type: string, format: date-time }
      "403": { description: Forbidden }

/api/v1/surveys:
  post:
    tags: [Surveys]
    summary: Submit survey report (Check-out)
    description: Surveyor submits final findings and attendance photo. Sets job status to SURVEY_DONE. Requires checklist submission first.
    operationId: submitSurveyReport
    x-roles: [SURVEYOR]
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            required: [job_id, submit_latitude, submit_longitude]
            properties:
              job_id: { type: string, format: uuid }
              submit_latitude: { type: number, description: "Latitude at submission (check-out)" }
              submit_longitude: { type: number, description: "Longitude at submission (check-out)" }
              survey_statement: { type: string, description: "Final statement (optional if already drafted)" }
              reason_if_outside: { type: string }
              photo: { type: string, format: binary, description: "Attendance photo" }
              signature: { type: string, format: binary, description: "Surveyor digital signature" }
              photoKey: { type: string, description: "S3 key for attendance photo (if already uploaded)" }
              signatureKey: { type: string, description: "S3 key for surveyor signature (if already uploaded)" }
        application/json:
          schema:
            type: object
            required: [job_id, submit_latitude, submit_longitude, photoKey, signatureKey]
            properties:
              job_id: { type: string, format: uuid }
              submit_latitude: { type: number }
              submit_longitude: { type: number }
              survey_statement: { type: string, description: "Final statement (optional if already drafted)" }
              photoKey: { type: string, description: "S3 key for attendance photo" }
              signatureKey: { type: string, description: "S3 key for surveyor signature" }
    responses:
      "201":
        description: Survey submitted
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyReportResponse' }
      "403": { description: Forbidden }

  get:
    tags: [Surveys]
    summary: List survey reports
    operationId: getSurveyReports
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: survey_status
        in: query
        schema: { type: string }
      - name: surveyor_id
        in: query
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: List of survey reports
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    total: { type: integer, example: 50 }
                    page: { type: integer, example: 1 }
                    limit: { type: integer, example: 10 }
                    totalPages: { type: integer, example: 5 }
                    status_counts:
                      type: array
                      items:
                        $ref: '#/components/schemas/StatusCount'
                    rows:
                      type: array
                      items:
                        $ref: '#/components/schemas/SurveyListResponse'

/api/v1/surveys/jobs/{jobId}:
  get:
    tags: [Surveys]
    summary: Get survey details
    description: Fetches full details of a survey for a specific job, including related objects.
    operationId: getSurveyDetails
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Survey details fetched
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyReportResponse' }
      "404": { description: Survey not found }

/api/v1/surveys/jobs/{jobId}/finalize:
  put:
    tags: [Surveys]
    summary: Finalize survey
    description: TM grants final approval to the survey findings. Unlocks certificate generation.
    operationId: finalizeSurvey
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Survey finalized
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Survey Finalized." }
      "403": { description: Forbidden }

/api/v1/surveys/jobs/{jobId}/rework:
  put:
    tags: [Surveys]
    summary: Request Rework
    description: GM or TM requests corrections/rework on a submitted survey.
    operationId: requestRework
    x-roles: [GM, TM, TO, ADMIN]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason: { type: string, example: "Incomplete proof for engine section." }
    responses:
      "200":
        description: Rework requested
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Rework requested successfully" }
      "400": { description: Invalid transition }
      "403": { description: Forbidden }

/api/v1/surveys/jobs/{jobId}/location:
  post:
    tags: [Surveys]
    summary: Stream live location
    description: Real-time GPS tracking during survey execution.
    operationId: streamLocation
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required: [latitude, longitude]
            properties:
              latitude: { type: number }
              longitude: { type: number }
    responses:
      "200": { description: Location updated }

/api/v1/surveys/jobs/{jobId}/proof:
  post:
    tags: [Surveys]
    summary: Upload survey evidence
    description: Supplemental photos or documents for the survey. Multiple uploads are allowed until final submission. Moves survey status to PROOF_UPLOADED if in a previous state.
    operationId: uploadProof
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              proof: { type: string, format: binary }
        application/json:
          schema:
            type: object
            properties:
              fileKey: { type: string, description: "S3 key for evidence proof" }
    responses:
      "201": { description: Proof uploaded }

# NOTE: The signed-checklist scan endpoints have moved to the Checklists module:
#   GET /api/v1/checklists/jobs/{jobId}/signed-checklist-upload-url
#   PUT /api/v1/checklists/jobs/{jobId}     (body.signed_checklist_files)

/api/v1/surveys/jobs/{jobId}/timeline:
  get:
    tags: [Surveys]
    summary: Get survey execution timeline
    description: Analytical view of survey duration and GPS variance.
    operationId: getSurveyTimeline
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Survey timeline fetched
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyTimelineResponse' }

/api/v1/surveys/jobs/{jobId}/violation:
  post:
    tags: [Surveys]
    summary: Flag survey violation
    description: Flag discrepancies found in survey execution (e.g. location mismatch).
    operationId: flagViolation
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Violation flagged }
/api/v1/surveys/jobs/{jobId}/statement/draft:
  post:
    tags: [Surveys]
    summary: Draft survey statement / Generate Preview
    description: |
      Saves the survey statement text and/or triggers report generation.
      - **SURVEYOR**: Required to provide `survey_statement` text. Cannot see the PDF.
      - **TM/ADMIN**: Can provide new text OR leave it empty to trigger/refresh the branded "**DRAFT**" PDF using existing findings.
    operationId: draftSurveyStatement
    x-roles: [SURVEYOR, TM, ADMIN]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              survey_statement:
                type: string
                description: Text findings. Required for surveyors; optional for management to trigger PDF.
    responses:
      "200":
        description: Success. Returns message and, for management, the signed PDF URL.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    message: { type: string }
                    status: { type: string, example: "DRAFTED" }
                    pdf_url: { type: string, format: uri, description: "Only returned for TM/ADMIN" }

/api/v1/surveys/jobs/{jobId}/statement/issue:
  post:
    tags: [Surveys]
    summary: Issue signed survey statement (PDF)
    description: Finalizes and issues the statement as an official document. Removes the "DRAFT" watermark. If no file is uploaded, the system automatically uses the most recent automated draft.
    operationId: issueSurveyStatement
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              statement: { type: string, format: binary }
        application/json:
          schema:
            type: object
            properties:
              fileKey: { type: string, description: "S3 key for signed PDF" }
    responses:
      "200": { description: Issued }

/api/v1/surveys/jobs/{jobId}/sync:
  post:
    tags: [Surveys]
    summary: Offline sync — replay batched data
    description: |
      Replays batched checklist answers and GPS points captured offline.
      The surveyor's mobile app collects data while offline and sends it
      in a single batch when connectivity is restored.

      **Payload shape:**
      - `checklist` — array of checklist answers to upsert
      - `gps_points` — array of GPS pings to bulk-create

      All items are written atomically inside a single transaction.
    operationId: syncOfflineData
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              checklist:
                type: array
                description: Checklist answers captured offline
                items:
                  type: object
                  required: [question_code, question_text, answer]
                  properties:
                    question_code: { type: string, example: "Q1" }
                    question_text: { type: string, example: "Is the fire extinguisher inspected?" }
                    answer: { type: string, example: "YES" }
                    remarks: { type: string, example: "All in order" }
              gps_points:
                type: array
                description: GPS pings captured offline with timestamps
                items:
                  type: object
                  required: [latitude, longitude]
                  properties:
                    latitude: { type: number, example: 1.3521 }
                    longitude: { type: number, example: 103.8198 }
                    captured_at: { type: string, format: date-time, description: "When the GPS point was captured (defaults to now)" }
          example:
            checklist:
              - question_code: "Q1"
                question_text: "Is the fire extinguisher inspected?"
                answer: "YES"
                remarks: "All in order"
            gps_points:
              - latitude: 1.3521
                longitude: 103.8198
                captured_at: "2026-05-22T10:30:00.000Z"
    responses:
      "200":
        description: Offline data synced successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Offline data synced successfully." }
                synced:
                  type: object
                  properties:
                    checklist_items: { type: integer, example: 5 }
                    gps_points: { type: integer, example: 12 }
      "400": { description: Invalid job state or surveyor mismatch }
      "403": { description: Forbidden — caller is not the assigned surveyor }
      "404": { description: Job or survey not found }
