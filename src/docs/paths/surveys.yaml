# ─────────────────────────────────────────────────────────────────────────────
# SURVEYS — Master-Detail Architecture (1 Job → N JobCertificates → N Surveys)
# Each survey is scoped to a specific JobCertificate, not the root Job.
# ─────────────────────────────────────────────────────────────────────────────

/api/v1/surveys/start:
  post:
    tags: [Surveys]
    summary: Start survey / Check-in (per certificate)
    description: |
      Surveyor checks in at the vessel location for a **specific certificate**.
      A separate check-in is required for each `JobCertificate` in the job.

      - Sets that certificate's survey status to `STARTED`.
      - Records a GPS entry scoped to this certificate's survey.
      - When the **first** certificate survey is started, the parent Job status moves to `IN_PROGRESS`.
    operationId: startSurvey
    x-roles: [SURVEYOR]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [latitude, longitude]
            properties:
              job_id:
                type: string
                format: uuid
                description: Job Request ID (provide either this OR job_certificate_id)
              job_certificate_id:
                type: string
                format: uuid
                description: The specific certificate to start survey for (preferred)
              latitude: { type: number, example: 19.0760 }
              longitude: { type: number, example: 72.8777 }
          example:
            job_certificate_id: "019e640c-0000-0000-0000-000000000001"
            latitude: 19.0760
            longitude: 72.8777
    responses:
      "201":
        description: Survey started for this certificate
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Survey Started" }
                data:
                  type: object
                  properties:
                    survey_id: { type: string, format: uuid }
                    job_certificate_id: { type: string, format: uuid }
                    job_id: { type: string, format: uuid }
                    started_at: { type: string, format: date-time }
      "400": { description: Survey already started or invalid state }
      "403": { description: Forbidden — not the assigned surveyor }

/api/v1/surveys:
  post:
    tags: [Surveys]
    summary: Submit survey report / Check-out (per certificate)
    description: |
      Surveyor submits final findings for a **specific certificate**. Each
      `JobCertificate` has its own independent survey that must be submitted
      separately.

      - Sets this certificate's survey to `SUBMITTED`.
      - When **all** certificates' surveys are `SUBMITTED`, the parent Job status
        automatically advances to `SURVEY_DONE`.

      **Note:** In production, `photoKey` and `signatureKey` are required (obtained
      from pre-signed S3 upload URLs). For E2E testing, `skip_validation: true`
      (ADMIN only) bypasses these file checks.
    operationId: submitSurveyReport
    x-roles: [SURVEYOR]
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              job_id: { type: string, format: uuid }
              job_certificate_id: { type: string, format: uuid, description: "The specific certificate being surveyed (preferred)" }
              submit_latitude: { type: number, description: "GPS latitude at submission" }
              submit_longitude: { type: number, description: "GPS longitude at submission" }
              survey_statement: { type: string, description: "Final findings statement" }
              photo: { type: string, format: binary, description: "Attendance photo" }
              signature: { type: string, format: binary, description: "Surveyor digital signature" }
              photoKey: { type: string, description: "S3 key for attendance photo (if pre-uploaded)" }
              signatureKey: { type: string, description: "S3 key for signature (if pre-uploaded)" }
              skip_validation: { type: boolean, description: "ADMIN only — skip file/GPS checks (E2E testing)" }
        application/json:
          schema:
            type: object
            properties:
              job_id: { type: string, format: uuid }
              job_certificate_id: { type: string, format: uuid, description: "The specific certificate (preferred)" }
              submit_latitude: { type: number }
              submit_longitude: { type: number }
              survey_statement: { type: string }
              photoKey: { type: string, description: "S3 key for attendance photo" }
              signatureKey: { type: string, description: "S3 key for surveyor signature" }
              skip_validation: { type: boolean, default: false, description: "ADMIN only — bypass file/GPS checks" }
          example:
            job_certificate_id: "019e640c-0000-0000-0000-000000000001"
            submit_latitude: 19.0760
            submit_longitude: 72.8777
            survey_statement: "Vessel hull in satisfactory condition. Anti-fouling paint intact."
            skip_validation: false
    responses:
      "201":
        description: Survey submitted for this certificate
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyReportResponse' }
      "400": { description: Checklist/proof incomplete or invalid state }
      "403": { description: Forbidden }

  get:
    tags: [Surveys]
    summary: List survey reports
    operationId: getSurveyReports
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: survey_status
        in: query
        schema:
          type: string
          enum: [NOT_STARTED, STARTED, CHECKLIST_SUBMITTED, PROOF_UPLOADED, SUBMITTED, REWORK_REQUIRED, FINALIZED]
      - name: surveyor_id
        in: query
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: List of survey reports
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    total: { type: integer, example: 50 }
                    page: { type: integer, example: 1 }
                    limit: { type: integer, example: 10 }
                    totalPages: { type: integer, example: 5 }
                    rows:
                      type: array
                      items: { $ref: '#/components/schemas/SurveyListResponse' }

/api/v1/surveys/jobs/{jobId}:
  get:
    tags: [Surveys]
    summary: Get all surveys for a job
    description: |
      Returns all surveys for a job — one per `JobCertificate`. Each survey
      contains its own checklist items, GPS trace, and status.
    operationId: getSurveyDetails
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Job Request ID
      - name: job_certificate_id
        in: query
        required: false
        schema: { type: string, format: uuid }
        description: Filter to a specific certificate's survey
    responses:
      "200":
        description: Survey details (array for multi-cert jobs)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyReportResponse' }
      "404": { description: Survey not found }

/api/v1/surveys/jobs/{jobId}/finalize:
  put:
    tags: [Surveys]
    summary: Finalize all surveys for a job (TM)
    description: |
      TM grants final approval to all survey findings for the job.
      - Sets all `JobCertificate` surveys to `FINALIZED`.
      - When all surveys are finalized, Job automatically moves to `FINALIZED`.
      - Unlocks certificate generation for each `JobCertificate`.
    operationId: finalizeSurvey
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: All surveys finalized
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "All surveys finalized." }
      "403": { description: Forbidden }

/api/v1/surveys/jobs/{jobId}/rework:
  put:
    tags: [Surveys]
    summary: Request rework on a survey
    description: GM, TM, or TO requests corrections on a submitted survey.
    operationId: requestRework
    x-roles: [GM, TM, TO, ADMIN]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: job_certificate_id
        in: query
        required: false
        schema: { type: string, format: uuid }
        description: Target a specific certificate's survey (if omitted, applies to first)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason: { type: string, example: "Incomplete proof for engine section." }
              job_certificate_id: { type: string, format: uuid, description: "Optional — target specific cert" }
    responses:
      "200":
        description: Rework requested
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Rework requested successfully" }
      "400": { description: Invalid transition }
      "403": { description: Forbidden }

/api/v1/surveys/jobs/{jobId}/location:
  post:
    tags: [Surveys]
    summary: Stream live GPS location (per certificate)
    description: |
      Real-time GPS tracking during survey execution.
      GPS points are now scoped to the specific `JobCertificate` survey.
    operationId: streamLocation
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            required: [latitude, longitude]
            properties:
              latitude: { type: number }
              longitude: { type: number }
              job_certificate_id: { type: string, format: uuid, description: "Certificate being surveyed" }
    responses:
      "200": { description: Location updated }

/api/v1/surveys/jobs/{jobId}/proof:
  post:
    tags: [Surveys]
    summary: Upload survey evidence proof (per certificate)
    description: |
      Upload supplemental photos or documents for a specific certificate's survey.
      Moves that certificate's survey to `PROOF_UPLOADED`.
    operationId: uploadProof
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              proof: { type: string, format: binary }
              job_certificate_id: { type: string, format: uuid }
              skip_validation: { type: boolean, description: "ADMIN only — bypass state guards" }
        application/json:
          schema:
            type: object
            properties:
              fileKey: { type: string, description: "S3 key for evidence proof" }
              job_certificate_id: { type: string, format: uuid }
    responses:
      "201": { description: Proof uploaded }

/api/v1/surveys/jobs/{jobId}/timeline:
  get:
    tags: [Surveys]
    summary: Get survey execution timeline (all certificates)
    description: |
      Returns GPS trace and status history for all certificate surveys of this job.
      GPS points are now scoped per `JobCertificate`.
    operationId: getSurveyTimeline
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Survey timeline
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/SurveyTimelineResponse' }

/api/v1/surveys/jobs/{jobId}/violation:
  post:
    tags: [Surveys]
    summary: Flag survey violation
    operationId: flagViolation
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Violation flagged }

/api/v1/surveys/jobs/{jobId}/statement/draft:
  post:
    tags: [Surveys]
    summary: Draft survey statement / Generate preview
    description: |
      Saves the survey statement text and/or triggers report generation.
      - **SURVEYOR**: Must provide `survey_statement` text.
      - **TM/ADMIN**: Can leave empty to trigger/refresh the branded "DRAFT" PDF.
    operationId: draftSurveyStatement
    x-roles: [SURVEYOR, TM, ADMIN]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              survey_statement: { type: string }
              job_certificate_id: { type: string, format: uuid, description: "Target specific cert" }
    responses:
      "200":
        description: Statement drafted
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    message: { type: string }
                    status: { type: string, example: "DRAFTED" }
                    pdf_url: { type: string, format: uri, description: "Only for TM/ADMIN" }

/api/v1/surveys/jobs/{jobId}/statement/issue:
  post:
    tags: [Surveys]
    summary: Issue signed survey statement (PDF)
    description: Finalizes the statement as official. Removes "DRAFT" watermark.
    operationId: issueSurveyStatement
    x-roles: [TM]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              statement: { type: string, format: binary }
        application/json:
          schema:
            type: object
            properties:
              fileKey: { type: string }
    responses:
      "200": { description: Issued }

/api/v1/surveys/jobs/{jobId}/sync:
  post:
    tags: [Surveys]
    summary: Offline sync — replay batched data
    description: |
      Replays checklist answers and GPS points captured while offline.
      Include `job_certificate_id` to scope data to the correct certificate survey.
    operationId: syncOfflineData
    x-roles: [SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              job_certificate_id: { type: string, format: uuid, description: "The certificate being surveyed offline" }
              checklist:
                type: array
                items:
                  type: object
                  required: [question_code, question_text, answer]
                  properties:
                    question_code: { type: string, example: "Q1" }
                    question_text: { type: string }
                    answer: { type: string, enum: [YES, NO, NA] }
                    remarks: { type: string }
              gps_points:
                type: array
                items:
                  type: object
                  required: [latitude, longitude]
                  properties:
                    latitude: { type: number }
                    longitude: { type: number }
                    captured_at: { type: string, format: date-time }
    responses:
      "200":
        description: Offline data synced
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string }
                synced:
                  type: object
                  properties:
                    checklist_items: { type: integer }
                    gps_points: { type: integer }
      "400": { description: Invalid job state or surveyor mismatch }
      "403": { description: Forbidden }
      "404": { description: Job not found }
