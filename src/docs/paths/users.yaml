/api/v1/users:
  get:
    tags: [Users]
    summary: Get all users
    operationId: getUsers
    x-roles: [ADMIN]
    parameters:
      - name: role
        in: query
        schema: { type: string, enum: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT] }
    responses:
      "200":
        description: List of users
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items: { $ref: '#/components/schemas/UserListItem' }
      "403": { description: Forbidden }


  post:
    tags: [Users]
    summary: Create user
    operationId: createUser
    x-roles: [ADMIN]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserCreateRequest'
    responses:
      "201": { description: User created }
      "403": { description: Forbidden }

/api/v1/users/me:
  get:
    tags: [Users]
    summary: Get current user profile
    operationId: getMyProfile
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    responses:
      "200": { description: Current user profile }
      "401": { description: Unauthorized }

  put:
    tags: [Users]
    summary: Update current user profile
    operationId: updateMyProfile
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name: { type: string }
              phone: { type: string }
              contact_person_name: { type: string, description: "Client specific" }
              contact_person_email: { type: string, description: "Client specific" }
              address: { type: string, description: "Client/Surveyor specific" }
              nationality: { type: string, description: "Surveyor specific" }
              qualification: { type: string, description: "Surveyor specific" }
              years_of_experience: { type: integer, description: "Surveyor specific" }
    responses:
      "200":
        description: Profile updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string }
                data: { type: object }
      "401": { description: Unauthorized }

/api/v1/users/{id}:
  get:
    tags: [Users]
    summary: Get user details by ID
    description: Retrieve details for a specific user by ID. If the user has role CLIENT, includes client and company details. ADMIN, GM, TM, TO only.
    operationId: getUserById
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: User details retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "User details fetched successfully" }
                data:
                  $ref: '#/components/schemas/UserDetailResponse'
      "401": { description: Unauthorized }
      "403": { description: Forbidden }
      "404": { description: User not found }

  put:
    tags: [Users]
    summary: Update user
    operationId: updateUser
    x-roles: [ADMIN]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserUpdateRequest'
    responses:
      "200": { description: User updated }
      "403": { description: Forbidden }

  delete:
    tags: [Users]
    summary: Delete user
    operationId: deleteUser
    x-roles: [ADMIN]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200": { description: User deleted }
      "403": { description: Forbidden }

/api/v1/users/{id}/status:
  put:
    tags: [Users]
    summary: Update user status
    operationId: updateUserStatus
    x-roles: [ADMIN]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserStatusUpdateRequest'
    responses:
      "200": { description: Status updated }
      "403": { description: Forbidden }

/api/v1/users/fcm-token:
  put:
    tags: [Users]
    summary: Update FCM device token for push notifications
    description: Registers or updates the Firebase Cloud Messaging (FCM) token for the currently authenticated user.
    operationId: updateFcmToken
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateFcmTokenRequest'
    responses:
      "200":
        description: FCM token updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "FCM token updated successfully" }
      "401": { description: Unauthorized }
      "400": { description: Invalid token provided }
/api/v1/users/profile-pic:
  put:
    tags: [Users]
    summary: Update profile picture
    description: Upload a new profile picture (multipart) or provide a pre-signed S3 key (JSON).
    operationId: updateProfilePic
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              profile_pic:
                type: string
                format: binary
        application/json:
          schema:
            type: object
            properties:
              profilePicKey:
                type: string
                description: "S3 key for the profile picture"
    responses:
      "200":
        description: Profile picture updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string }
                data: { type: object }
      "401": { description: Unauthorized }
