/api/v1/flags:
  post:
    tags: [Flags]
    summary: Create flag
    operationId: createFlag
    x-roles: [ADMIN]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [flag_state_name, country, authority_name, contact_email]
            properties:
              flag_state_name: { type: string }
              country: { type: string }
              authority_name: { type: string }
              contact_email: { type: string, format: email }
              authorization_scope: { type: string }
              logo_url: { type: string }
              status: { type: string, enum: [ACTIVE, INACTIVE] }
          example:
            flag_state_name: "Singapore"
            country: "Singapore"
            authority_name: "Maritime and Port Authority"
            contact_email: "mpa@gov.sg"
            logo_url: "flags/logos/singapore.png"
            status: "ACTIVE"
    responses:
      "201": { description: Flag created }
      "403": { description: Forbidden }

  get:
    tags: [Flags]
    summary: Get flags
    operationId: getFlags
    x-roles: [ADMIN, GM, TM, TO]
    parameters:
      - name: search
        in: query
        description: Search flags by state name
        schema: { type: string }
    responses:
      "200":
        description: List of flags
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FlagAdministrationListItem'
      "403": { description: Forbidden }

/api/v1/flags/{id}:
  get:
    tags: [Flags]
    summary: Get flag by ID
    operationId: getFlag
    x-roles: [ADMIN, GM, TM, TO]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Flag details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/FlagAdministrationListItem' }
      "404": { description: Flag not found }
      "403": { description: Forbidden }

  put:
    tags: [Flags]
    summary: Update flag
    operationId: updateFlag
    x-roles: [ADMIN]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              flag_state_name: { type: string }
              country: { type: string }
              authority_name: { type: string }
              contact_email: { type: string, format: email }
              authorization_scope: { type: string }
              logo_url: { type: string }
              status: { type: string, enum: [ACTIVE, INACTIVE] }
          example:
            authority_name: "Maritime and Port Authority of Singapore"
            logo_url: "flags/logos/singapore.png"
    responses:
      "200": { description: Flag updated }
      "403": { description: Forbidden }

  delete:
    tags: [Flags]
    summary: Delete flag
    description: |
      Permanently deletes a flag administration record.

      **Guards before deletion:**
      - Returns **409** if the flag is currently assigned to one or more vessels
      - Returns **409** if the flag is referenced in any certificates

      If the flag is in use, reassign or update those records first, then retry.

      **Role:** ADMIN only
    operationId: deleteFlag
    x-roles: [ADMIN]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: id
        in: path
        required: true
        description: Flag UUID to delete
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Flag deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Flag deleted successfully" }
            example:
              success: true
              message: "Flag deleted successfully"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden — ADMIN role required
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Flag not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "409":
        description: |
          Conflict — flag is still in use.
          Message describes exactly how many vessels or certificates reference it.
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
            example:
              success: false
              error_code: "API_ERROR"
              message: "Cannot delete this flag: it is currently assigned to 2 vessels. Please reassign or remove the flag from those vessels first."
