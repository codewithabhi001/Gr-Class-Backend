/api/v1/surveyors:
  get:
    tags: [Surveyors]
    summary: List all surveyors
    description: Returns a list of all surveyors with their profile and user details.
    operationId: getSurveyors
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: status
        in: query
        description: Filter by surveyor status (e.g. ACTIVE, INACTIVE, SUSPENDED)
        schema: { type: string, enum: [ACTIVE, INACTIVE, SUSPENDED] }
      - name: is_available
        in: query
        description: Filter by availability status
        schema: { type: boolean }
    responses:
      "200":
        description: List of surveyors fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      user_id: { type: string, format: uuid }
                      license_number: { type: string }
                      status: { type: string }
                      is_available: { type: boolean }
                      User:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          name: { type: string }
                          email: { type: string }
                          phone: { type: string }
                          role: { type: string }
                          status: { type: string }
      "403": { description: Forbidden }

  post:
    tags: [Surveyors]
    summary: Create surveyor
    operationId: createSurveyor
    x-roles: [ADMIN, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserCreateRequest'
    responses:
      "201": { description: Surveyor created }
      "403": { description: Forbidden }

/api/v1/surveyors/get-upload-url:
  get:
    tags: [Surveyors]
    summary: Get public upload URLs for surveyor application documents
    description: |
      Generates pre-signed S3 upload URLs for public surveyor applicants to upload
      their CV, ID Proof, and certificates.
      **Roles:** PUBLIC (unauthenticated)
    security: []
    operationId: getSurveyorUploadUrls
    x-roles: [PUBLIC]
    parameters:
      - name: cv_filename
        in: query
        description: CV filename
        schema: { type: string }
      - name: cv_mimetype
        in: query
        description: CV file MIME type
        schema: { type: string, default: "application/pdf" }
      - name: id_proof_filename
        in: query
        description: ID proof filename
        schema: { type: string }
      - name: id_proof_mimetype
        in: query
        description: ID proof MIME type
        schema: { type: string, default: "application/pdf" }
      - name: certificate_filenames
        in: query
        description: Comma-separated list or JSON array of certificate filenames
        schema: { type: string }
      - name: certificate_mimetypes
        in: query
        description: Comma-separated list or JSON array of certificate MIME types
        schema: { type: string }
    responses:
      "200":
        description: Pre-signed upload URLs generated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    cv:
                      type: object
                      properties:
                        key: { type: string, example: "surveyors/cv/uuid-cv.pdf" }
                        uploadUrl: { type: string, example: "https://s3.example.com/upload-cv-url" }
                    id_proof:
                      type: object
                      properties:
                        key: { type: string, example: "surveyors/id-proof/uuid-id.pdf" }
                        uploadUrl: { type: string, example: "https://s3.example.com/upload-id-url" }
                    certificates:
                      type: array
                      items:
                        type: object
                        properties:
                          key: { type: string, example: "surveyors/certificates/uuid-cert.pdf" }
                          uploadUrl: { type: string, example: "https://s3.example.com/upload-cert-url" }

/api/v1/surveyors/apply:
  post:
    tags: [Surveyors]
    summary: Public surveyor application
    operationId: applySurveyorPublic
    x-roles: [PUBLIC]
    security: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/SurveyorApplyMultipartRequest'
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorApplyRequest'
    responses:
      "201": { description: Application submitted }

/api/v1/surveyors/applications:
  get:
    tags: [Surveyors]
    summary: Get surveyor applications
    operationId: getSurveyorApplications
    x-roles: [ADMIN, TM]
    responses:
      "200":
        description: List of applications
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  $ref: '#/components/schemas/SurveyorApplicationListResponse'
      "403": { description: Forbidden }

/api/v1/surveyors/applications/{id}:
  get:
    tags: [Surveyors]
    summary: Get surveyor application
    operationId: getSurveyorApplication
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Application details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  $ref: '#/components/schemas/SurveyorApplicationResponse'
      "403": { description: Forbidden }

/api/v1/surveyors/applications/{id}/review:
  put:
    tags: [Surveyors]
    summary: Review application
    operationId: reviewSurveyorApplication
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorReviewRequest'
    responses:
      "200":
        description: Application reviewed successfully
      "403": { description: Forbidden }

/api/v1/surveyors/{id}/profile:
  get:
    tags: [Surveyors]
    summary: Get surveyor profile
    description: Fetches the surveyor profile. Accepts either User ID or Surveyor Profile ID.
    operationId: getSurveyorProfile
    x-roles: [ADMIN, TM, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Surveyor profile }
      "403": { description: Forbidden }

  put:
    tags: [Surveyors]
    summary: Update surveyor profile
    description: Updates surveyor profile details. Accepts either User ID or Surveyor Profile ID.
    operationId: updateSurveyorProfile
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorProfileUpdateRequest'
    responses:
      "200": { description: Profile updated }
      "403": { description: Forbidden }

/api/v1/surveyors/{id}/authorization-checklist:
  get:
    tags: [Surveyors]
    summary: Get surveyor authorization checklist
    description: |
      Returns a combined checklist of **all vessel ship types** and **all active
      certificate types**, each marked with `is_authorized: true/false` based on
      the surveyor's current profile authorizations.

      Useful for displaying a read-only checklist UI showing what the surveyor is
      already authorized for.

      **Roles:** ADMIN, TM, GM, SURVEYOR
    security: [{ bearerAuth: [] }]
    operationId: getSurveyorAuthorizationChecklist
    x-roles: [ADMIN, TM, GM, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Authorization checklist fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Authorization checklist fetched successfully" }
                data:
                  type: object
                  properties:
                    surveyor:
                      type: object
                      properties:
                        profile_id: { type: string, format: uuid }
                        user_id: { type: string, format: uuid }
                        name: { type: string, example: "John Doe" }
                        email: { type: string, example: "john@grclass.com" }
                    vessel_types:
                      type: array
                      items:
                        type: object
                        properties:
                          ship_type: { type: string, example: "Bulk Carrier" }
                          is_authorized: { type: boolean, example: true }
                    certificate_types:
                      type: array
                      items:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          name: { type: string, example: "Class Certificate" }
                          issuing_authority:
                            type: string
                            enum: [CLASS, FLAG]
                          is_authorized: { type: boolean, example: false }
            example:
              success: true
              message: "Authorization checklist fetched successfully"
              data:
                surveyor:
                  profile_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                  user_id: "019c79a4-aaaa-bbbb-cccc-f6bee169ab04"
                  name: "John Doe"
                  email: "john@grclass.com"
                vessel_types:
                  - ship_type: "Bulk Carrier"
                    is_authorized: true
                  - ship_type: "Container Ship"
                    is_authorized: false
                  - ship_type: "Oil Tanker"
                    is_authorized: true
                  - ship_type: "RORO Vessel"
                    is_authorized: false
                certificate_types:
                  - id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                    name: "Class Certificate"
                    issuing_authority: "CLASS"
                    is_authorized: true
                  - id: "019c79a4-1111-2222-3333-f6bee169ab05"
                    name: "Load Line Certificate"
                    issuing_authority: "FLAG"
                    is_authorized: false
                  - id: "019c79a4-aaaa-bbbb-cccc-f6bee169ab06"
                    name: "Safety Construction Certificate"
                    issuing_authority: "CLASS"
                    is_authorized: true
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Surveyor not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

