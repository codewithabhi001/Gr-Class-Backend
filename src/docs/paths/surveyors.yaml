/api/v1/surveyors:
  get:
    tags: [Surveyors]
    summary: List all surveyors
    description: Returns a list of all surveyors with their profile and user details.
    operationId: getSurveyors
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: status
        in: query
        description: Filter by surveyor status (e.g. ACTIVE, INACTIVE, SUSPENDED)
        schema: { type: string, enum: [ACTIVE, INACTIVE, SUSPENDED] }
      - name: is_available
        in: query
        description: Filter by availability status
        schema: { type: boolean }
    responses:
      "200":
        description: List of surveyors fetched successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                message: { type: string }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      user_id: { type: string, format: uuid }
                      license_number: { type: string }
                      status: { type: string }
                      is_available: { type: boolean }
                      User:
                        type: object
                        properties:
                          id: { type: string, format: uuid }
                          name: { type: string }
                          email: { type: string }
                          phone: { type: string }
                          role: { type: string }
                          status: { type: string }
      "403": { description: Forbidden }

  post:
    tags: [Surveyors]
    summary: Create surveyor
    operationId: createSurveyor
    x-roles: [ADMIN, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserCreateRequest'
    responses:
      "201": { description: Surveyor created }
      "403": { description: Forbidden }

/api/v1/surveyors/apply:
  post:
    tags: [Surveyors]
    summary: Public surveyor application
    operationId: applySurveyorPublic
    x-roles: [PUBLIC]
    security: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '#/components/schemas/SurveyorApplyMultipartRequest'
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorApplyRequest'
    responses:
      "201": { description: Application submitted }

/api/v1/surveyors/applications:
  get:
    tags: [Surveyors]
    summary: Get surveyor applications
    operationId: getSurveyorApplications
    x-roles: [ADMIN, TM]
    responses:
      "200":
        description: List of applications
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  $ref: '#/components/schemas/SurveyorApplicationListResponse'
      "403": { description: Forbidden }

/api/v1/surveyors/applications/{id}:
  get:
    tags: [Surveyors]
    summary: Get surveyor application
    operationId: getSurveyorApplication
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Application details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  $ref: '#/components/schemas/SurveyorApplicationResponse'
      "403": { description: Forbidden }

/api/v1/surveyors/applications/{id}/review:
  put:
    tags: [Surveyors]
    summary: Review application
    operationId: reviewSurveyorApplication
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorReviewRequest'
    responses:
      "200":
        description: Application reviewed successfully
      "403": { description: Forbidden }

/api/v1/surveyors/{id}/profile:
  get:
    tags: [Surveyors]
    summary: Get surveyor profile
    description: Fetches the surveyor profile. Accepts either User ID or Surveyor Profile ID.
    operationId: getSurveyorProfile
    x-roles: [ADMIN, TM, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Surveyor profile }
      "403": { description: Forbidden }

  put:
    tags: [Surveyors]
    summary: Update surveyor profile
    description: Updates surveyor profile details. Accepts either User ID or Surveyor Profile ID.
    operationId: updateSurveyorProfile
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorProfileUpdateRequest'
    responses:
      "200": { description: Profile updated }
      "403": { description: Forbidden }

/api/v1/surveyors/{id}/status:
  put:
    tags: [Surveyors]
    summary: Update surveyor status (Suspend/Activate)
    description: Change the status of a surveyor. Accepts either User ID or Surveyor Profile ID.
    operationId: updateSurveyorStatus
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        description: User ID or Surveyor Profile ID
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserStatusUpdateRequest'
    responses:
      "200": { description: Status updated successfully }
      "403": { description: Forbidden }

/api/v1/surveyors/availability:
  post:
    tags: [Surveyors]
    summary: Update availability
    operationId: updateSurveyorAvailability
    x-roles: [SURVEYOR]
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorAvailabilityRequest'
    responses:
      "200": { description: Availability updated }
      "403": { description: Forbidden }

/api/v1/surveyors/location:
  post:
    tags: [Surveyors]
    summary: Report location
    operationId: reportSurveyorLocation
    x-roles: [SURVEYOR]
    requestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SurveyorLocationRequest'
    responses:
      "200": { description: Location reported }
      "403": { description: Forbidden }

/api/v1/surveyors/{id}/location-history:
  get:
    tags: [Surveyors]
    summary: Get GPS history
    operationId: getSurveyorGPSHistory
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Location history
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/GpsTrackingResponse'
      "403": { description: Forbidden }
