/api/v1/checklists/jobs/{jobId}:
  get:
    tags:
      - Checklists
    summary: Get checklist for a job
    description: |
      Returns the checklist items for a job **plus** the resolved (signed)
      HTTPS URLs of any full signed-checklist scan documents that were
      attached to the underlying survey.

      All `file_url` fields and `signed_checklist_files` entries are guaranteed
      to be either fully-qualified HTTPS URLs or `null` — raw S3 keys are never
      returned to the client.
    operationId: getChecklist
    security:
      - bearerAuth: []
    x-roles: [ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - in: path
        name: jobId
        schema:
          type: string
          format: uuid
        required: true
        description: Unique identifier of the job
      - in: query
        name: answer
        schema:
          type: string
          enum: [YES, NO, NA]
        description: Filter by answer status
      - in: query
        name: question_code
        schema:
          type: string
        description: Filter by specific question code
      - in: query
        name: search
        schema:
          type: string
        description: Search in question text or remarks
    responses:
      '200':
        description: Checklist retrieved successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  put:
    tags:
      - Checklists
    summary: Submit checklist (answers + optional signed-scan files)
    description: |
      Submit / replace the checklist answers for a job. In the **same call**
      the surveyor can also attach the S3 keys of the full signed-checklist
      scan document(s) — obtained earlier from
      `GET /checklists/jobs/{jobId}/signed-checklist-upload-url`.

      Re-submission is allowed until the survey is finalized. Only the
      assigned `SURVEYOR` can perform this action while the survey is in an
      active state (`STARTED`, `CHECKLIST_SUBMITTED`, `PROOF_UPLOADED`,
      or `REWORK_REQUIRED`).
    operationId: submitChecklist
    security:
      - bearerAuth: []
    x-roles: [SURVEYOR]
    parameters:
      - in: path
        name: jobId
        schema:
          type: string
          format: uuid
        required: true
        description: Unique identifier of the job
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ChecklistSubmission'
          example:
            items:
              - question_code: "LSE001"
                question_text: "Are life jackets available?"
                answer: "YES"
                remarks: "Verified count matches record"
                file_url: ""
              - question_code: "LSE002"
                question_text: "Is the fire extinguisher charged?"
                answer: "NO"
                remarks: "Pressure low, needs replacement"
                file_url: "surveys/checklist-evidence/<jobId>/1714000000000_fire_ext.jpg"
              - question_code: "LSE003"
                question_text: "Is the fire alarm functional?"
                answer: "NA"
                remarks: "Not applicable for this vessel type"
                file_url: ""
            signed_checklist_files:
              - "surveys/signed-checklists/<jobId>/1714000000000_signed.pdf"
    responses:
      '200':
        description: Checklist submitted successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistResponse'
      '400':
        description: Bad Request (invalid state, terminal job, etc.)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — caller is not the assigned surveyor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/checklists/jobs/{jobId}/get-upload-url:
  get:
    tags:
      - Checklists
    summary: Get upload URL for a single checklist-item evidence photo
    description: |
      Generates a pre-signed S3 URL so the surveyor can directly upload one
      photo of evidence for a **single** checklist item (e.g. a failing item).
      The returned `fileKey` is then passed back as `file_url` on that item
      in the next `PUT /checklists/jobs/{jobId}` call.
    operationId: getChecklistItemUploadUrl
    security:
      - bearerAuth: []
    x-roles: [SURVEYOR]
    parameters:
      - in: path
        name: jobId
        schema:
          type: string
          format: uuid
        required: true
        description: Unique identifier of the job
      - in: query
        name: fileName
        schema:
          type: string
        required: true
        description: The filename with extension (e.g. proof.jpg)
      - in: query
        name: contentType
        schema:
          type: string
        required: true
        description: The MIME type of the file (e.g. image/jpeg)
    responses:
      '200':
        description: Upload URL generated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlResponse'
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — caller is not the assigned surveyor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/checklists/jobs/{jobId}/signed-checklist-upload-url:
  get:
    tags:
      - Checklists
    summary: Get upload URL for the full signed-checklist scan
    description: |
      Generates a pre-signed S3 URL so the surveyor can upload the full
      filled & signed checklist document (PDF / image) — one or more files
      representing the actual signed sheet.

      After uploading directly to S3 with the returned `uploadUrl`, send the
      `fileKey` back inside the `signed_checklist_files` array on the next
      `PUT /checklists/jobs/{jobId}` call.
    operationId: getSignedChecklistUploadUrl
    security:
      - bearerAuth: []
    x-roles: [SURVEYOR]
    parameters:
      - in: path
        name: jobId
        schema:
          type: string
          format: uuid
        required: true
        description: Unique identifier of the job
      - in: query
        name: fileName
        schema:
          type: string
        required: true
        description: The filename with extension (e.g. signed_checklist.pdf)
      - in: query
        name: contentType
        schema:
          type: string
        required: true
        description: The MIME type of the file (e.g. application/pdf)
    responses:
      '200':
        description: Upload URL generated successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlResponse'
      '400':
        description: Bad Request (job not survey-eligible / terminal state)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '403':
        description: Forbidden — caller is not the assigned surveyor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Job not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
