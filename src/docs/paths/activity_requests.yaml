/api/v1/activity-requests:
  post:
    tags: [Activity Requests]
    summary: Create activity request
    operationId: createActivityRequest
    x-roles: [CLIENT, ADMIN, GM, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ActivityRequestCreateRequest'
    responses:
      "201":
        description: Request created
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data: { $ref: '#/components/schemas/ActivityRequestDetailResponse' }
            example:
              success: true
              data:
                id: "019d81ef-f655-76a2-a6ea-7b9d4ca5cdbc"
                request_number: "AR-2026-0001"
                activity_type: "INSPECTION"
                requested_service: "Annual Survey"
                location_port: "Port of Singapore"
                proposed_date: "2026-05-15T00:00:00.000Z"
                description: "Testing API response capture"
                priority: "MEDIUM"
                requested_by: "019c79a4-4475-729b-ae3e-98373803b963"
                status: "PENDING"
                updatedAt: "2026-04-12T13:44:40.278Z"
                createdAt: "2026-04-12T13:44:40.278Z"
                attachments: []
      "403": { description: Forbidden }

  get:
    tags: [Activity Requests]
    summary: Get activity requests (List)
    description: Returns a list of activity requests with minimal details.
    operationId: getActivityRequests
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: page
        in: query
        schema: { type: integer, default: 1 }
      - name: limit
        in: query
        schema: { type: integer, default: 10 }
      - name: status
        in: query
        schema: { type: string, enum: [PENDING, APPROVED, REJECTED, CONVERTED_TO_JOB, DRAFT] }
    responses:
      "200":
        description: List of requests
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/ActivityRequestSummary'
            example:
              success: true
              data:
                - id: "019d81ef-f655-76a2-a6ea-7b9d4ca5cdbc"
                  request_number: "AR-2026-0001"
                  activity_type: "INSPECTION"
                  requested_service: "Annual Survey"
                  proposed_date: "2026-05-15T00:00:00.000Z"
                  status: "PENDING"
                  Vessel: null
                  created_at: "2026-04-12T13:44:40.000Z"
      "403": { description: Forbidden }

/api/v1/activity-requests/{id}:
  get:
    tags: [Activity Requests]
    summary: Get request by ID (Detailed)
    description: Returns full details of an activity request including associations.
    operationId: getActivityRequestById
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Request details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data: { $ref: '#/components/schemas/ActivityRequestDetailResponse' }
            example:
              success: true
