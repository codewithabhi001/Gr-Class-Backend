/api/v1/website/static-content/faq:
  get:
    tags:
      - Website
    summary: Get FAQ content
    description: Retrieve the hardcoded Frequently Asked Questions content.
    operationId: getFaqContent
    responses:
      200:
        description: FAQ content details
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  $ref: '#/components/schemas/SiteStaticContent'
    x-roles:
      - PUBLIC

/api/v1/website/static-content/news:
  get:
    tags:
      - Website
    summary: Get news articles
    description: Retrieve the list of hardcoded news articles.
    operationId: getNewsContent
    responses:
      200:
        description: List of news articles
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
