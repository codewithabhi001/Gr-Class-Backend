/api/v1/website/static-content:
  get:
    tags:
      - Website
    summary: List static content
    description: Retrieve all static pages/FAQs. Public only sees published.
    operationId: listStaticContent
    security:
      - bearerAuth: []
    responses:
      200:
        description: List of static content
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SiteStaticContent'
    x-roles:
      - ADMIN
      - PUBLIC

  post:
    tags:
      - Website
    summary: Create static content (Admin Only)
    description: Create a new PAGE or FAQ entry.
    operationId: createStaticContent
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SiteStaticContentInput'
    responses:
      201:
        description: Content created
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteStaticContent'
    x-roles:
      - ADMIN

/api/v1/website/static-content/{slug}:
  get:
    tags:
      - Website
    summary: Get specific static content
    description: Retrieve a single page/FAQ by its slug.
    operationId: getStaticContentBySlug
    parameters:
      - in: path
        name: slug
        required: true
        schema:
          type: string
        example: "about-us"
    security:
      - bearerAuth: []
    responses:
      200:
        description: Content details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteStaticContent'
      404:
        description: Not found
    x-roles:
      - ADMIN
      - PUBLIC

  put:
    tags:
      - Website
    summary: Update static content (Admin Only)
    description: Modify existing static content by slug.
    operationId: updateStaticContent
    parameters:
      - in: path
        name: slug
        required: true
        schema:
          type: string
        example: "about-us"
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SiteStaticContentInput'
    responses:
      200:
        description: Content updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteStaticContent'
    x-roles:
      - ADMIN

  delete:
    tags:
      - Website
    summary: Delete static content (Admin Only)
    description: Remove a static content entry.
    operationId: deleteStaticContent
    parameters:
      - in: path
        name: slug
        required: true
        schema:
          type: string
        example: "about-us"
    security:
      - bearerAuth: []
    responses:
      200:
        description: Deleted successfully
    x-roles:
      - ADMIN

/api/v1/website/newsletter/subscribe:
  post:
    tags:
      - Website
    summary: Subscribe to newsletter
    description: Join the mailing list.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, example: "mariner@example.com" }
              source: { type: string, example: "footer" }
    responses:
      200:
        description: Subscribed successfully
    x-roles:
      - PUBLIC

/api/v1/website/newsletter/subscribers:
  get:
    tags:
      - Website
    summary: List Newsletter Subscribers (Admin Only)
    security:
      - bearerAuth: []
    responses:
      200:
        description: Subscriber list
    x-roles:
      - ADMIN

