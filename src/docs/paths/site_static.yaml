/api/v1/website/static-content/admin:
  post:
    tags:
      - Website
    summary: Create static content (Admin Only)
    description: Create a new static page/FAQ row by key.
    operationId: createStaticContentRow
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [key, title]
            properties:
              key: { type: string, example: "about-us" }
              title: { type: string, example: "About Us" }
              body_html: { type: string, example: "<p>About content...</p>" }
              faq_items: { type: array, items: { type: object } }
              news_items: { type: array, items: { type: object } }
    responses:
      201:
        description: Created successfully
    x-roles:
      - ADMIN

/api/v1/website/static-content/admin/{key}:
  put:
    tags:
      - Website
    summary: Update static content (Admin Only)
    description: Edit an existing static page/FAQ row by key.
    operationId: updateStaticContentRow
    parameters:
      - in: path
        name: key
        required: true
        schema:
          type: string
        example: "about-us"
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title: { type: string, example: "About Us" }
              body_html: { type: string, example: "<p>Updated content...</p>" }
              faq_items: { type: array, items: { type: object } }
              news_items: { type: array, items: { type: object } }
    responses:
      200:
        description: Updated successfully
    x-roles:
      - ADMIN

/api/v1/website/newsletter/subscribe:
  post:
    tags:
      - Website
    summary: Subscribe to newsletter
    description: Join the mailing list.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, example: "mariner@example.com" }
              source: { type: string, example: "footer" }
    responses:
      200:
        description: Subscribed successfully
    x-roles:
      - PUBLIC

/api/v1/website/newsletter/subscribers:
  get:
    tags:
      - Website
    summary: List Newsletter Subscribers (Admin Only)
    security:
      - bearerAuth: []
    responses:
      200:
        description: Subscriber list
    x-roles:
      - ADMIN

/api/v1/website/newsletter/unsubscribe:
  post:
    tags:
      - Website
    summary: Unsubscribe from newsletter
    description: Remove email from the mailing list.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, example: "mariner@example.com" }
    responses:
      200:
        description: Unsubscribed successfully
    x-roles:
      - PUBLIC

/api/v1/website/newsletter/unsubscribe-one-click:
  get:
    tags:
      - Website
    summary: RFC 8058 GET one-click unsubscribe
    description: Unsubscribes the user using a token query parameter and displays an HTML response.
    parameters:
      - name: token
        in: query
        required: true
        schema: { type: string }
    responses:
      200:
        description: HTML response indicating success or failure of unsubscribe
        content:
          text/html:
            schema: { type: string }
    x-roles:
      - PUBLIC

  post:
    tags:
      - Website
    summary: RFC 8058 POST one-click unsubscribe (Gmail)
    description: Unsubscribes the user using a token parameter in query or body. Used by email clients like Gmail.
    parameters:
      - name: token
        in: query
        required: false
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              token: { type: string }
    responses:
      204:
        description: Unsubscribed successfully (No content)
      400:
        description: Invalid token
    x-roles:
      - PUBLIC

/api/v1/website/newsletter/send:
  post:
    tags:
      - Website
    summary: Broadcast newsletter to subscribers (Admin Only)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [subject, message]
            properties:
              emails:
                type: array
                items: { type: string }
                description: Optional array of target emails (omitting sends to all subscribers)
              subject: { type: string, example: "GR-Class Regulatory Update May 2026" }
              message: { type: string, example: "Dear Mariner, here are the updates..." }
    responses:
      200:
        description: Broadcast sent successfully
    x-roles:
      - ADMIN

