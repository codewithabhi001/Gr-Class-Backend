/api/v1/certificates/{id}:
  get:
    tags: [Certificates]
    summary: Get certificate by ID
    description: |
      Get certificate details by ID. Same RBAC as list: ADMIN/GM/TM/TO see all; CLIENT only own company. Returns 403 if certificate exists but user has no access.
    security: [{ bearerAuth: [] }]
    operationId: getCertificateById
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Certificate details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/CertificateResponse'
      "403":
        description: Forbidden - certificate exists but user has no access
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      "404":
        description: Certificate not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  put:
    tags: [Certificates]
    summary: Update certificate draft
    description: Update details of a DRAFT certificate. TM, GM only.
    security: [{ bearerAuth: [] }]
    operationId: updateCertificateDraft
    x-roles: [TM, GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateCertificateDraftRequest'
          example:
            certificate_term: "SHORT_TERM"
            remarks: "Updated term to short term"
    responses:
      "200":
        description: Draft updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Draft updated successfully" }
                data: { $ref: '#/components/schemas/CertificateResponse' }
      "400":
        description: Validation error
      "403":
        description: Forbidden
      "404":
        description: Certificate not found

/api/v1/certificates/{id}/download:
  get:
    tags: [Certificates]
    summary: Download certificate PDF
    description: |
      Redirects to the certificate PDF URL for download. If the certificate has a stored PDF (pdf_file_url), returns 302 redirect to that URL so the browser can open or download the file.
      CLIENT can only download certificates for their vessels.
    operationId: downloadCertificate
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Certificate ID
    responses:
      "200":
        description: Successful download (in case of direct file stream rather than redirect)
        content:
          application/pdf:
            schema:
              type: string
              format: binary
      "302":
        description: Redirect to certificate PDF URL
        headers:
          Location:
            description: URL of the certificate PDF
            schema:
              type: string
              example: "https://storage.example.com/certificates/abc-123.pdf"
      "404":
        description: Certificate not found or PDF not available
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: "Certificate PDF is not available for download yet."

