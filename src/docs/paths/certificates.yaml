/api/v1/certificates/verify/{number}:
  get:
    tags: [Certificates]
    summary: Verify certificate (public)
    description: Public verification of certificate by number. No auth required.
    security: []
    operationId: verifyCertificate
    x-roles: [PUBLIC]
    parameters:
      - name: number
        in: path
        required: true
        schema:
          type: string
          example: "GIR-CERT-2026-001234"
    responses:
      "200":
        description: Certificate verified
        content:
          application/json:
            schema:
              type: object
              properties:
                valid:
                  type: boolean
                certificate:
                  $ref: '#/components/schemas/CertificateResponse'
      "404":
        description: Certificate not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/certificates:
  get:
    tags: [Certificates]
    summary: List certificates
    description: |
      List certificates with strict RBAC and ownership filtering.
      **Access:**
      - **ADMIN / GM / TM / TO:** All certificates.
      - **SURVEYOR:** Only certificates for vessels in jobs assigned to them.
      - **CLIENT:** Only certificates for their own company vessels.
    security: [{ bearerAuth: [] }]
    operationId: getCertificates
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
    responses:
      "200":
        description: List of certificates
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object
                  properties:
                    total: { type: integer, example: 100 }
                    page: { type: integer, example: 1 }
                    limit: { type: integer, example: 20 }
                    totalPages: { type: integer, example: 5 }
                    status_counts:
                      type: array
                      items:
                        $ref: '#/components/schemas/StatusCount'
                    rows:
                      type: array
                      items:
                        $ref: '#/components/schemas/CertificateSummary'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  post:
    tags: [Certificates]
    summary: Generate certificate
    description: Generate a new certificate for a completed job. GM, TM only.
    security: [{ bearerAuth: [] }]
    operationId: generateCertificate
    x-roles: [GM, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenerateCertificateRequest'
          example:
            job_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
            validity_years: 1
            certificate_authority_id: "8dfb2a33-4f8e-4ad3-8c59-95e2c1cc7a11"
            flag_administration_id: "7a9b2a10-7b3d-4b2f-9a10-814b0e8a9c77"
            certificate_term: "FULL_TERM"
    responses:
      "201":
        description: Certificate generated
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Certificate generated successfully"
                data:
                  $ref: '#/components/schemas/CertificateResponse'
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/certificates/upload-url:
  get:
    tags: [Certificates]
    summary: Get presigned URL for certificate upload
    description: |
      Returns a presigned S3 URL for uploading external certificates. ADMIN, GM, TM only.
      
      **IMPORTANT:** When performing the `PUT` request to the returned `uploadUrl`, you **MUST NOT** include the `Authorization` (Bearer token) header. Presigned URLs already contain authentication in the query parameters. Including both will cause an `InvalidArgument` error from S3.
    security: [{ bearerAuth: [] }]
    operationId: getCertificateUploadUrl
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: fileName
        in: query
        required: true
        schema: { type: string, example: "certificate.pdf" }
      - name: contentType
        in: query
        required: true
        schema: { type: string, example: "application/pdf" }
    responses:
      "200":
        description: Presigned URL generated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    upload_url: { type: string, format: uri }
                    key: { type: string }

/api/v1/certificates/vessel/{vesselId}/external:
  post:
    tags: [Certificates]
    summary: Upload external certificate
    description: Manually upload an external certificate for a vessel. ADMIN, GM, TM only.
    security: [{ bearerAuth: [] }]
    operationId: uploadExternalCertificate
    x-roles: [ADMIN, GM, TM]
    parameters:
      - name: vesselId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UploadExternalCertificateRequest'
    responses:
      "201":
        description: External certificate uploaded
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/CertificateResponse' }

/api/v1/certificates/types:
  get:
    tags: [Certificates]
    summary: List certificate types (minimal)
    description: |
      Returns a lightweight list of all active certificate types.
      **Does NOT include `required_documents`** — use `GET /types/:id` to fetch
      the full detail with required documents for a specific type.

      Pass `?include_inactive=true` (ADMIN / GM only) to also see inactive types.

      **Roles:** CLIENT, ADMIN, GM, TM, TO, SURVEYOR
    security: [{ bearerAuth: [] }]
    operationId: getCertificateTypes
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: include_inactive
        in: query
        description: Include INACTIVE types (ADMIN / GM only)
        schema: { type: boolean, default: false }
    responses:
      "200":
        description: Minimal list of certificate types
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      name: { type: string, example: "Class Certificate" }
                      issuing_authority:
                        type: string
                        enum: [CLASS, FLAG]
                      validity_years: { type: integer, example: 5 }
                      status:
                        type: string
                        enum: [ACTIVE, INACTIVE]
                      requires_survey: { type: boolean, example: true }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Certificates]
    summary: Create certificate type
    description: Create a new certificate type with optional required documents. ADMIN only.
    operationId: createCertificateType
    x-roles: [ADMIN]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CertificateTypeCreateRequest'
          example:
            name: "Safety Construction"
            issuing_authority: "CLASS"
            validity_years: 5
            status: "ACTIVE"
            description: "Main classification certificate for construction"
            requires_survey: true
            required_documents:
              - document_name: "Bill of Sale"
                is_mandatory: true
              - document_name: "Builder Certificate"
                is_mandatory: false
    responses:
      "201":
        description: Certificate type created
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Certificate type created" }
                data: { $ref: '#/components/schemas/CertificateTypeDetailResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "409":
        description: A certificate type with this name already exists
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/certificates/types/{id}:
  get:
    tags: [Certificates]
    summary: Get certificate type detail (with required documents)
    description: |
      Returns the **full detail** of a single certificate type, including:
      - All metadata fields (`description`, `requires_survey`, etc.)
      - The complete list of `required_documents` with their `is_mandatory` flag

      This is the endpoint to call **before creating a job** to know which
      documents must be uploaded.

      **Roles:** CLIENT, ADMIN, GM, TM, TO, SURVEYOR
    security: [{ bearerAuth: [] }]
    operationId: getCertificateTypeById
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        description: Certificate type UUID
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Certificate type detail with required documents
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/CertificateTypeDetailResponse' }
            example:
              success: true
              data:
                id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                name: "Class Certificate"
                issuing_authority: "CLASS"
                validity_years: 5
                status: "ACTIVE"
                description: "Annual classification survey certificate"
                requires_survey: true
                CertificateRequiredDocuments:
                  - id: "019c79a4-0001-0000-0000-000000000001"
                    document_name: "Registry Certificate"
                    is_mandatory: true
                  - id: "019c79a4-0001-0000-0000-000000000002"
                    document_name: "Previous Survey Report"
                    is_mandatory: false
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Certificate type not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  put:
    tags: [Certificates]
    summary: Update certificate type
    description: Update an existing certificate type and its required documents. ADMIN or TM only.
    operationId: updateCertificateType
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CertificateTypeUpdateRequest'
          example:
            name: "Safety Construction (Updated)"
            issuing_authority: "CLASS"
            validity_years: 5
            status: "ACTIVE"
            description: "Updated classification certificate for construction"
            requires_survey: true
            required_documents:
              - document_name: "Bill of Sale"
                is_mandatory: true
              - document_name: "Builder Certificate"
                is_mandatory: false
              - document_name: "Previous Registry Certificate"
                is_mandatory: true
    responses:
      "200":
        description: Certificate type updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: '#/components/schemas/CertificateTypeDetailResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Certificate type not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/certificates/types/{id}/required-documents:
  get:
    tags: [Certificates]
    summary: List required documents for a certificate type
    description: |
      Returns the list of required documents configured for a certificate type.
      **Roles:** ADMIN, TM
    security: [{ bearerAuth: [] }]
    operationId: getCertificateTypeRequiredDocuments
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Certificate type UUID
    responses:
      "200":
        description: Required documents list
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/CertificateRequiredDocument'
            example:
              success: true
              data:
                - id: "019c79a4-0001-0000-0000-000000000001"
                  certificate_type_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                  document_name: "Registry Certificate"
                  is_mandatory: true
                  created_at: "2026-04-13T12:00:00.000Z"
                  updated_at: "2026-04-13T12:00:00.000Z"
                - id: "019c79a4-0001-0000-0000-000000000002"
                  certificate_type_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                  document_name: "Previous Survey Report"
                  is_mandatory: false
                  created_at: "2026-04-13T12:00:00.000Z"
                  updated_at: "2026-04-13T12:00:00.000Z"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Certificate type not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  post:
    tags: [Certificates]
    summary: Add required document for a certificate type
    description: |
      Adds a single required document to a certificate type.
      **Roles:** ADMIN, TM
    security: [{ bearerAuth: [] }]
    operationId: addCertificateTypeRequiredDocument
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CertificateRequiredDocumentCreateRequest'
          example:
            document_name: "Registry Certificate"
            is_mandatory: true
    responses:
      "201":
        description: Required document created
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Required document added" }
                data:
                  $ref: '#/components/schemas/CertificateRequiredDocument'
            example:
              success: true
              message: "Required document added"
              data:
                id: "019c79a4-0001-0000-0000-000000000003"
                certificate_type_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                document_name: "Registry Certificate"
                is_mandatory: true
                created_at: "2026-04-13T12:00:00.000Z"
                updated_at: "2026-04-13T12:00:00.000Z"
      "400":
        description: Validation error
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Certificate type not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "409":
        description: Required document already exists
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/certificates/types/{id}/required-documents/{docId}:
  put:
    tags: [Certificates]
    summary: Update required document for a certificate type
    description: |
      Updates a single required document (name and/or is_mandatory).
      **Roles:** ADMIN, TM
    security: [{ bearerAuth: [] }]
    operationId: updateCertificateTypeRequiredDocument
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: docId
        in: path
        required: true
        schema: { type: string, format: uuid }
        description: Required document UUID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CertificateRequiredDocumentUpdateRequest'
          example:
            document_name: "Registry Certificate (Updated)"
            is_mandatory: false
    responses:
      "200":
        description: Required document updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Required document updated" }
                data:
                  $ref: '#/components/schemas/CertificateRequiredDocument'
            example:
              success: true
              message: "Required document updated"
              data:
                id: "019c79a4-0001-0000-0000-000000000003"
                certificate_type_id: "019c79a4-55ba-773c-9454-f6bee169ab03"
                document_name: "Registry Certificate (Updated)"
                is_mandatory: false
                created_at: "2026-04-13T12:00:00.000Z"
                updated_at: "2026-04-13T12:05:00.000Z"
      "400":
        description: Validation error / wrong type mapping
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Document not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "409":
        description: Duplicate document name
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

  delete:
    tags: [Certificates]
    summary: Delete required document for a certificate type
    description: |
      Deletes a required document if it is not used in any job documents.
      If already used, returns **409**.
      **Roles:** ADMIN, TM
    security: [{ bearerAuth: [] }]
    operationId: deleteCertificateTypeRequiredDocument
    x-roles: [ADMIN, TM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: docId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                message: { type: string, example: "Required document deleted" }
                data:
                  type: object
                  properties:
                    deleted: { type: boolean, example: true }
            example:
              success: true
              message: "Required document deleted"
              data:
                deleted: true
      "401":
        description: Unauthorized
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "403":
        description: Forbidden
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "404":
        description: Document not found
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }
      "409":
        description: Cannot delete (document already used in jobs)
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorResponse' }

/api/v1/certificates/bulk-renew:
  post:
    tags: [Certificates]
    summary: Bulk renew certificates
    description: Renew multiple certificates in one operation. ADMIN, TM only.
    operationId: bulkRenewCertificates
    x-roles: [ADMIN, TM]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [certificate_ids]
            properties:
              certificate_ids:
                type: array
                items: { type: string, format: uuid }
              validity_years: { type: integer, default: 1 }
              reason: { type: string }
    responses:
      "200":
        description: Bulk renewal completed
      "403":
        description: Forbidden

/api/v1/certificates/expiring:
  get:
    tags: [Certificates]
    summary: Get expiring certificates
    description: Get certificates expiring within a date range. ADMIN, GM, TM, TO, CLIENT.
    operationId: getExpiringCertificates
    x-roles: [CLIENT, ADMIN, GM, TM, TO]
    parameters:
      - name: days
        in: query
        schema:
          type: integer
          default: 90
    responses:
      "200":
        description: Expiring certificates
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/CertificateSummary'

/api/v1/certificates/job/{jobId}:
  get:
    tags: [Certificates]
    summary: Get certificate by job ID
    description: |
      Get the certificate associated with a specific job ID.
      **Access:** Limited by job ownership/assignment.
    security: [{ bearerAuth: [] }]
    operationId: getCertificateByJobId
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Certificate details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Certificate for job fetched successfully"
                data:
                  $ref: '#/components/schemas/CertificateResponse'
      "404":
        description: Job not found or certificate not yet generated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/certificates/vessel/{vesselId}:
  get:
    tags: [Certificates]
    summary: Get certificates by vessel
    description: Get all certificates for a specific vessel. Scope restricted (SURVEYOR only assigned, CLIENT only owned).
    operationId: getCertificatesByVessel
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: vesselId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Vessel certificates
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    $ref: '#/components/schemas/CertificateSummary'

/api/v1/certificates/{id}:
  get:
    tags: [Certificates]
    summary: Get certificate by ID
    description: |
      Get certificate details by ID. Same RBAC as list: ADMIN/GM/TM/TO see all; SURVEYOR only assigned jobs' vessels; CLIENT only own company. Returns 403 if certificate exists but user has no access.
    security: [{ bearerAuth: [] }]
    operationId: getCertificateById
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Certificate details
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  $ref: '#/components/schemas/CertificateResponse'
      "403":
        description: Forbidden - certificate exists but user has no access
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      "404":
        description: Certificate not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/certificates/{id}/download:
  get:
    tags: [Certificates]
    summary: Download certificate PDF
    description: |
      Redirects to the certificate PDF URL for download. If the certificate has a stored PDF (pdf_file_url), returns 302 redirect to that URL so the browser can open or download the file.
      CLIENT can only download certificates for their vessels.
    operationId: downloadCertificate
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Certificate ID
    responses:
      "200":
        description: Successful download (in case of direct file stream rather than redirect)
        content:
          application/pdf:
            schema:
              type: string
              format: binary
      "302":
        description: Redirect to certificate PDF URL
        headers:
          Location:
            description: URL of the certificate PDF
            schema:
              type: string
              example: "https://storage.example.com/certificates/abc-123.pdf"
      "404":
        description: Certificate not found or PDF not available
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: false
                message:
                  type: string
                  example: "Certificate PDF is not available for download yet."

