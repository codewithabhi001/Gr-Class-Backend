/api/v1/certificates/authorities/upload-logo:
  get:
    tags: [Certificates]
    summary: Get logo upload URL
    description: |
      Returns a presigned S3 URL for uploading an authority logo. ADMIN only.
      
      **IMPORTANT:** When performing the `PUT` request to the returned `uploadUrl`, you **MUST NOT** include the `Authorization` (Bearer token) header. Presigned URLs already contain authentication in the query parameters. Including both will cause an `InvalidArgument` error from S3.
    security: [{ bearerAuth: [] }]
    operationId: getAuthorityLogoUploadUrl
    x-roles: [ADMIN]
    parameters:
      - name: fileName
        in: query
        required: true
        schema: { type: string, example: "authority-logo.png" }
      - name: contentType
        in: query
        required: true
        schema: { type: string, example: "image/png" }
    responses:
      "200":
        description: Presigned URL generated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    upload_url: { type: string, format: uri }
                    key: { type: string }

