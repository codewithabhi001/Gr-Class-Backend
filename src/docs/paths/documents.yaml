/api/v1/documents/get-upload-url:
  get:
    tags: [Documents]
    summary: Generate a pre-signed URL for direct S3 upload
    description: Returns a temporary S3 URL where the client can PUT the file binary, and a fileKey to be used for registration.
    operationId: getUploadSignedUrl
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    parameters:
      - name: fileName
        in: query
        required: true
        schema: { type: string, example: "report.pdf" }
      - name: fileType
        in: query
        required: true
        description: MIME type of the file
        schema: { type: string, example: "application/pdf" }
      - name: folder
        in: query
        required: false
        schema: { type: string, example: "surveys" }
    responses:
      "200":
        description: Pre-signed URL generated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    uploadUrl: { type: string }
                    fileKey: { type: string }

/api/v1/documents/upload:
  post:
    tags: [Documents]
    summary: Upload a standalone document file (Multipart)
    description: Standard way to upload a file through the backend server. Use Pre-signed URL for better performance.
    operationId: uploadStandaloneFile
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
              folder:
                type: string
                description: "Optional folder name for grouping (e.g. 'vessels', 'user-docs')"
    responses:
      "201":
        description: File uploaded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    file_url: { type: string, example: "https://bucket.s3.amazonaws.com/temp/my-file.pdf" }
      "400": { description: "No file provided" }
      "403": { description: Forbidden }

/api/v1/documents/register:
  post:
    tags: [Documents]
    summary: Register an already uploaded S3 file (Standalone)
    description: Use this after direct-to-S3 upload to register the file in the backend.
    operationId: registerStandaloneFile
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [fileKey]
            properties:
              fileKey: { type: string, description: "The fileKey returned from get-upload-url" }
              fileType: { type: string, description: "MIME type" }
              document_type: { type: string }
              description: { type: string }
    responses:
      "201": { description: Registered }
      "403": { description: Forbidden }

/api/v1/documents/{entityType}/{entityId}/register:
  post:
    tags: [Documents]
    summary: Register an already uploaded S3 file for a specific entity
    description: Similar to direct upload but uses JSON registration.
    operationId: registerEntityDocument
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    parameters:
      - name: entityType
        in: path
        required: true
        schema: { type: string, example: "JOB" }
      - name: entityId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [fileData]
            properties:
              fileData:
                type: object
                required: [url, type]
                properties:
                  url: { type: string }
                  type: { type: string }
              document_type: { type: string }
              description: { type: string }
    responses:
      "201": { description: Registered }
      "403": { description: Forbidden }

/api/v1/documents/{entityType}/{entityId}:
  get:
    tags: [Documents]
    summary: Get documents
    operationId: getDocuments
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: entityType
        in: path
        required: true
        description: The type of entity (e.g., VESSEL, JOB, CERTIFICATE, USER, SURVEY)
        schema: { type: string, example: "JOB" }
      - name: entityId
        in: path
        required: true
        description: The UUID of the specific entity
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: List of documents retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      entity_type: { type: string }
                      entity_id: { type: string, format: uuid }
                      file_url: { type: string }
                      uploaded_at: { type: string, format: date-time }
      "403": { description: Forbidden }

  post:
    tags: [Documents]
    summary: Upload document
    operationId: uploadDocument
    x-roles: [CLIENT, ADMIN, GM, TM, SURVEYOR]
    parameters:
      - name: entityType
        in: path
        required: true
        description: The type of entity to attach the document to (e.g., VESSEL, JOB, CERTIFICATE, USER, SURVEY)
        schema: 
          type: string
          example: "JOB"
      - name: entityId
        in: path
        required: true
        description: The UUID of the specific entity
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [files]
            properties:
              files: 
                type: array
                items:
                  type: string
                  format: binary
              document_type: { type: string, description: "Type of document (e.g., EVIDENCE, REPORT)" }
              description: { type: string, description: "Optional description of the document" }
        application/json:
          schema:
            type: object
            required: [fileData]
            properties:
              fileData:
                type: object
                required: [url, type]
                properties:
                  url: { type: string, description: "The fileKey returned from get-upload-url" }
                  type: { type: string, description: "MIME type" }
              document_type: { type: string }
              description: { type: string }
    responses:
      "201":
        description: Documents uploaded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                count: { type: integer, example: 2 }
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      file_url: { type: string }
                      document_type: { type: string }
                      description: { type: string }
      "403": { description: Forbidden }

/api/v1/documents/{id}:
  get:
    tags: [Documents]
    summary: Get document by ID
    operationId: getDocumentById
    x-roles: [CLIENT, ADMIN, GM, TM, TO, SURVEYOR]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Document retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    entity_type: { type: string }
                    entity_id: { type: string, format: uuid }
                    file_url: { type: string }
                    uploaded_at: { type: string, format: date-time }
      "404": { description: Document not found }
      "403": { description: Forbidden }

  delete:
    tags: [Documents]
    summary: Delete document
    operationId: deleteDocument
    x-roles: [ADMIN, GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Document deleted }
      "403": { description: Forbidden }
