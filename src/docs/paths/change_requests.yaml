/api/v1/change-requests:
  post:
    tags: [Change Requests]
    summary: Create change request
    operationId: createChangeRequest
    x-roles: [CLIENT, ADMIN, GM, TM]
    requestBody:
      description: "Payload to create a change request for any entity (Vessel, Certificate, etc.)"
      content:
        application/json:
          schema:
            type: object
            required: [entity_type, entity_id, change_description, old_value, new_value]
            properties:
              entity_type:
                type: string
                description: "The type of entity being changed (e.g., VESSEL, CLIENT, CERTIFICATE)"
              entity_id:
                type: string
                format: uuid
                description: "The unique ID (UUID) of the entity"
              change_description:
                type: string
                description: "Business reason or narrative for the requested change"
              old_value:
                type: object
                description: "Current values of the fields in the database"
              new_value:
                type: object
                description: "Desired new values for the fields"
              priority:
                type: string
                enum: [LOW, MEDIUM, HIGH]
                default: MEDIUM
          example:
            entity_type: "VESSEL"
            entity_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
            change_description: "Request to update vessel name from 'MV Star' to 'MV Pacific Star'"
            old_value:
              vessel_name: "MV Star"
            new_value:
              vessel_name: "MV Pacific Star"
            priority: "MEDIUM"
    responses:
      "201": { description: Change request created successfully }
      "403": { description: Forbidden }

  get:
    tags: [Change Requests]
    summary: Get change requests
    operationId: getChangeRequests
    x-roles: [ADMIN, GM, TM, CLIENT]
    responses:
      "200": { description: List of change requests }
      "403": { description: Forbidden }

/api/v1/change-requests/{id}:
  get:
    tags: [Change Requests]
    summary: Get change request by ID
    operationId: getChangeRequestById
    x-roles: [ADMIN, GM, TM, CLIENT]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200": { description: Change request details }
      "403": { description: Forbidden }
      "404": { description: Change request not found }

/api/v1/change-requests/{id}/approve:
  put:
    tags: [Change Requests]
    summary: Approve change request
    operationId: approveChangeRequest
    x-roles: [ADMIN, GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string }
          example:
            remarks: "Approved after document verification"
    responses:
      "200": { description: Request approved }
      "403": { description: Forbidden }

/api/v1/change-requests/{id}/reject:
  put:
    tags: [Change Requests]
    summary: Reject change request
    operationId: rejectChangeRequest
    x-roles: [ADMIN, GM]
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              remarks: { type: string }
          example:
            remarks: "Rejected due to incorrect vessel data"
    responses:
      "200": { description: Request rejected }
      "403": { description: Forbidden }

