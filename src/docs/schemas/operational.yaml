NonConformityResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    description:
      type: string
    severity:
      type: string
      enum: [MINOR, MAJOR, CRITICAL]
    status:
      type: string
      enum: [OPEN, CLOSED]
    closure_remarks:
      type: string
      nullable: true
    closed_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

IncidentResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    reported_by:
      $ref: '#/components/schemas/UUID'
    title:
      type: string
    description:
      type: string
    status:
      type: string
      enum: [OPEN, INVESTIGATING, RESOLVED, CLOSED]
    remarks:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

SupportTicketResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    user_id:
      $ref: '#/components/schemas/UUID'
    subject:
      type: string
    description:
      type: string
    status:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, URGENT]
    category:
      type: string
      nullable: true
    resolved_at:
      type: string
      format: date-time
      nullable: true
    resolved_by:
      $ref: '#/components/schemas/UUID'
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

FlagAdministrationResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    flag_state_name:
      type: string
    country:
      type: string
    authority_name:
      type: string
    contact_email:
      type: string
      format: email
    authorization_scope:
      type: string
    logo_url:
      type: string
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
