PaymentResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    invoice_number:
      type: string
    amount:
      type: number
    currency:
      type: string
    payment_status:
      type: string
      enum: [UNPAID, PAID, ON_HOLD]
    payment_date:
      type: string
      format: date-time
      nullable: true
    receipt_url:
      type: string
      format: uri
      nullable: true
    verified_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    refunded_amount:
      type: string
    amount_paid:
      type: string
    net_amount:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    JobRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        job_status: { type: string }
        Vessel:
          type: object
          properties:
            vessel_name: { type: string }

PaymentListResponse:
  type: object
  properties:
    count:
      type: integer
    rows:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'

CreateInvoiceRequest:
  type: object
  required:
    - job_id
    - amount
  properties:
    job_id:
      type: string
      format: uuid
    amount:
      type: number
      format: decimal
      minimum: 0
    currency:
      type: string
      default: "USD"
  example:
    job_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
    amount: 1500.00
    currency: "USD"

PartialPaymentRequest:
  type: object
  required:
    - amount
  properties:
    amount:
      type: number
      format: decimal
      minimum: 0
    remarks:
      type: string

FinancialSummaryResponse:
  type: object
  properties:
    total_outstanding:
      type: number
    total_paid:
      type: number
    total_invoiced:
      type: number
    payments:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'
