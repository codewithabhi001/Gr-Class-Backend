PaymentResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    invoice_number:
      type: string
    amount:
      type: number
    currency:
      type: string
    payment_status:
      type: string
      enum: [UNPAID, PARTIALLY_PAID, PAID, ON_HOLD]
    payment_date:
      type: string
      format: date-time
      nullable: true
      description: Set when invoice is fully paid (detail responses).
    created_at:
      type: string
      format: date-time
      description: Invoice created at (list).
    paid_at:
      type: string
      format: date-time
      nullable: true
      description: Full settlement date; null until payment_status is PAID (list).
    verified_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    amount_collected:
      type: string
      description: Total collected via advance + partial payments
    refunded_amount:
      type: string
    amount_paid:
      type: string
    net_amount:
      type: string
    remaining:
      type: string
      description: Remaining amount to be collected
    updated_at:
      type: string
      format: date-time
      description: Detail responses only
    JobRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        job_status: { type: string }
        Vessel:
          type: object
          properties:
            vessel_name: { type: string }

PaymentListResponse:
  type: object
  properties:
    count:
      type: integer
    rows:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'

CreateInvoiceRequest:
  type: object
  required:
    - job_id
    - amount
  properties:
    job_id:
      type: string
      format: uuid
    amount:
      type: number
      format: decimal
      minimum: 0
    currency:
      type: string
      default: "USD"
  example:
    job_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
    amount: 1500.00
    currency: "USD"

PartialPaymentRequest:
  type: object
  required:
    - amount
  properties:
    amount:
      type: number
      format: decimal
      minimum: 0
    type:
      type: string
      enum: [ADVANCE, PARTIAL_PAYMENT]
      default: PARTIAL_PAYMENT
      description: Use ADVANCE for upfront payments before work begins, PARTIAL_PAYMENT for installments during/after work
    remarks:
      type: string

FinancialSummaryResponse:
  type: object
  properties:
    total_outstanding:
      type: number
    total_paid:
      type: number
    total_invoiced:
      type: number
    payments:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'
