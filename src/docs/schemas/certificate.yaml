CertificateTemplateResponse:
  type: object
  description: A DOCX template (referenced by S3 key) used to render certificates.
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    template_name: { type: string }
    certificate_type_id: { $ref: '#/components/schemas/UUID' }
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]
      nullable: true
    template_file_url:
      type: string
      description: |
        S3 key for the .docx template (e.g.
        `certificate-templates/1714000000000_iopp_v1.docx`). This is what
        `getUploadUrl` returned as `fileKey`.
      nullable: true
    variables:
      type: array
      description: Variable names this template expects to receive at render time.
      items: { type: string }
    is_active: { type: boolean }
    created_at: { type: string, format: date-time }
    updated_at: { type: string, format: date-time }
    CertificateType:
      type: object
      nullable: true
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }

CertificateTemplateCreateRequest:
  type: object
  required: [template_name, certificate_type_id, template_file_url]
  description: |
    Body for `POST /api/v1/certificate-templates`.
    Required: `template_name`, `certificate_type_id`, `template_file_url`.
    Optional: `certificate_term`, `variables`, `is_active`.
  properties:
    template_name:
      type: string
      description: Human-readable template name.
    certificate_type_id:
      allOf:
        - $ref: '#/components/schemas/UUID'
      description: ID of the associated certificate type.
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]
      nullable: true
      description: If set, this template is used only for that term.
    template_file_url:
      type: string
      description: |
        S3 key returned by
        `GET /api/v1/certificate-templates/get-upload-url` (after the file
        has been uploaded to that pre-signed URL).
    variables:
      type: array
      description: Variable names this template expects at render time.
      items: { type: string }
    is_active:
      type: boolean
      default: true

CertificateTemplateUpdateRequest:
  type: object
  description: |
    Body for `PUT /api/v1/certificate-templates/{id}`. All fields optional —
    send only what you want to change. To swap the DOCX, send the new S3
    key as `template_file_url`.
  properties:
    template_name: { type: string }
    certificate_type_id:
      allOf:
        - $ref: '#/components/schemas/UUID'
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]
      nullable: true
    template_file_url: { type: string }
    variables:
      type: array
      items: { type: string }
    is_active: { type: boolean }

CertificateSummary:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    vessel_id: { $ref: '#/components/schemas/UUID' }
    certificate_type_id: { $ref: '#/components/schemas/UUID' }
    certificate_number: { type: string }
    issue_date: { type: string, format: date }
    expiry_date: { type: string, format: date }
    status:
      type: string
      enum: [DRAFT, ISSUED, VALID, EXPIRED, SUSPENDED, REVOKED]
    created_at: { type: string, format: date-time }
    Vessel:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        vessel_name: { type: string }
        imo_number: { type: string }
    CertificateType:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }

CertificateResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    certificate_number:
      type: string
    issue_date:
      type: string
      format: date
    expiry_date:
      type: string
      format: date
    status:
      type: string
      enum: [DRAFT, ISSUED, VALID, EXPIRED, SUSPENDED, REVOKED]
    qr_code_url:
      type: string
      format: uri
    pdf_file_url:
      type: string
      format: uri
    uploaded_file_url:
      type: string
      nullable: true
    generated_pdf_url:
      type: string
      nullable: true
    issued_at:
      type: string
      format: date-time
      nullable: true
    issued_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    CertificateType:
      type: object
      properties:
        name: { type: string }
    Vessel:
      type: object
      properties:
        vessel_name: { type: string }
        imo_number: { type: string }
    FlagState:
      type: object
      properties:
        flag_state_name: { type: string }
    source_type:
      type: string
      enum: [INTERNAL, EXTERNAL]
    version:
      type: integer
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]
    manual_text:
      type: object
    remarks:
      type: string
      nullable: true

CertificateTypeResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    requires_survey:
      type: boolean

CertificateTypeDetailResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
      nullable: true
    requires_survey:
      type: boolean
    CertificateRequiredDocuments:
      type: array
      items:
        $ref: '#/components/schemas/CertificateRequiredDocument'

CertificateTypeCreateRequest:
  type: object
  required:
    - name
    - issuing_authority
    - validity_years
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
      default: true
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Main classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false

CertificateTypeUpdateRequest:
  type: object
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction (Updated)"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Updated classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false
      - document_name: "Previous Registry Certificate"
        is_mandatory: true

GenerateCertificateRequest:
  type: object
  required:
    - job_id
  properties:
    job_id:
      $ref: '#/components/schemas/UUID'
      description: The root Job request ID
    job_certificate_id:
      $ref: '#/components/schemas/UUID'
      description: Optional/Required for multi-cert jobs to target a specific certificate
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
      default: 1
    issue_date:
      type: string
      format: date
      description: Custom issue date (defaults to current date if omitted)
    flag_administration_id:
      $ref: '#/components/schemas/UUID'
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]


CertActionRequest:
  type: object
  required:
    - reason
  properties:
    reason:
      type: string

RenewCertRequest:
  type: object
  required:
    - validity_years
    - reason
  properties:
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string

CertificateRequiredDocument:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    document_name:
      type: string
    is_mandatory:
      type: boolean
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CertificateRequiredDocumentCreateRequest:
  type: object
  required: [document_name]
  properties:
    document_name:
      type: string
      example: "Registry Certificate"
    is_mandatory:
      type: boolean
      default: true
  example:
    document_name: "Registry Certificate"
    is_mandatory: true

CertificateRequiredDocumentUpdateRequest:
  type: object
  properties:
    document_name:
      type: string
      example: "Registry Certificate (Updated)"
    is_mandatory:
      type: boolean
      example: false
  example:
    document_name: "Registry Certificate (Updated)"
    is_mandatory: false

UpdateCertificateDraftRequest:
  type: object
  properties:
    flag_administration_id: { $ref: '#/components/schemas/UUID' }
    certificate_term: { type: string, enum: [FULL_TERM, SHORT_TERM] }
    manual_text: { type: object }
    remarks: { type: string }
    issue_date: { type: string, format: date }
    expiry_date: { type: string, format: date }

UploadExternalCertificateRequest:
  oneOf:
    - type: object
      required: [certificates]
      properties:
        certificates:
          type: array
          minItems: 1
          items:
            type: object
            required: [certificate_type_id, certificate_number, issue_date, expiry_date, s3_key]
            properties:
              certificate_type_id: { $ref: '#/components/schemas/UUID' }
              certificate_number: { type: string }
              issue_date: { type: string, format: date }
              expiry_date: { type: string, format: date }
              s3_key: { type: string }
    - type: array
      minItems: 1
      items:
        type: object
        required: [certificate_type_id, certificate_number, issue_date, expiry_date, s3_key]
        properties:
          certificate_type_id: { $ref: '#/components/schemas/UUID' }
          certificate_number: { type: string }
          issue_date: { type: string, format: date }
          expiry_date: { type: string, format: date }
          s3_key: { type: string }
    - type: object
      required: [certificate_type_id, certificate_number, issue_date, expiry_date, s3_key]
      properties:
        certificate_type_id: { $ref: '#/components/schemas/UUID' }
        certificate_number: { type: string }
        issue_date: { type: string, format: date }
        expiry_date: { type: string, format: date }
        s3_key: { type: string }

CertificateHistoryResponse:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    status: { type: string }
    changed_by_user_id: { $ref: '#/components/schemas/UUID' }
    change_reason: { type: string }
    changed_at: { type: string, format: date-time }
