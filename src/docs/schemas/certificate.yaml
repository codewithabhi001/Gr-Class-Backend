CertificateSummary:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    vessel_id: { $ref: '#/components/schemas/UUID' }
    certificate_type_id: { $ref: '#/components/schemas/UUID' }
    certificate_number: { type: string }
    issue_date: { type: string, format: date }
    expiry_date: { type: string, format: date }
    status:
      type: string
      enum: [DRAFT, ISSUED, VALID, EXPIRED, SUSPENDED, REVOKED]
    created_at: { type: string, format: date-time }
    Vessel:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        vessel_name: { type: string }
        imo_number: { type: string }
    CertificateType:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }

CertificateResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    certificate_number:
      type: string
    issue_date:
      type: string
      format: date
    expiry_date:
      type: string
      format: date
    status:
      type: string
      enum: [DRAFT, ISSUED, VALID, EXPIRED, SUSPENDED, REVOKED]
    qr_code_url:
      type: string
      format: uri
    pdf_file_url:
      type: string
      format: uri
    uploaded_file_url:
      type: string
      nullable: true
    generated_pdf_url:
      type: string
      nullable: true
    issued_at:
      type: string
      format: date-time
      nullable: true
    issued_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    CertificateType:
      type: object
      properties:
        name: { type: string }
    Vessel:
      type: object
      properties:
        vessel_name: { type: string }
        imo_number: { type: string }
    FlagState:
      type: object
      properties:
        flag_state_name: { type: string }
    Authority:
      $ref: '#/components/schemas/CertificateAuthorityResponse'
    source_type:
      type: string
      enum: [INTERNAL, EXTERNAL]
    version:
      type: integer
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]
    manual_text:
      type: object
    remarks:
      type: string
      nullable: true

CertificateTypeResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    requires_survey:
      type: boolean

CertificateTypeDetailResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
      nullable: true
    requires_survey:
      type: boolean
    CertificateRequiredDocuments:
      type: array
      items:
        $ref: '#/components/schemas/CertificateRequiredDocument'

CertificateTypeCreateRequest:
  type: object
  required:
    - name
    - issuing_authority
    - validity_years
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
      default: true
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Main classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false

CertificateTypeUpdateRequest:
  type: object
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction (Updated)"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Updated classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false
      - document_name: "Previous Registry Certificate"
        is_mandatory: true

GenerateCertificateRequest:
  type: object
  required:
    - job_id
  properties:
    job_id:
      $ref: '#/components/schemas/UUID'
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
      default: 1
    certificate_authority_id:
      $ref: '#/components/schemas/UUID'
    flag_administration_id:
      $ref: '#/components/schemas/UUID'
    certificate_term:
      type: string
      enum: [FULL_TERM, SHORT_TERM]

CertActionRequest:
  type: object
  required:
    - reason
  properties:
    reason:
      type: string

RenewCertRequest:
  type: object
  required:
    - validity_years
    - reason
  properties:
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string

CertificateRequiredDocument:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    document_name:
      type: string
    is_mandatory:
      type: boolean

CertificateAuthorityResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name: { type: string }
    code: { type: string }
    country: { type: string }
    logo_url: { type: string, nullable: true }
    status: { type: string, enum: [ACTIVE, INACTIVE] }

CreateCertificateAuthorityRequest:
  type: object
  required: [name, code, country]
  properties:
    name: { type: string }
    code: { type: string }
    country: { type: string }
    logo_url: { type: string }
    status: { type: string, enum: [ACTIVE, INACTIVE] }
  example:
    name: "Liberian Registry"
    code: "LISCR"
    country: "Liberia"
    logo_url: "authorities/logos/liscr.png"
    status: "ACTIVE"

UpdateCertificateAuthorityRequest:
  type: object
  properties:
    name: { type: string }
    code: { type: string }
    country: { type: string }
    logo_url: { type: string }
    status: { type: string, enum: [ACTIVE, INACTIVE] }
  example:
    logo_url: "authorities/logos/new-logo.png"

UpdateCertificateDraftRequest:
  type: object
  properties:
    flag_administration_id: { $ref: '#/components/schemas/UUID' }
    certificate_authority_id: { $ref: '#/components/schemas/UUID' }
    certificate_term: { type: string, enum: [FULL_TERM, SHORT_TERM] }
    manual_text: { type: object }
    remarks: { type: string }
    issue_date: { type: string, format: date }
    expiry_date: { type: string, format: date }

UploadExternalCertificateRequest:
  type: object
  required: [certificate_type_id, certificate_number, issue_date, expiry_date, s3_key]
  properties:
    certificate_type_id: { $ref: '#/components/schemas/UUID' }
    certificate_authority_id: { $ref: '#/components/schemas/UUID' }
    certificate_number: { type: string }
    issue_date: { type: string, format: date }
    expiry_date: { type: string, format: date }
    s3_key: { type: string }

CertificateHistoryResponse:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    status: { type: string }
    changed_by_user_id: { $ref: '#/components/schemas/UUID' }
    change_reason: { type: string }
    changed_at: { type: string, format: date-time }
