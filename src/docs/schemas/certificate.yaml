CertificateResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    certificate_number:
      type: string
    issue_date:
      type: string
      format: date
    expiry_date:
      type: string
      format: date
    status:
      type: string
      enum: [VALID, EXPIRED, SUSPENDED, REVOKED]
    qr_code_url:
      type: string
      format: uri
    pdf_file_url:
      type: string
      format: uri
    issued_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    CertificateType:
      type: object
      properties:
        name: { type: string }
    Vessel:
      type: object
      properties:
        vessel_name: { type: string }
        imo_number: { type: string }

CertificateTypeResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    requires_survey:
      type: boolean

CertificateTypeDetailResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    short_code:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
      nullable: true
    requires_survey:
      type: boolean
    CertificateRequiredDocuments:
      type: array
      items:
        $ref: '#/components/schemas/CertificateRequiredDocument'

CertificateTypeCreateRequest:
  type: object
  required:
    - name
    - issuing_authority
    - validity_years
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
      default: true
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Main classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false

CertificateTypeUpdateRequest:
  type: object
  properties:
    name:
      type: string
    issuing_authority:
      type: string
      enum: [CLASS, FLAG]
    validity_years:
      type: integer
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    description:
      type: string
    requires_survey:
      type: boolean
    required_documents:
      type: array
      items:
        type: object
        properties:
          document_name:
            type: string
          is_mandatory:
            type: boolean
  example:
    name: "Safety Construction (Updated)"
    issuing_authority: "CLASS"
    validity_years: 5
    status: "ACTIVE"
    description: "Updated classification certificate for construction"
    requires_survey: true
    required_documents:
      - document_name: "Bill of Sale"
        is_mandatory: true
      - document_name: "Builder Certificate"
        is_mandatory: false
      - document_name: "Previous Registry Certificate"
        is_mandatory: true

GenerateCertificateRequest:
  type: object
  required:
    - job_id
  properties:
    job_id:
      $ref: '#/components/schemas/UUID'
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
      default: 1

CertActionRequest:
  type: object
  required:
    - reason
  properties:
    reason:
      type: string

RenewCertRequest:
  type: object
  required:
    - validity_years
    - reason
  properties:
    validity_years:
      type: integer
      minimum: 1
      maximum: 5
    reason:
      type: string

CertificateRequiredDocument:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    document_name:
      type: string
    is_mandatory:
      type: boolean
