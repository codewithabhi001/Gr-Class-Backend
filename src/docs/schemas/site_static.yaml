SiteStaticContent:
  type: object
  properties:
    id:
      type: string
      format: uuid
      example: "018f2a3b-7c4d-4e5f-9a1b-2c3d4e5f6g7h"
    slug:
      type: string
      example: "new-vessel-launch-2026"
    title:
      type: string
      example: "Girik Class Launches Next-Gen Survey Platform"
    content_type:
      type: string
      enum: [PAGE, FAQ, NEWS]
      example: "NEWS"
    body_html:
      type: string
      nullable: true
      example: "<h1>Strategic Launch</h1><p>Girik Class sets new industry benchmarks...</p>"
    thumbnail_url:
      type: string
      format: uri
      nullable: true
      example: "https://grclass.com/assets/news-thumb-001.jpg"
    faq_items:
      type: array
      nullable: true
      items:
        type: object
        properties:
          question: { type: string }
          answer: { type: string }
          sort_order: { type: integer }
    is_published:
      type: boolean
      example: true
    published_at:
      type: string
      format: date-time
      example: "2026-04-03T12:00:00Z"
    updated_at:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time

SiteStaticContentInput:
  type: object
  required:
    - slug
    - title
    - content_type
  oneOf:
    - title: PAGE Content
      required: [body_html]
      properties:
        slug: { type: string, example: "about-us" }
        title: { type: string, example: "About Us" }
        content_type: { type: string, enum: [PAGE], example: "PAGE" }
        body_html: { type: string, example: "<p>About content...</p>" }
        is_published: { type: boolean, example: true }
    - title: NEWS Content
      required: [body_html]
      properties:
        slug: { type: string, example: "news-1" }
        title: { type: string, example: "Recent Industry Update" }
        content_type: { type: string, enum: [NEWS], example: "NEWS" }
        body_html: { type: string, example: "<p>News article...</p>" }
        thumbnail_url: { type: string, example: "https://example.com/thumb.jpg" }
        published_at: { type: string, format: date-time, example: "2026-04-03T10:00:00Z" }
        is_published: { type: boolean, example: true }
    - title: FAQ Content
      required: [faq_items]
      properties:
        slug: { type: string, example: "faq-vessel" }
        title: { type: string, example: "Vessel FAQ" }
        content_type: { type: string, enum: [FAQ], example: "FAQ" }
        faq_items:
          type: array
          items:
            type: object
            required: [question, answer]
            properties:
              question: { type: string, example: "Q?" }
              answer: { type: string, example: "A." }
              sort_order: { type: integer, example: 0 }
        is_published: { type: boolean, example: true }


