JobCreateRequest:
  type: object
  required:
    - vessel_id
    - certificate_type_id
    - reason
    - target_port
    - target_date
  properties:
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
      example: "Annual survey due"
    target_port:
      type: string
      example: "Singapore"
    target_date:
      type: string
      format: date
      example: "2026-03-15"
    remarks:
      type: string
    uploaded_documents:
      type: array
      items:
        type: object
        required: [required_document_id, file_url]
        properties:
          required_document_id:
            $ref: '#/components/schemas/UUID'
          file_url:
            type: string

JobResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    requested_by_user_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
    target_port:
      type: string
    target_date:
      type: string
      format: date
    job_status:
      type: string
      enum: [CREATED, DOCUMENT_VERIFIED, APPROVED, ASSIGNED, SURVEY_AUTHORIZED, IN_PROGRESS, SURVEY_DONE, REVIEWED, FINALIZED, REWORK_REQUESTED, PAYMENT_DONE, CERTIFIED, REJECTED]
    priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]
    assigned_surveyor_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    assigned_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    approved_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    generated_certificate_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    remarks:
      type: string
      nullable: true
    is_survey_required:
      type: boolean
    reschedule_count:
      type: integer
    payment_status:
      type: string
      example: "UNPAID"
    certificate_url:
      type: string
      format: uri
      nullable: true
    certificate_number:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    Vessel:
      $ref: '#/components/schemas/VesselSummary'
    CertificateType:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        issuing_authority: { type: string }
    survey:
      type: object
      properties:
        id: { type: string, format: uuid }
        survey_status: { type: string }
        survey_statement_status: { type: string }
        started_at: { type: string, format: date-time }
        submitted_at: { type: string, format: date-time }
    Payments:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        survey_status:
          type: string
          enum: [NOT_STARTED, STARTED, CHECKLIST_SUBMITTED, PROOF_UPLOADED, SUBMITTED, REWORK_REQUIRED, FINALIZED]
          example: "NOT_STARTED"
        survey_statement_status:
          type: string
          enum: [NOT_PREPARED, DRAFT, ISSUED]
          example: "NOT_PREPARED"
        started_at:
          type: string
          format: date-time
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        start_latitude: { type: number, nullable: true }
        start_longitude: { type: number, nullable: true }
        submit_latitude: { type: number, nullable: true }
        submit_longitude: { type: number, nullable: true }
        declared_by: { $ref: '#/components/schemas/UUID', nullable: true }
        declared_at: { type: string, format: date-time, nullable: true }
        declaration_hash: { type: string, nullable: true }
        SurveyStatusHistories:
          type: array
          items:
            type: object
            properties:
              id: { $ref: '#/components/schemas/UUID' }
              previous_status: { type: string, nullable: true }
              new_status: { type: string }
              changed_by: { $ref: '#/components/schemas/UUID' }
              reason: { type: string, nullable: true }
              created_at: { type: string, format: date-time }
    priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]
      default: NORMAL
      description: "Management priority flag. Set/changed via PUT /jobs/:id/priority — not accepted at creation time."
    vessel:
      $ref: '#/components/schemas/VesselSummary'
    certificate_type:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  example:
    id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
    vessel_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
    job_status: "CREATED"
    reason: "Annual survey due"
    target_port: "Singapore"
    target_date: "2026-03-15"

JobStatusUpdateRequest:
  type: object
  required: [status]
  properties:
    status:
      type: string
      enum: [CREATED, APPROVED, ASSIGNED, SURVEY_AUTHORIZED, IN_PROGRESS, SURVEY_DONE, REVIEWED, FINALIZED, REWORK_REQUESTED, PAYMENT_DONE, CERTIFIED, REJECTED]
    remarks:
      type: string

AssignSurveyorRequest:
  type: object
  properties:
    surveyorId:
      $ref: '#/components/schemas/UUID'
    surveyor_id:
      $ref: '#/components/schemas/UUID'
    remarks:
      type: string

ReassignJobRequest:
  type: object
  required:
    - reason
  properties:
    surveyorId:
      $ref: '#/components/schemas/UUID'
    surveyor_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string

RescheduleJobRequest:
  type: object
  required:
    - new_target_date
    - new_target_port
    - reason
  properties:
    new_target_date:
      type: string
      format: date
    new_target_port:
      type: string
    reason:
      type: string

JobCancelRequest:
  type: object
  required: [reason]
  properties:
    reason:
      type: string

JobRejectRequest:
  type: object
  required: [reason]
  properties:
    reason:
      type: string

JobEvidenceUploadRequest:
  type: object
  required: [job_id, context]
  properties:
    job_id:
      $ref: '#/components/schemas/UUID'
    context:
      type: string
      example: "SURVEY_PHOTOS"
    description:
      type: string

AddNoteRequest:
  type: object
  required:
    - note_text
  properties:
    note_text:
      type: string
    is_internal:
      type: boolean
      default: true

MessageCreateRequest:
  type: object
  required:
    - content
  properties:
    content:
      type: string

JobHistoryItem:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    old_status:
      type: string
      nullable: true
    new_status:
      type: string
    changed_by:
      $ref: '#/components/schemas/UUID'
    change_reason:
      type: string
    created_at:
      type: string
      format: date-time
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string

JobNoteResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    user_id:
      $ref: '#/components/schemas/UUID'
    note_text:
      type: string
    is_internal:
      type: boolean
    created_at:
      type: string
      format: date-time

JobMessageResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    sender_id:
      $ref: '#/components/schemas/UUID'
    message_text:
      type: string
    is_internal:
      type: boolean
    attachment_url:
      type: string
      format: uri
      nullable: true
    created_at:
      type: string
      format: date-time
    Sender:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
