JobSummary:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    job_status: { type: string }
    vessel_id: { $ref: '#/components/schemas/UUID' }
    certificate_type_id: { $ref: '#/components/schemas/UUID' }
    target_port: { type: string }
    target_date: { type: string, format: date }
    priority: { type: string }
    createdAt: { type: string, format: date-time }
    Vessel:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        vessel_name: { type: string }
        imo_number: { type: string }
    CertificateType:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
    survey:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        survey_status: { type: string }
    payment_status: { type: string }

JobCreateRequest:
  type: object
  required:
    - vessel_id
    - certificate_type_id
    - reason
    - target_port
    - target_date
  properties:
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
      example: "Annual survey due"
    target_port:
      type: string
      example: "Singapore"
    target_date:
      type: string
      format: date
      example: "2026-03-15"
    remarks:
      type: string
    uploaded_documents:
      type: array
      items:
        type: object
        required: [required_document_id, file_url]
        properties:
          required_document_id:
            $ref: '#/components/schemas/UUID'
          file_url:
            type: string

JobResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    requested_by_user_id:
      $ref: '#/components/schemas/UUID'
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
    target_port:
      type: string
    target_date:
      type: string
      format: date
    job_status:
      type: string
      enum: [CREATED, DOCUMENT_VERIFIED, APPROVED, ASSIGNED, SURVEY_AUTHORIZED, IN_PROGRESS, SURVEY_DONE, REVIEWED, FINALIZED, REWORK_REQUESTED, PAYMENT_DONE, CERTIFIED, REJECTED]
    priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]
    assigned_surveyor_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    assigned_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    approved_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    generated_certificate_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    remarks:
      type: string
      nullable: true
    is_survey_required:
      type: boolean
    reschedule_count:
      type: integer
    payment_status:
      type: string
      example: "UNPAID"
    certificate_url:
      type: string
      format: uri
      nullable: true
    certificate_number:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    Vessel:
      $ref: '#/components/schemas/VesselSummary'
    CertificateType:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        issuing_authority: { type: string }
    survey:
      type: object
      properties:
        id: { type: string, format: uuid }
        survey_status: { type: string }
        survey_statement_status: { type: string }
        survey_statement_pdf_url:
          type: string
          format: uri
          nullable: true
        started_at: { type: string, format: date-time, nullable: true }
        submitted_at: { type: string, format: date-time, nullable: true }
        signed_checklist_files:
          type: array
          description: Resolved (signed) HTTPS URLs of surveyor uploaded signed checklist scans.
          items: { type: string, format: uri }
    ActivityPlannings:
      type: array
      description: List of checklist items and surveyor findings for this job.
      items:
        $ref: '#/components/schemas/ChecklistItemResponse'
    Payments:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'
    requester:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        email: { type: string }
        role: { type: string }
    surveyor:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        email: { type: string }
    approver:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        role: { type: string }
    payment_status: { type: string }
  example:
    id: "019d3ac5-3464-74f9-891e-f6eda7ee366c"
    job_status: "ASSIGNED"
    vessel_id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
    certificate_type_id: "019cbf1d-bdc2-75e8-9fc8-3d161ae90ede"
    requested_by_user_id: "019c79a4-3eee-731a-9eff-b0eed303e215"
    assigned_surveyor_id: "019c79a4-4930-71fd-aa73-887301791935"
    target_port: "Mumbai"
    target_date: "2026-12-31"
    priority: "NORMAL"
    createdAt: "2026-03-29T18:04:55.000Z"
    updatedAt: "2026-04-11T11:42:13.000Z"
    is_survey_required: true
    reschedule_count: 0
    Vessel:
      id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
      vessel_name: "MV Pacific Guardian"
      imo_number: "9876501"
      client_id: "019c79a4-3ab9-7055-a1a7-9d7332fb025e"
    CertificateType:
      id: "019cbf1d-bdc2-75e8-9fc8-3d161ae90ede"
      name: "Safety Equipment Certificate"
      issuing_authority: "CLASS"
    survey:
      id: "019d7c59-7f7e-768d-a9a5-00cb91079432"
      survey_status: "NOT_STARTED"
      survey_statement_status: "NOT_PREPARED"
    requester:
      id: "019c79a4-3eee-731a-9eff-b0eed303e215"
      name: "System Admin"
