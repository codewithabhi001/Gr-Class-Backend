JobSummary:
  type: object
  properties:
    id: { $ref: '#/components/schemas/UUID' }
    job_request_number: { type: string, example: "GRJ-B1C2D3E4" }
    job_status: { type: string }
    vessel_id: { $ref: '#/components/schemas/UUID' }
    target_port: { type: string }
    target_date: { type: string, format: date }
    priority: { type: string }
    source_activity_request_id:
      allOf:
        - $ref: '#/components/schemas/UUID'
      nullable: true
      description: Set when the job was created from an activity request conversion
    source_activity_request:
      type: object
      nullable: true
      description: Present on job detail when converted from an activity request
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        request_number: { type: string }
        status: { type: string }
        activity_type: { type: string }
        requested_service: { type: string }
    createdAt: { type: string, format: date-time }
    Vessel:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        vessel_name: { type: string }
        imo_number: { type: string }
    certificates:
      type: array
      items:
        type: object
        properties:
          id: { $ref: '#/components/schemas/UUID' }
          status: { type: string }
          CertificateType:
            type: object
            properties:
              id: { $ref: '#/components/schemas/UUID' }
              name: { type: string }
    payment_status: { type: string }

JobCreateRequest:
  type: object
  required:
    - vessel_id
    - certificates
    - reason
    - target_port
    - target_date
  properties:
    vessel_id:
      $ref: '#/components/schemas/UUID'
    certificates:
      type: array
      minItems: 1
      items:
        type: object
        required: [certificate_type_id]
        properties:
          certificate_type_id:
            $ref: '#/components/schemas/UUID'
          uploaded_documents:
            type: array
            items:
              type: object
              required: [required_document_id, file_url]
              properties:
                required_document_id:
                  $ref: '#/components/schemas/UUID'
                file_url:
                  type: string
                custom_document_name:
                  type: string
    reason:
      type: string
      example: "Annual survey due"
    target_port:
      type: string
      example: "Singapore"
    target_date:
      type: string
      format: date
      example: "2026-03-15"
    remarks:
      type: string
    uploaded_documents:
      type: array
      items:
        type: object
        required: [required_document_id, file_url]
        properties:
          required_document_id:
            $ref: '#/components/schemas/UUID'
          file_url:
            type: string
    payment:
      type: object
      description: "Optional payment object (only processed for ADMIN/GM). Instantly creates an invoice."
      properties:
        amount:
          type: number
          example: 1000
        currency:
          type: string
          default: "USD"
          example: "USD"

JobResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_request_number:
      type: string
      example: "GRJ-B1C2D3E4"
    vessel_id:
      $ref: '#/components/schemas/UUID'
    requested_by_user_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
    target_port:
      type: string
    target_date:
      type: string
      format: date
    job_status:
      type: string
      enum: [CREATED, DOCUMENT_VERIFIED, APPROVED, ASSIGNED, SURVEY_AUTHORIZED, IN_PROGRESS, SURVEY_DONE, REVIEWED, FINALIZED, REWORK_REQUESTED, PAYMENT_DONE, CERTIFIED, REJECTED]
    priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]
    assigned_surveyor_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    assigned_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    approved_by_user_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    remarks:
      type: string
      nullable: true
    is_survey_required:
      type: boolean
    reschedule_count:
      type: integer
    payment_status:
      type: string
      example: "UNPAID"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    Vessel:
      $ref: '#/components/schemas/VesselSummary'
    certificates:
      type: array
      items:
        type: object
        properties:
          id: { $ref: '#/components/schemas/UUID' }
          status: { type: string }
          rework_remarks: { type: string, nullable: true }
          CertificateType:
            type: object
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              issuing_authority: { type: string }
          survey:
            type: object
            properties:
              id: { type: string, format: uuid }
              survey_status: { type: string }
              survey_statement_status: { type: string }
              survey_statement_pdf_url: { type: string, format: uri, nullable: true }
              started_at: { type: string, format: date-time, nullable: true }
              submitted_at: { type: string, format: date-time, nullable: true }
          Certificate:
            type: object
            properties:
              id: { type: string, format: uuid }
              certificate_number: { type: string }
              source_type: { type: string }
              uploaded_file_url: { type: string, format: uri, nullable: true }
              generated_pdf_url: { type: string, format: uri, nullable: true }
              pdf_file_url: { type: string, format: uri, nullable: true }
    ActivityPlannings:
      type: array
      description: List of checklist items and surveyor findings for this job.
      items:
        $ref: '#/components/schemas/ChecklistItemResponse'
    Payments:
      type: array
      items:
        $ref: '#/components/schemas/PaymentResponse'
    requester:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        email: { type: string }
        role: { type: string }
    surveyor:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        email: { type: string }
    approver:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        role: { type: string }
    uploaded_documents:
      type: array
      description: Job supporting documents with signed download URLs.
      items:
        type: object
        properties:
          id: { $ref: '#/components/schemas/UUID' }
          document_type: { type: string, nullable: true }
          description: { type: string, nullable: true }
          createdAt: { type: string, format: date-time }
          filename: { type: string }
          signedUrl: { type: string, format: uri }
    payment_status: { type: string }
  example:
    id: "019d3ac5-3464-74f9-891e-f6eda7ee366c"
    job_status: "ASSIGNED"
    vessel_id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
    certificate_type_id: "019cbf1d-bdc2-75e8-9fc8-3d161ae90ede"
    requested_by_user_id: "019c79a4-3eee-731a-9eff-b0eed303e215"
    assigned_surveyor_id: "019c79a4-4930-71fd-aa73-887301791935"
    target_port: "Mumbai"
    target_date: "2026-12-31"
    priority: "NORMAL"
    createdAt: "2026-03-29T18:04:55.000Z"
    updatedAt: "2026-04-11T11:42:13.000Z"
    is_survey_required: true
    reschedule_count: 0
    Vessel:
      id: "019cbf1d-d9c1-732d-8d10-f866bb6e9dec"
      vessel_name: "MV Pacific Guardian"
      imo_number: "9876501"
      client_id: "019c79a4-3ab9-7055-a1a7-9d7332fb025e"
    certificates:
      - id: "019d3ac5-3464-74f9-891e-f6eda7ee366c"
