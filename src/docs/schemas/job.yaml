JobStatusUpdateRequest:
  type: object
  required: [status]
  properties:
    status:
      type: string
      enum: [CREATED, APPROVED, ASSIGNED, SURVEY_AUTHORIZED, IN_PROGRESS, SURVEY_DONE, REVIEWED, FINALIZED, REWORK_REQUESTED, PAYMENT_DONE, CERTIFIED, REJECTED]
    remarks:
      type: string

AssignSurveyorRequest:
  type: object
  properties:
    surveyorId:
      $ref: '#/components/schemas/UUID'
    surveyor_id:
      $ref: '#/components/schemas/UUID'
    remarks:
      type: string

ReassignJobRequest:
  type: object
  required:
    - reason
  properties:
    surveyorId:
      $ref: '#/components/schemas/UUID'
    surveyor_id:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string

RescheduleJobRequest:
  type: object
  required:
    - new_target_date
    - new_target_port
    - reason
  properties:
    new_target_date:
      type: string
      format: date
    new_target_port:
      type: string
    reason:
      type: string

JobCancelRequest:
  type: object
  required: [reason]
  properties:
    reason:
      type: string

JobRejectRequest:
  type: object
  required: [reason]
  properties:
    reason:
      type: string

JobEvidenceUploadRequest:
  type: object
  required: [job_id, context]
  properties:
    job_id:
      $ref: '#/components/schemas/UUID'
    context:
      type: string
      example: "SURVEY_PHOTOS"
    description:
      type: string

AddNoteRequest:
  type: object
  required:
    - note_text
  properties:
    note_text:
      type: string
    is_internal:
      type: boolean
      default: true

MessageCreateRequest:
  type: object
  required:
    - content
  properties:
    content:
      type: string

JobHistoryItem:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    previous_status:
      type: string
      nullable: true
    new_status:
      type: string
    changed_by:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
    created_at:
      type: string
      format: date-time
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string

SurveyHistoryItem:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    survey_id:
      $ref: '#/components/schemas/UUID'
    previous_status:
      type: string
      nullable: true
    new_status:
      type: string
    changed_by:
      $ref: '#/components/schemas/UUID'
    reason:
      type: string
      nullable: true
    submission_iteration:
      type: integer
    created_at:
      type: string
      format: date-time
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string

JobHistoryResponse:
  type: object
  properties:
    job_history:
      type: array
      items:
        $ref: '#/components/schemas/JobHistoryItem'
    survey_history:
      type: array
      items:
        $ref: '#/components/schemas/SurveyHistoryItem'

JobNoteResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    user_id:
      $ref: '#/components/schemas/UUID'
    note_text:
      type: string
    is_internal:
      type: boolean
    created_at:
      type: string
      format: date-time

JobMessageResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    sender_id:
      $ref: '#/components/schemas/UUID'
    message_text:
      type: string
    is_internal:
      type: boolean
    attachment_url:
      type: string
      format: uri
      nullable: true
    created_at:
      type: string
      format: date-time
    Sender:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
