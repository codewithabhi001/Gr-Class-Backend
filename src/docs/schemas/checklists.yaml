ChecklistItemResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    job_id:
      $ref: '#/components/schemas/UUID'
    question_code:
      type: string
    question_text:
      type: string
    answer:
      type: string
      enum: [YES, NO, NA]
    remarks:
      type: string
      nullable: true
    file_url:
      type: string
      format: uri
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  example:
    id: "019c675a-eead-752b-b2ea-e8b5932b0cfc"
    job_id: "019c6152-5b55-736c-a0d3-0dc3f6f1c4ec"
    question_code: "LSE001"
    question_text: "Are life jackets available?"
    answer: "YES"
    remarks: ""
    file_url: null
    createdAt: "2026-02-16T16:48:58.000Z"
    updatedAt: "2026-02-16T16:48:58.000Z"

ChecklistSubmission:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        type: object
        required: [question_code, question_text, answer]
        properties:
          question_code: { type: string }
          question_text: { type: string }
          answer: { type: string, enum: [YES, NO, NA] }
          remarks: { type: string }
          file_url: { type: string, format: uri }

ChecklistResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    data:
      type: array
      items:
        $ref: '#/components/schemas/ChecklistItemResponse'

ChecklistTemplateResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    code:
      type: string
    description:
      type: string
      nullable: true
    certificate_type_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    sections:
      type: array
      items:
        type: object
        properties:
          title: { type: string }
          items:
            type: array
            items:
              type: object
              properties:
                code: { type: string }
                text: { type: string }
                type: { type: string }
    status:
      type: string
      enum: [ACTIVE, INACTIVE, DRAFT]
    metadata:
      type: object
    created_by:
      $ref: '#/components/schemas/UUID'
    updated_by:
      $ref: '#/components/schemas/UUID'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ChecklistTemplateCreateRequest:
  type: object
  required: [name, code, sections]
  properties:
    name: { type: string }
    code: { type: string }
    description: { type: string }
    certificate_type_id: { $ref: '#/components/schemas/UUID', nullable: true }
    sections:
      type: array
      items:
        type: object
        properties:
          title: { type: string }
          items:
            type: array
            items:
              type: object
              properties:
                code: { type: string }
                text: { type: string }
                type: { type: string }
    status: { type: string, enum: [ACTIVE, INACTIVE, DRAFT] }
    metadata: { type: object }

ChecklistTemplateUpdateRequest:
  type: object
  properties:
    name: { type: string }
    code: { type: string }
    description: { type: string }
    certificate_type_id: { $ref: '#/components/schemas/UUID', nullable: true }
    sections:
      type: array
      items:
        type: object
        properties:
          title: { type: string }
          items:
            type: array
            items:
              type: object
              properties:
                code: { type: string }
                text: { type: string }
                type: { type: string }
    status: { type: string, enum: [ACTIVE, INACTIVE, DRAFT] }
    metadata: { type: object }
