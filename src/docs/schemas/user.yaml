UserResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      enum: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    phone:
      type: string
      nullable: true
    status:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]
    client_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    force_password_reset:
      type: boolean
    last_login_at:
      type: string
      format: date-time
      nullable: true
    fcm_token:
      type: string
      nullable: true
    profile_pic_url:
      type: string
      format: uri
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

UserCreateRequest:
  type: object
  required:
    - name
    - email
    - password
    - role
  properties:
    name:
      type: string
    email:
      type: string
      format: email
    password:
      type: string
      format: password
      minLength: 8
      pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)'
    role:
      type: string
      enum: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    phone:
      type: string
    client_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    license_number:
      type: string
    authorized_ship_types:
      type: array
      items:
        type: string
    authorized_certificates:
      type: array
      items:
        type: string
    valid_from:
      type: string
      format: date

UserUpdateRequest:
  type: object
  properties:
    name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      enum: [ADMIN, GM, TM, TO, SURVEYOR, CLIENT]
    phone:
      type: string
    status:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]
    client_id:
      $ref: '#/components/schemas/UUID'
      nullable: true

UserStatusUpdateRequest:
  type: object
  required:
    - status
  properties:
    status:
      type: string
      enum: [ACTIVE, SUSPENDED, INACTIVE]

UpdateFcmTokenRequest:
  type: object
  required:
    - fcmToken
  properties:
    fcmToken:
      type: string
      description: The unique device token generated by the Firebase SDK.
      example: "fXz1A2B3C4D5E6F7G8H9I0J..."
