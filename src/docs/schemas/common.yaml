# Common reusable schemas
ErrorResponse:
  type: object
  required:
    - success
    - message
    - error_code
    - trace_id
  properties:
    success:
      type: boolean
      example: false
    error_code:
      type: string
      example: "VALIDATION_ERROR"
    message:
      type: string
      example: "Invalid request parameters"
    errors:
      type: object
      description: "Map of field-specific validation errors"
      example:
        email: "Email is required"
        password: "Password is too short"
    trace_id:
      type: string
      format: uuid
      example: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"
    stack:
      type: string
      description: "Error stack trace (only in development)"
  example:
    success: false
    error_code: "VALIDATION_ERROR"
    message: "Validation failed. Please correct the highlighted fields."
    errors:
      vessel_id: "vessel_id is required"
    trace_id: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"

SuccessWrapper:
  type: object
  required:
    - success
    - data
  properties:
    success:
      type: boolean
      example: true
    data:
      type: object
      description: "Response payload"
    message:
      type: string
      description: "Optional success message"

PaginatedResponse:
  type: object
  properties:
    success:
      type: boolean
      example: true
    data:
      type: array
      items: {}
    total:
      type: integer
      example: 42
    page:
      type: integer
      example: 1
    limit:
      type: integer
      example: 20

PaginatedMeta:
  type: object
  properties:
    total:
      type: integer
      example: 100
    page:
      type: integer
      example: 1
    limit:
      type: integer
      example: 20
    totalPages:
      type: integer
      example: 5

UUID:
  type: string
  format: uuid
  example: "01933c5e-7f2a-7a00-8000-1a2b3c4d5e6f"

StatusCount:
  type: object
  properties:
    status:
      type: string
      example: "CREATED"
    count:
      type: integer
      example: 5
