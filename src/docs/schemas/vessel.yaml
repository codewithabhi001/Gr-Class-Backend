VesselResponse:
  allOf:
    - $ref: '#/components/schemas/VesselSummary'
    - type: object
      properties:
        client_id:
          $ref: '#/components/schemas/UUID'
        call_sign:
          type: string
          nullable: true
        mmsi_number:
          type: string
          nullable: true
        port_of_registry:
          type: string
          nullable: true
        year_built:
          type: integer
          nullable: true
        gross_tonnage:
          type: number
        net_tonnage:
          type: number
        deadweight:
          type: number
        class_status:
          type: string
          enum: [ACTIVE, SUSPENDED, WITHDRAWN]
        current_class_society:
          type: string
          nullable: true
        engine_type:
          type: string
          nullable: true
        builder_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        Client:
          type: object
          properties:
            id: { $ref: '#/components/schemas/UUID' }
            company_name: { type: string }
            company_code: { type: string }
            email: { type: string }
            status: { type: string }
        FlagAdministration:
          type: object
          properties:
            flag_state_name: { type: string }
        uploaded_documents:
          type: array
          items:
            type: object
            properties:
              id: { $ref: '#/components/schemas/UUID' }
              document_type: { type: string }
              description: { type: string, nullable: true }
              createdAt: { type: string, format: date-time }
              filename: { type: string }
              signedUrl: { type: string, format: uri }
  example:
    id: "019ccbf7-f67a-7443-bd21-17f16ef06cbb"
    client_id: "019c79a4-3ab9-7055-a1a7-9d7332fb025e"
