ActivityRequestConvertToJobRequest:
  type: object
  required: [certificate_type_id]
  description: |
    Same shape as job create, but only `certificate_type_id` is required.
    `vessel_id`, `target_port`, `target_date`, and `reason` default from the
    activity request when omitted.
  properties:
    certificate_type_id:
      allOf:
        - $ref: '#/components/schemas/UUID'
      description: Certificate type for the new job (required at conversion).
    vessel_id:
      allOf:
        - $ref: '#/components/schemas/UUID'
      description: Override activity `vessel_id` if needed.
    reason:
      type: string
      description: Job reason; defaults to requested_service + description.
    target_port:
      type: string
      description: Defaults to activity `location_port`.
    target_date:
      type: string
      format: date
      description: Defaults to activity `proposed_date`.
    priority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]
      description: Defaults from activity priority (MEDIUM → NORMAL).
    remarks:
      type: string
      description: Job remarks; defaults to "Converted from {request_number}".
    uploaded_documents:
      type: array
      items:
        type: object
        required: [required_document_id, file_url]
        properties:
          required_document_id:
            $ref: '#/components/schemas/UUID'
          file_url:
            type: string

ActivityRequestConvertToJobResponse:
  type: object
  properties:
    activity_request:
      $ref: '#/components/schemas/ActivityRequestDetailResponse'
    job:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        job_request_number: { type: string }
        job_status: { type: string }
        vessel_id: { $ref: '#/components/schemas/UUID' }
        certificate_type_id: { $ref: '#/components/schemas/UUID' }
        target_port: { type: string }
        target_date: { type: string, format: date }
        priority: { type: string }
        reason: { type: string }
        source_activity_request_id:
          allOf:
            - $ref: '#/components/schemas/UUID'
          description: Back-reference to the originating activity request

ActivityRequestListPaginatedResponse:
  type: object
  properties:
    total: { type: integer, example: 42 }
    page: { type: integer, example: 1 }
    limit: { type: integer, example: 10 }
    totalPages: { type: integer, example: 5 }
    rows:
      type: array
      items:
        $ref: '#/components/schemas/ActivityRequestSummary'

ActivityRequestStatusUpdateRequest:
  type: object
  required: [status]
  properties:
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED, DRAFT]
      description: |
        Cannot be `CONVERTED_TO_JOB` — use `POST .../convert-to-job` instead.
    remarks:
      type: string
      description: Required meaningfully when `status` is `REJECTED`

ActivityRequestApiEnvelope:
  type: object
  properties:
    success: { type: boolean, example: true }
    data:
      $ref: '#/components/schemas/ActivityRequestDetailResponse'

ActivityRequestConvertApiEnvelope:
  type: object
  properties:
    success: { type: boolean, example: true }
    message: { type: string, example: Activity request converted to job successfully }
    data:
      $ref: '#/components/schemas/ActivityRequestConvertToJobResponse'

ActivityRequestCreateRequest:
  type: object
  required: [activity_type, requested_service, proposed_date, location_port]
  properties:
    vessel_id:
      $ref: '#/components/schemas/UUID'
      description: "Mandatory for CLIENT requests"
    activity_type:
      type: string
      enum: [INSPECTION, AUDIT, TRAINING, VISIT, SURVEY, OTHER]
    requested_service:
      type: string
      example: "Annual Survey"
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, URGENT]
      default: MEDIUM
    description:
      type: string
    location_port:
      type: string
      example: "Port of Singapore"
    proposed_date:
      type: string
      format: date
      example: "2026-05-15"
    attachments:
      type: array
      items:
        type: string
        format: uri

ActivityRequestVesselBlock:
  type: object
  description: Flat vessel summary for activity request screens (all fields `N/A` when no vessel linked).
  properties:
    id:
      type: string
      description: Vessel UUID, or `N/A`
    vessel_name:
      type: string
    imo_number:
      type: string
    call_sign:
      type: string
    mmsi_number:
      type: string
    port_of_registry:
      type: string
    year_built:
      type: string
      description: Build year, or `N/A`
    ship_type:
      type: string
    gross_tonnage:
      type: string
    net_tonnage:
      type: string
    deadweight:
      type: string
    class_status:
      type: string
      enum: [ACTIVE, SUSPENDED, WITHDRAWN, N/A]
    current_class_society:
      type: string
    engine_type:
      type: string
    flag_state:
      type: string
      description: Flag administration name, or `N/A`
    company_name:
      type: string
      description: Owner/client company, or `N/A`
    company_code:
      type: string

ActivityRequestSummary:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    request_number:
      type: string
    activity_type:
      type: string
    requested_service:
      type: string
    proposed_date:
      type: string
      format: date
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CONVERTED_TO_JOB, DRAFT]
    vessel_id:
      type: string
      description: UUID when set; otherwise `N/A`
    vessel_name:
      type: string
      description: Vessel name, or `N/A`
    imo_number:
      type: string
      description: IMO number, or `N/A`
    ship_type:
      type: string
      description: Vessel type, or `N/A`
    class_status:
      type: string
      description: Class status, or `N/A`
    flag_state:
      type: string
      description: Flag state name, or `N/A`
    company_name:
      type: string
      description: Owner company, or `N/A`
    vessel:
      $ref: '#/components/schemas/ActivityRequestVesselBlock'
    linked_job_id:
      type: string
      description: UUID when linked; otherwise `N/A`
    linked_job_status:
      type: string
      description: Linked job status, or `N/A`
    linked_job_request_number:
      type: string
      description: Linked job number, or `N/A`
    created_at:
      type: string
      format: date-time

ActivityRequestDetailResponse:
  allOf:
    - $ref: '#/components/schemas/ActivityRequestSummary'
    - type: object
      properties:
        requested_by:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        priority:
          type: string
        description:
          type: string
        location_port:
          type: string
        linked_job_id:
          type: string
          description: UUID when linked; otherwise `N/A`
        rejection_reason:
          type: string
          description: Rejection text, or `N/A` when not rejected
        attachments:
          type: array
          items:
            type: object
            properties:
              filename: { type: string }
              signedUrl: { type: string, format: uri }
        requester_name:
          type: string
          description: Display name, or `N/A`
        requester_email:
          type: string
          description: Email, or `N/A`
        vessel_name:
          type: string
          description: Vessel name, or `N/A`
        imo_number:
          type: string
          description: IMO number, or `N/A`
        vessel:
          $ref: '#/components/schemas/ActivityRequestVesselBlock'
        updated_at:
          type: string
          format: date-time
        linked_job_status:
          type: string
          description: Linked job status, or `N/A`
        linked_job_reason:
          type: string
          description: Linked job reason, or `N/A`
        linked_job_request_number:
          type: string
          description: Linked job number, or `N/A`

ChangeRequestResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    requested_by:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
      nullable: true
    change_description:
      type: string
    old_value:
      type: object
    new_value:
      type: object
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    approval_remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time

ApprovalResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
    role:
      type: string
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time

TocaResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    losing_class_society:
      type: string
    gaining_class_society:
      type: string
    request_date:
      type: string
      format: date
    status:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]
    documents_url:
      type: array
      items: { type: string, format: uri }
    decision_date:
      type: string
      format: date
      nullable: true
