ActivityRequestResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    request_number:
      type: string
    requested_by:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    activity_type:
      type: string
      enum: [INSPECTION, AUDIT, TRAINING, VISIT, OTHER]
    requested_service:
      type: string
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, URGENT]
    description:
      type: string
    location_port:
      type: string
    proposed_date:
      type: string
      format: date-time
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CONVERTED_TO_JOB, DRAFT]
    linked_job_id:
      $ref: '#/components/schemas/UUID'
      nullable: true
    rejection_reason:
      type: string
      nullable: true
    attachments:
      type: array
      items: { type: string, format: uri }
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

ChangeRequestResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    requested_by:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
      nullable: true
    change_description:
      type: string
    old_value:
      type: object
    new_value:
      type: object
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    approval_remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time

ApprovalResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
    role:
      type: string
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time

TocaResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    losing_class_society:
      type: string
    gaining_class_society:
      type: string
    request_date:
      type: string
      format: date
    status:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]
    documents_url:
      type: array
      items: { type: string, format: uri }
    decision_date:
      type: string
      format: date
      nullable: true
