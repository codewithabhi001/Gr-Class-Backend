ActivityRequestCreateRequest:
  type: object
  required: [activity_type, requested_service, proposed_date, location_port]
  properties:
    vessel_id:
      $ref: '#/components/schemas/UUID'
      description: "Mandatory for CLIENT requests"
    activity_type:
      type: string
      enum: [INSPECTION, AUDIT, TRAINING, VISIT, OTHER]
    requested_service:
      type: string
      example: "Annual Survey"
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH, URGENT]
      default: MEDIUM
    description:
      type: string
    location_port:
      type: string
      example: "Port of Singapore"
    proposed_date:
      type: string
      format: date
      example: "2026-05-15"
    attachments:
      type: array
      items:
        type: string
        format: uri

ActivityRequestSummary:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    request_number:
      type: string
    activity_type:
      type: string
    requested_service:
      type: string
    proposed_date:
      type: string
      format: date
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CONVERTED_TO_JOB, DRAFT]
    Vessel:
      $ref: '#/components/schemas/VesselSummary'
    created_at:
      type: string
      format: date-time

ActivityRequestDetailResponse:
  allOf:
    - $ref: '#/components/schemas/ActivityRequestSummary'
    - type: object
      properties:
        requested_by:
          $ref: '#/components/schemas/UUID'
        vessel_id:
          $ref: '#/components/schemas/UUID'
        priority:
          type: string
        description:
          type: string
        location_port:
          type: string
        linked_job_id:
          $ref: '#/components/schemas/UUID'
          nullable: true
        rejection_reason:
          type: string
          nullable: true
        attachments:
          type: array
          items: { type: string, format: uri }
        updated_at:
          type: string
          format: date-time
        LinkedJob:
          type: object
          properties:
            id: { type: string, format: uuid }
            job_status: { type: string }
            reason: { type: string }

ChangeRequestResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    requested_by:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
      nullable: true
    change_description:
      type: string
    old_value:
      type: object
    new_value:
      type: object
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    priority:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    approval_remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time

ApprovalResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    entity_type:
      type: string
    entity_id:
      $ref: '#/components/schemas/UUID'
    approved_by:
      $ref: '#/components/schemas/UUID'
    role:
      type: string
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]
    remarks:
      type: string
      nullable: true
    approved_at:
      type: string
      format: date-time

TocaResponse:
  type: object
  properties:
    id:
      $ref: '#/components/schemas/UUID'
    vessel_id:
      $ref: '#/components/schemas/UUID'
    losing_class_society:
      type: string
    gaining_class_society:
      type: string
    request_date:
      type: string
      format: date
    status:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]
    documents_url:
      type: array
      items: { type: string, format: uri }
    decision_date:
      type: string
      format: date
      nullable: true
