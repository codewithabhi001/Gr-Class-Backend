name: Deploy Backend

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Set Deployment Environment Variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "DEPLOY_DIR=/var/www/Gr-Class-Backend" >> $GITHUB_ENV
            echo "PM2_NAME=girik" >> $GITHUB_ENV
          else
            echo "DEPLOY_DIR=/var/www/dev/Gr-Class-Backend" >> $GITHUB_ENV
            echo "PM2_NAME=girik-dev" >> $GITHUB_ENV
          fi

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "set -e; \
             cd $DEPLOY_DIR; \
             git fetch origin ${{ github.ref_name }}; \
             git reset --hard origin/${{ github.ref_name }}; \
             npm install --omit=dev; \
             if pm2 show $PM2_NAME > /dev/null; then \
               pm2 reload $PM2_NAME --update-env; \
             else \
               pm2 start src/server.js --name $PM2_NAME --update-env; \
             fi; \
             pm2 save"